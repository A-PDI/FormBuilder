              delBtn.addEventListener("mousedown", (e) => e.preventDefault());
              delBtn.addEventListener("click", () =>
                removePartsColumn(block.id, colIdx),
              );
              th.appendChild(delBtn);
            }
            headerRow.appendChild(th);
          });

          // Right gutter for row-action buttons
          const gutterTh = document.createElement("th");
          gutterTh.className = "parts-actions-col no-print";
          headerRow.appendChild(gutterTh);

          thead.appendChild(headerRow);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");
          block.rows.forEach((row, rowIdx) => {
            const tr = document.createElement("tr");
            block.columns.forEach((_, colIdx) => {
              const td = document.createElement("td");
              td.appendChild(
                buildPartsCell(block.id, row[colIdx] || "", {
                  isHeader: false,
                  rowIdx: rowIdx,
                  colIdx: colIdx,
                  placeholder: "",
                  onChange: (value) => {
                    const b = findBlockById(block.id);
                    if (b && Array.isArray(b.rows) && b.rows[rowIdx]) {
                      b.rows[rowIdx][colIdx] = value;
                      saveState();
                    }
                  },
                }),
              );
              tr.appendChild(td);
            });
            // Row delete in gutter (only if more than 1 row)
            const gutterTd = document.createElement("td");
            gutterTd.className = "parts-actions-col no-print";
            if (block.rows.length > 1) {
              const delBtn = document.createElement("button");
              delBtn.type = "button";
              delBtn.className = "parts-row-delete";
              delBtn.title = "Delete this row";
              delBtn.textContent = "\u2715"; // ✕
              delBtn.addEventListener("mousedown", (e) => e.preventDefault());
              delBtn.addEventListener("click", () =>
                removePartsRow(block.id, rowIdx),
              );
              gutterTd.appendChild(delBtn);
            }
            tr.appendChild(gutterTd);
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          el.appendChild(table);

          // ----- Action footer (no-print) -----
          const actions = document.createElement("div");
          actions.className = "parts-actions no-print";

          const addRowBtn = document.createElement("button");
          addRowBtn.type = "button";
          addRowBtn.textContent = "+ Row";
          addRowBtn.title = "Add a new row to the parts list";
          addRowBtn.addEventListener("mousedown", (e) => e.preventDefault());
          addRowBtn.addEventListener("click", () => addPartsRow(block.id));
          actions.appendChild(addRowBtn);

          const addColBtn = document.createElement("button");
          addColBtn.type = "button";
          addColBtn.textContent = "+ Column";
          addColBtn.title = "Add a new column to the parts list";
          addColBtn.addEventListener("mousedown", (e) => e.preventDefault());
          addColBtn.addEventListener("click", () => addPartsColumn(block.id));
          actions.appendChild(addColBtn);

          const hint = document.createElement("span");
          hint.className = "parts-paste-hint";
          hint.textContent =
            "Tip: paste tabular data from Excel directly into a cell";
          actions.appendChild(hint);

          el.appendChild(actions);

          return el;
        }

        function buildPartsCell(blockId, initialValue, opts) {
          // Each cell is a single-line contenteditable div. Tab moves to next cell
          // (browser default since each cell is a separate focusable contenteditable).
          const cell = document.createElement("div");
          cell.className =
            "parts-cell" + (opts.isHeader ? " parts-col-header" : "");
          cell.contentEditable = "true";
          cell.spellcheck = !opts.isHeader;
          cell.textContent = initialValue || "";
          cell.dataset.blockId = blockId;
          if (opts.placeholder) {
            cell.dataset.placeholder = opts.placeholder;
          }
          // Single-line: block Enter
          cell.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              cell.blur();
            }
          });
          // Paste handler: detect tab/newline-delimited data (e.g. from Excel) and
          // distribute it across cells starting from the current one. Single-cell
          // pastes still go in flat as plain text.
          cell.addEventListener("paste", (e) => {
            e.preventDefault();
            const cd = e.clipboardData || window.clipboardData;
            if (!cd) return;
            const raw = cd.getData("text/plain") || "";
            if (!raw) return;

            const grid = parseTabularPaste(raw);
            const isMultiCell =
              grid.length > 1 || (grid.length === 1 && grid[0].length > 1);

            if (!isMultiCell || opts.isHeader) {
              // Single-cell paste, or paste into a column header: keep flat behavior.
              const flat = raw
                .replace(/[\r\n\t]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
              if (flat) {
                document.execCommand("insertText", false, flat);
              }
              return;
            }

            // Multi-cell paste into a body cell: drop the grid into the table starting here.
            pasteGridIntoTable(blockId, opts.rowIdx, opts.colIdx, grid);
          });
          cell.addEventListener("input", () => {
            // Strip any HTML the user might have pasted that slipped through
            const text = cell.textContent;
            opts.onChange(text);
          });
          return cell;
        }

        // ---------- Parts: tabular paste handling ----------

        // Parse plain-text tabular data (TSV / CSV / pipe-delimited / multi-space).
        // Excel and Google Sheets put tab-separated values on the clipboard, with
        // newlines between rows. We accept other reasonable delimiters too.
        function parseTabularPaste(raw) {
          // Normalize line endings, drop any trailing blank line that Excel adds.
          const lines = raw
            .replace(/\r\n?/g, "\n")
            .replace(/\n+$/, "")
            .split("\n");
          if (lines.length === 0) return [[]];

          // Pick a delimiter: TSV first (Excel default), then CSV, then pipe, then
          // 2+ spaces. Fall back to "single cell per line" if none match.
          let delimiter = null;
          if (lines.some((l) => l.indexOf("\t") !== -1)) {
            delimiter = "\t";
          } else if (lines.some((l) => l.indexOf(",") !== -1)) {
            // CSV-ish. We use a real splitter that handles quoted fields.
            return lines.map(parseCsvLine);
          } else if (lines.some((l) => l.indexOf("|") !== -1)) {
            delimiter = "|";
          } else if (lines.some((l) => /\S {2,}\S/.test(l))) {
            // Multi-space-delimited (e.g. fixed-width text)
            return lines.map((l) => l.split(/ {2,}/).map((c) => c.trim()));
          }

          if (delimiter !== null) {
            return lines.map((l) => l.split(delimiter).map((c) => c.trim()));
          }
          return lines.map((l) => [l.trim()]);
        }

        // Split one CSV line, respecting "double quoted" fields (handles escaped "")
        function parseCsvLine(line) {
          const out = [];
          let cur = "";
          let inQuotes = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
              if (ch === '"') {
                if (line[i + 1] === '"') {
                  cur += '"';
                  i++;
                } else {
                  inQuotes = false;
                }
              } else {
                cur += ch;
              }
            } else {
              if (ch === '"') {
                inQuotes = true;
              } else if (ch === ",") {
                out.push(cur.trim());
                cur = "";
              } else {
                cur += ch;
              }
            }
          }
          out.push(cur.trim());
          return out;
        }

        // Drop a 2D grid of values into the table starting at (rowIdx, colIdx).
        // Grows rows and columns as needed so nothing is silently truncated.
        function pasteGridIntoTable(blockId, rowIdx, colIdx, grid) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "parts") return;
          if (typeof rowIdx !== "number" || typeof colIdx !== "number") return;

          const rowsNeeded = grid.length;
          const colsNeeded = grid.reduce((m, r) => Math.max(m, r.length), 0);
          if (rowsNeeded === 0 || colsNeeded === 0) return;

          // Grow columns if pasting wider than the table
          while (b.columns.length < colIdx + colsNeeded) {
            b.columns.push("Column " + (b.columns.length + 1));
            b.rows.forEach((r) => r.push(""));
          }
          // Grow rows if pasting taller than the table
          while (b.rows.length < rowIdx + rowsNeeded) {
            b.rows.push(Array(b.columns.length).fill(""));
          }
          // Stamp values
          for (let r = 0; r < rowsNeeded; r++) {
            const targetRow = rowIdx + r;
            const sourceRow = grid[r] || [];
            for (let c = 0; c < colsNeeded; c++) {
              const targetCol = colIdx + c;
              const v = sourceRow[c] == null ? "" : String(sourceRow[c]);
              b.rows[targetRow][targetCol] = v;
            }
          }

          saveState();
          // Re-render so the grown cells show up; restore focus to the anchor cell
          // afterwards so users can keep typing there.
          focusBlockIdAfterRender = blockId;
          render();

          // Defer focus restore until after the render so the new DOM is in place.
          setTimeout(() => {
            const sel =
              '.parts-block[data-block-id="' +
              blockId +
              '"] tbody tr:nth-child(' +
              (rowIdx + 1) +
              ") td:nth-child(" +
              (colIdx + 1) +
              ") .parts-cell";
            const cell = document.querySelector(sel);
            if (cell) cell.focus();
          }, 0);
        }

        // ---------- Parts table operations ----------
        function addPartsRow(blockId) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "parts") return;
          b.rows.push(Array(b.columns.length).fill(""));
          saveState();
          render();
        }

        function removePartsRow(blockId, rowIdx) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "parts") return;
          if (b.rows.length <= 1) return; // never delete the last row
          if (rowIdx < 0 || rowIdx >= b.rows.length) return;
          const hasData = b.rows[rowIdx].some((c) => c && c.trim());
          if (hasData && !confirm("Delete this row? Data will be lost."))
            return;
          b.rows.splice(rowIdx, 1);
          saveState();
          render();
        }

        function addPartsColumn(blockId) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "parts") return;
          b.columns.push("Column " + (b.columns.length + 1));
          b.rows.forEach((r) => r.push(""));
          saveState();
          render();
        }

        function removePartsColumn(blockId, colIdx) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "parts") return;
          if (b.columns.length <= 1) return; // never delete the last column
          if (colIdx < 0 || colIdx >= b.columns.length) return;
          const hasData = b.rows.some((r) => r[colIdx] && r[colIdx].trim());
          if (hasData && !confirm("Delete this column? Data will be lost."))
            return;
          b.columns.splice(colIdx, 1);
          b.rows.forEach((r) => r.splice(colIdx, 1));
          saveState();
          render();
        }

        // ---------- Photo array element ----------
        // Keep a photo array row's data left-compacted: populated cells first,
        // padded with nulls. Display relies on this invariant. A "populated" cell
        // is an object with a non-empty src (caption is allowed to be empty).
        function compactPhotoArrayRow(row) {
          if (!Array.isArray(row)) return [null, null, null];
          const out = row
            .filter(
              (c) =>
                c &&
                typeof c === "object" &&
                typeof c.src === "string" &&
                c.src,
            )
            .slice(0, 3);
          while (out.length < 3) out.push(null);
          return out;
        }

        function buildPhotoArrayElement(block) {
          const el = document.createElement("div");
          el.className = "photoarray-block";
          el.dataset.blockId = block.id;

          el.appendChild(buildBlockControls(block));

          block.rows.forEach((row, rowIdx) => {
            const rowWrap = document.createElement("div");
            rowWrap.className = "photoarray-row-wrapper";

            // Count populated cells. Data is normalized to be left-compact, so the
            // count is just the leading non-null run. A populated cell is an object
            // with a non-empty src (the caption is allowed to be empty).
            const populatedCount = row.filter((c) => c && c.src).length;

            // Empty row: show three placeholders so the user can pick where to
            // start. Otherwise, render only the populated cells; the count drives
            // the grid-template-columns via the count-N modifier class.
            const cellsToRender = populatedCount === 0 ? 3 : populatedCount;
            const layoutClass = "count-" + cellsToRender;

            const grid = document.createElement("div");
            grid.className = "photoarray-row " + layoutClass;

            for (let i = 0; i < cellsToRender; i++) {
              // For empty rows, render placeholder cells at slots 0..2.
              // For populated rows, render the populated entries at their data slot
              // (which equals i since data is left-compacted).
              grid.appendChild(
                buildPhotoArrayCell(block.id, rowIdx, i, row[i] || null),
              );
            }

            rowWrap.appendChild(grid);

            // Action strip below the row: holds the "+ Add Photo" and "Delete Row"
            // buttons. Built inline so they're always visible (the previous
            // floating-circle design lived in the page gutter and was easy to
            // miss). Strip is rendered only when at least one action exists.
            const showAddBtn = populatedCount > 0 && populatedCount < 3;
            const showDelBtn = block.rows.length > 1;

            if (showAddBtn || showDelBtn) {
              const actions = document.createElement("div");
              actions.className = "photoarray-row-actions no-print";

              if (showAddBtn) {
                const addBtn = document.createElement("button");
                addBtn.type = "button";
                addBtn.className = "photoarray-add-image";
                addBtn.title = "Add another image to this row";
                addBtn.textContent = "+ Add Photo";
                addBtn.addEventListener("mousedown", (e) => e.preventDefault());
                addBtn.addEventListener("click", (e) => {
                  e.stopPropagation();
                  // Append to the next null slot (which is `populatedCount`).
                  handlePhotoArrayUpload(block.id, rowIdx, populatedCount);
                });
                actions.appendChild(addBtn);
              }

              if (showDelBtn) {
                const del = document.createElement("button");
                del.type = "button";
                del.className = "photoarray-row-delete";
                del.title = "Delete this row";
                del.textContent = "Delete Row";
                del.addEventListener("mousedown", (e) => e.preventDefault());
                del.addEventListener("click", (e) => {
                  e.stopPropagation();
                  removePhotoArrayRow(block.id, rowIdx);
                });
                actions.appendChild(del);
              }

              rowWrap.appendChild(actions);
            }

            el.appendChild(rowWrap);
          });

          // Add-row button (no-print)
          const addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "photoarray-add-row no-print";
          addBtn.textContent = "+ Row";
          addBtn.title = "Add a new row of photos";
          addBtn.addEventListener("mousedown", (e) => e.preventDefault());
          addBtn.addEventListener("click", () => addPhotoArrayRow(block.id));
          el.appendChild(addBtn);

          return el;
        }

        function buildPhotoArrayCell(blockId, rowIdx, colIdx, entry) {
          // entry is either null (placeholder cell) or { src, caption }.
          const imgDataUrl = entry && entry.src ? entry.src : null;
          const captionText =
            entry && typeof entry.caption === "string" ? entry.caption : "";

          const cell = document.createElement("div");
          cell.className = "photoarray-cell" + (imgDataUrl ? " has-image" : "");
          cell.title = imgDataUrl
            ? "Click to replace this image"
            : "Click or drop an image";
          cell.tabIndex = 0; // make focusable so render() can focus it after insert

          cell.addEventListener("click", (e) => {
            // Clicks on the clear button or the caption input shouldn't trigger
            // the upload picker - let those handlers run on their own.
            if (e.target.closest(".clear-btn")) return;
            if (e.target.closest(".photoarray-caption")) return;
            handlePhotoArrayUpload(blockId, rowIdx, colIdx);
          });
          // Keyboard activation: Enter or Space opens the upload picker
          cell.addEventListener("keydown", (e) => {
            // Caption input handles its own keys; don't hijack them
            if (e.target.closest(".photoarray-caption")) return;
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              handlePhotoArrayUpload(blockId, rowIdx, colIdx);
            }
          });
          attachDropTarget(cell, async (file) => {
            try {
              const dataUrl = await loadStepImageFile(file);
              const b = findBlockById(blockId);
              if (b && b.type === "photoarray" && b.rows[rowIdx]) {
                // Preserve any caption already on this cell when replacing the image.
                const existing = b.rows[rowIdx][colIdx];
                const keepCaption =
                  existing &&
                  typeof existing === "object" &&
                  typeof existing.caption === "string"
                    ? existing.caption
                    : "";
                b.rows[rowIdx][colIdx] = { src: dataUrl, caption: keepCaption };
                b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
                saveState();
                render();
              }
            } catch (err) {
              alert("Could not load image: " + err.message);
            }
          });

          if (imgDataUrl) {
            // Image area takes the upper portion of the cell.
            const imgArea = document.createElement("div");
            imgArea.className = "photoarray-cell-image";

            const img = document.createElement("img");
            img.src = imgDataUrl;
            img.alt = "Photo";
            imgArea.appendChild(img);
            imgArea.appendChild(
              buildClearButton("Remove image", (e) => {
                e.stopPropagation();
                const b = findBlockById(blockId);
                if (b && b.type === "photoarray" && b.rows[rowIdx]) {
                  // Removing the image discards the caption too - they belong to the
                  // same cell. If you want to keep the caption, edit the image instead.
                  b.rows[rowIdx][colIdx] = null;
                  b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
                  saveState();
                  render();
                }
              }),
            );
            cell.appendChild(imgArea);

            // Caption input below the image. Single-line text only.
            const cap = document.createElement("input");
            cap.type = "text";
            cap.className = "photoarray-caption";
            cap.placeholder = "Caption";
            cap.value = captionText;
            cap.maxLength = 200;
            cap.addEventListener("mousedown", (e) => e.stopPropagation());
            cap.addEventListener("click", (e) => e.stopPropagation());
            cap.addEventListener("input", () => {
              const b = findBlockById(blockId);
              if (
                b &&
                b.type === "photoarray" &&
                b.rows[rowIdx] &&
                b.rows[rowIdx][colIdx]
              ) {
                b.rows[rowIdx][colIdx].caption = cap.value;
                saveState();
                // No render() here - the caption text is already in the input;
                // re-rendering would steal focus and lose the cursor position.
              }
            });
            cell.appendChild(cap);
          } else {
            const ph = document.createElement("div");
            ph.className = "placeholder";
            ph.innerHTML =
              "Click to upload<br><small>or drag &amp; drop</small>";
            cell.appendChild(ph);
          }
          return cell;
        }

        async function handlePhotoArrayUpload(blockId, rowIdx, colIdx) {
          const file = await pickFile("image/*");
          if (!file) return;
          try {
            const dataUrl = await loadStepImageFile(file);
            const b = findBlockById(blockId);
            if (b && b.type === "photoarray" && b.rows[rowIdx]) {
              // Preserve any caption already on this cell when replacing the image.
              const existing = b.rows[rowIdx][colIdx];
              const keepCaption =
                existing &&
                typeof existing === "object" &&
                typeof existing.caption === "string"
                  ? existing.caption
                  : "";
              b.rows[rowIdx][colIdx] = { src: dataUrl, caption: keepCaption };
              // Re-compact in case caller pointed at a slot past the populated run
              // (e.g. the "+" button passes populatedCount as the index).
              b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
              saveState();
              render();
            }
          } catch (err) {
            alert("Could not load image: " + err.message);
          }
        }

        function addPhotoArrayRow(blockId) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "photoarray") return;
          b.rows.push([null, null, null]);
          saveState();
          render();
        }

        function removePhotoArrayRow(blockId, rowIdx) {
          const b = findBlockById(blockId);
          if (!b || b.type !== "photoarray") return;
          if (b.rows.length <= 1) return;
          if (rowIdx < 0 || rowIdx >= b.rows.length) return;
          const hasData =
            b.rows[rowIdx][0] || b.rows[rowIdx][1] || b.rows[rowIdx][2];
          if (hasData && !confirm("Delete this row? Photos will be lost."))
            return;
          b.rows.splice(rowIdx, 1);
          saveState();
          render();
        }

        // ---------- Text box element ----------
        function buildTextBoxElement(block) {
          const el = document.createElement("div");
          el.className = "textbox-block";
          el.dataset.blockId = block.id;

          el.appendChild(buildBlockControls(block));

          const text = document.createElement("div");
          text.className = "textbox-text rich-text-editor";
          text.contentEditable = "true";
          text.dataset.placeholder = "Type text here...";
          text.spellcheck = true;
          text.innerHTML = block.text || "";
          text.dataset.blockId = block.id;
          text.addEventListener("input", () => {
            const b = findBlockById(block.id);
            if (b) {
              b.text = text.innerHTML;
              saveState();
            }
          });
          text.addEventListener("blur", () => {
            const b = findBlockById(block.id);
            if (!b) return;
            if (text.innerHTML === "<br>" || text.textContent.trim() === "") {
              text.innerHTML = "";
              b.text = "";
              saveState();
            }
            // Re-paginate so a multi-line text box correctly reflows.
            setTimeout(() => render(), 0);
          });
          el.appendChild(text);

          return el;
        }

        function buildSectionElement(block) {
          const el = document.createElement("div");
          el.className = "section-header";
          el.dataset.blockId = block.id;

          const text = document.createElement("div");
          text.className = "section-header-text rich-text-editor";
          text.contentEditable = "true";
          text.dataset.placeholder = "Section title";
          text.spellcheck = true;
          text.innerHTML = block.text || "";
          text.dataset.blockId = block.id;
          // Single-line: block newline insertion
          text.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              text.blur();
            }
          });
          // Strip newlines/formatting from pasted content
          text.addEventListener("paste", (e) => {
            e.preventDefault();
            const cd = e.clipboardData || window.clipboardData;
            if (!cd) return;
            const raw = cd.getData("text/plain") || "";
            const flat = raw
              .replace(/[\r\n\t]+/g, " ")
              .replace(/\s+/g, " ")
              .trim();
            if (flat) {
              document.execCommand("insertText", false, flat);
            }
          });
          text.addEventListener("input", () => {
            const b = findBlockById(block.id);
            if (b) {
              b.text = text.innerHTML;
              saveState();
            }
          });
          text.addEventListener("blur", () => {
            if (text.innerHTML === "<br>" || text.textContent.trim() === "") {
              text.innerHTML = "";
              const b = findBlockById(block.id);
              if (b) {
                b.text = "";
                saveState();
              }
            }
          });
          el.appendChild(text);

          el.appendChild(buildBlockControls(block));

          return el;
        }

        function buildCalloutElement(block) {
          const meta = CALLOUT_KINDS[block.kind] || CALLOUT_KINDS.note;
          const el = document.createElement("div");
          el.className =
            "callout callout-" +
            (CALLOUT_KINDS[block.kind] ? block.kind : "note");
          el.dataset.blockId = block.id;

          const badge = document.createElement("div");
          badge.className = "callout-badge";
          badge.textContent = meta.label;
          el.appendChild(badge);

          const text = document.createElement("div");
          text.className = "callout-text rich-text-editor";
          text.contentEditable = "true";
          text.dataset.placeholder =
            "Type " + meta.label.toLowerCase() + " text here...";
          text.spellcheck = true;
          text.innerHTML = block.text || "";
          text.dataset.blockId = block.id;
          // Strip rich formatting from pasted content but preserve newlines
          text.addEventListener("paste", (e) => {
            e.preventDefault();
            const cd = e.clipboardData || window.clipboardData;
            if (!cd) return;
            const raw = cd.getData("text/plain") || "";
            if (raw) {
              document.execCommand("insertText", false, raw);
            }
          });
          text.addEventListener("input", () => {
            const b = findBlockById(block.id);
            if (b) {
              b.text = text.innerHTML;
              saveState();
            }
          });
          text.addEventListener("blur", () => {
            // Browsers leave a stray <br> when the field is fully cleared; reset
            // so the placeholder reappears.
            const b = findBlockById(block.id);
            if (!b) return;
            if (text.innerHTML === "<br>" || text.textContent.trim() === "") {
              b.text = "";
              saveState();
            }
            // Defer the re-render so removing the focused element doesn't disrupt
            // the current event loop. This recomputes pagination based on the new
            // (possibly multi-line) callout height.
            setTimeout(() => render(), 0);
          });
          el.appendChild(text);

          el.appendChild(buildBlockControls(block));

          return el;
        }

        function buildBlockControls(block) {
          const wrap = document.createElement("div");
          wrap.className = "block-controls no-print";

          const upBtn = document.createElement("button");
          upBtn.textContent = "\u2191";
          upBtn.title = "Move up";
          upBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            moveBlock(block.id, -1);
          });

          const downBtn = document.createElement("button");
          downBtn.textContent = "\u2193";
          downBtn.title = "Move down";
          downBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            moveBlock(block.id, +1);
          });

          const delBtn = document.createElement("button");
          delBtn.textContent = "\u2715";
          delBtn.title = "Delete";
          delBtn.className = "delete";
          delBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteBlock(block.id);
          });

          wrap.appendChild(upBtn);
          wrap.appendChild(downBtn);
          wrap.appendChild(delBtn);
          return wrap;
        }

        function buildClearButton(title, onClick) {
          const btn = document.createElement("button");
          btn.className = "clear-btn no-print";
          btn.textContent = "\u2715";
          btn.title = title;
          btn.addEventListener("click", onClick);
          return btn;
        }

        function attachDropTarget(el, fileHandler) {
          el.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            el.classList.add("dragover");
          });
          el.addEventListener("dragleave", () => {
            el.classList.remove("dragover");
          });
          el.addEventListener("drop", (e) => {
            e.preventDefault();
            el.classList.remove("dragover");
            const file =
              e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
            if (!file) return;
            if (!file.type.startsWith("image/")) {
              alert("Please drop an image file.");
              return;
            }
            fileHandler(file);
          });
        }

        // ---------- Upload handlers ----------
        async function handleLogoUpload() {
          const file = await pickFile("image/*");
          if (!file) return;
          try {
            state.logo = await loadLogoFile(file);
            saveState();
            render();
          } catch (err) {
            alert("Could not load logo: " + err.message);
          }
        }

        async function handleStepImageUpload(blockId) {
          const file = await pickFile("image/*");
          if (!file) return;
          try {
            const dataUrl = await loadStepImageFile(file);
            const b = findBlockById(blockId);
            if (b) {
              b.img = dataUrl;
              saveState();
              render();
            }
          } catch (err) {
            alert("Could not load image: " + err.message);
          }
        }

        // ---------- Block operations ----------
        function moveBlock(id, dir) {
          const idx = findBlockIndex(id);
          if (idx < 0) return;
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= state.blocks.length) return;
          const removed = state.blocks.splice(idx, 1)[0];
          state.blocks.splice(newIdx, 0, removed);
          saveState();
          focusBlockIdAfterRender = id;
          render();
        }

        function deleteBlock(id) {
          const block = findBlockById(id);
          if (!block) return;
          let hasContent = false;
          if (block.type === "step") {
            hasContent = !!(block.img || (block.text && block.text.trim()));
          } else if (block.type === "callout") {
            hasContent = !!(block.text && block.text.trim());
          } else if (block.type === "section") {
            hasContent = !!(block.text && block.text.trim());
          } else if (block.type === "parts") {
            hasContent =
              Array.isArray(block.rows) &&
              block.rows.some(
                (r) => Array.isArray(r) && r.some((c) => c && c.trim()),
              );
          } else if (block.type === "photoarray") {
            hasContent =
              Array.isArray(block.rows) &&
              block.rows.some((r) => Array.isArray(r) && r.some((c) => !!c));
          } else if (block.type === "textbox") {
            hasContent = !!(
              block.text && block.text.replace(/<[^>]*>/g, "").trim()
            );
          }
          if (hasContent) {
            let label;
            if (block.type === "callout") {
              label =
                (CALLOUT_KINDS[block.kind]
                  ? CALLOUT_KINDS[block.kind].label
                  : "callout"
                ).toLowerCase() + " callout";
            } else if (block.type === "section") {
              label = "section header";
            } else if (block.type === "parts") {
              label = "parts list";
            } else if (block.type === "photoarray") {
              label = "photo array";
            } else if (block.type === "textbox") {
              label = "text box";
            } else {
              label = "step";
            }
            if (!confirm("Delete this " + label + "?")) return;
          }
          state.blocks = state.blocks.filter((b) => b.id !== id);
          if (lastFocusedBlockId === id) {
            lastFocusedBlockId = null;
            lastFocusedEditable = null;
          }
          saveState();
          render();
        }

        function insertBlockAfter(referenceId, newBlock) {
          const idx = referenceId ? findBlockIndex(referenceId) : -1;
          if (idx < 0) {
            state.blocks.push(newBlock);
          } else {
            state.blocks.splice(idx + 1, 0, newBlock);
          }
          saveState();
          focusBlockIdAfterRender = newBlock.id;
          // Collapse the hamburger menu so the user can immediately interact with
          // the new block. We don't persist this — if they explicitly opened the
          // menu, they may want it open again on next reload.
          setSidebarCollapsed(true, false);
          render();
        }

        function addStep() {
          insertBlockAfter(lastFocusedBlockId, createStepBlock());
        }

        function addCallout(kind) {
          if (!CALLOUT_KINDS[kind]) {
            console.warn("Unknown callout kind:", kind);
            return;
          }
          insertBlockAfter(lastFocusedBlockId, createCalloutBlock(kind));
        }

        function addSection() {
          insertBlockAfter(lastFocusedBlockId, createSectionBlock());
        }

        function addParts() {
          insertBlockAfter(lastFocusedBlockId, createPartsBlock());
        }

        function addPhotoArray() {
          insertBlockAfter(lastFocusedBlockId, createPhotoArrayBlock());
        }

        function addTextBox() {
          insertBlockAfter(lastFocusedBlockId, createTextBoxBlock());
        }

        // ---------- Document-level operations ----------
        function newDocument() {
          if (
            !confirm(
              "Clear ALL content and start a fresh document?\n\n(The logo will be kept.)",
            )
          )
            return;
          const savedLogo = state.logo;
          state = createEmptyState();
          state.logo = savedLogo;
          lastFocusedBlockId = null;
          lastFocusedEditable = null;
          saveState();
          render();
        }

        // ---------- Export / Import ----------
        function exportTemplate() {
          try {
            const json = JSON.stringify(state, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            const safeName =
              (state.title || "work_instruction")
                .replace(/[^a-z0-9_.-]/gi, "_")
                .slice(0, 60) || "work_instruction";
            a.href = url;
            a.download = safeName + ".json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          } catch (e) {
            alert("Save failed: " + e.message);
          }
        }

        async function importTemplate() {
          const file = await pickFile(".json,application/json");
          if (!file) return;
          const reader = new FileReader();
          reader.onerror = () => alert("Failed to read file.");
          reader.onload = () => {
            try {
              const parsed = JSON.parse(reader.result);
              let next = parsed;
              // If it's a legacy file, migrate.
              if (!Array.isArray(parsed.blocks)) {
                next = migrateLegacyState(parsed);
              }
              if (!next || !Array.isArray(next.blocks)) {
                throw new Error("File does not contain valid template data.");
              }
              if (!confirm("Replace current document with the loaded file?"))
                return;
              state = normalizeState(next);
              lastFocusedBlockId = null;
              lastFocusedEditable = null;
              saveState();
              render();
            } catch (err) {
              alert("Could not load file: " + err.message);
            }
          };
          reader.readAsText(file);
        }

        // ---------- Toolbar wiring ----------
        const ICON_HTML = {
          warning: '<span class="wi-icon wi-warning">\u26A0 WARNING</span>',
          caution: '<span class="wi-icon wi-caution">\u26A0 CAUTION</span>',
          inspect: '<span class="wi-icon wi-inspect">\u25C9 INSPECT</span>',
          torque: '<span class="wi-icon wi-torque">\u2699 TORQUE</span>',
        };

        function setupFocusTracking() {
          document.addEventListener("focusin", (e) => {
            const el = e.target;
            if (
              el &&
              el.classList &&
              el.classList.contains("rich-text-editor")
            ) {
              lastFocusedEditable = el;
              lastFocusedBlockId = el.dataset.blockId || null;
            }
          });
        }

        function setupBlockToolbar() {
          document.querySelectorAll(".sidebar [data-add]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const kind = btn.dataset.add;
              if (kind === "step") {
                addStep();
              } else if (kind === "callout") {
                addCallout(btn.dataset.kind);
              } else if (kind === "section") {
                addSection();
              } else if (kind === "parts") {
                addParts();
              } else if (kind === "photoarray") {
                addPhotoArray();
              } else if (kind === "textbox") {
                addTextBox();
              }
            });
          });
        }

        function setupFormatToolbar() {
          // Prevent the format buttons from stealing focus from the editor.
          // Scope: only the format-related controls in the sidebar (not the block insert buttons).
          const fmtSelectors = ".sidebar [data-cmd], .sidebar [data-icon]";
          document.querySelectorAll(fmtSelectors).forEach((btn) => {
            btn.addEventListener("mousedown", (e) => e.preventDefault());
          });

          document.querySelectorAll(".sidebar [data-cmd]").forEach((btn) => {
            btn.addEventListener("click", () => {
              applyFormat(btn.dataset.cmd, btn.dataset.arg || null);
            });
          });

          document.querySelectorAll(".sidebar [data-icon]").forEach((btn) => {
            btn.addEventListener("click", () => {
              insertIcon(btn.dataset.icon);
            });
          });
        }

        // ---------- Sidebar collapse / expand (hamburger menu) ----------
        // Bumped to v4 since the prior key persisted "open" defaults that no longer
        // make sense for the hamburger model (we want it default-closed everywhere).
        const SIDEBAR_STATE_KEY = "workInstructionBuilder_v4_sidebar";

        function setSidebarCollapsed(collapsed, persist) {
          document.body.classList.toggle("sidebar-collapsed", !!collapsed);
          const hamburgerBtn = document.getElementById("hamburgerBtn");
          const collapseBtn = document.getElementById("sidebarCollapseBtn");
          if (hamburgerBtn) {
            hamburgerBtn.setAttribute(
              "aria-expanded",
              collapsed ? "false" : "true",
            );
            hamburgerBtn.title = collapsed ? "Open menu" : "Close menu";
          }
          if (collapseBtn) {
            collapseBtn.setAttribute(
              "aria-expanded",
              collapsed ? "false" : "true",
            );
          }
          if (persist) {
            try {
              localStorage.setItem(
                SIDEBAR_STATE_KEY,
                collapsed ? "collapsed" : "open",
              );
            } catch (e) {
              // Ignore storage errors (private mode, quota, etc.) - the UI still works.
            }
          }
        }

        function toggleSidebar() {
          const isCollapsed =
            document.body.classList.contains("sidebar-collapsed");
          setSidebarCollapsed(!isCollapsed, true);
        }

        function setupSidebarToggle() {
          const hamburgerBtn = document.getElementById("hamburgerBtn");
          const collapseBtn = document.getElementById("sidebarCollapseBtn");
          const backdrop = document.getElementById("sidebarBackdrop");

          if (hamburgerBtn) {
            hamburgerBtn.addEventListener("click", toggleSidebar);
          }
          if (collapseBtn) {
            collapseBtn.addEventListener("click", () =>
              setSidebarCollapsed(true, true),
            );
          }
          // Backdrop click closes the menu (hamburger UX standard)
          if (backdrop) {
            backdrop.addEventListener("click", () =>
              setSidebarCollapsed(true, true),
            );
          }
          // Esc closes the menu when it's open
          document.addEventListener("keydown", (e) => {
            if (
              e.key === "Escape" &&
              !document.body.classList.contains("sidebar-collapsed")
            ) {
              setSidebarCollapsed(true, true);
            }
          });

          // Always default to closed for the hamburger model. Persisted "open" only
          // restores within the same session (closes again on next reload).
          setSidebarCollapsed(true, false);
        }

        function isMobileViewport() {
          return (
            window.matchMedia && window.matchMedia("(max-width: 900px)").matches
          );
        }

        // ---------- Mobile page-scale ----------
        // Compute and apply a CSS scale so the 8.5in printed page fits within the
        // current viewport width. The underlying layout stays at print dimensions.
        function updatePageScale() {
          const root = document.documentElement;
          if (!isMobileViewport()) {
            root.style.setProperty("--page-scale", "1");
            root.style.setProperty("--page-margin-fix", "0px");
            return;
          }
          // 8.5in at 96dpi = 816px. Subtract a small horizontal padding for breathing room.
          const PAGE_WIDTH_PX = 816;
          const available = Math.max(280, window.innerWidth - 16);
          const scale = Math.min(1, available / PAGE_WIDTH_PX);
          root.style.setProperty("--page-scale", scale.toFixed(4));
          // Because we use transform: scale(), the element still occupies full
          // unscaled height in the document flow. Compensate so subsequent pages
          // don't have huge empty gaps below them.
          // 11in at 96dpi = 1056px. Empty space below scaled page = 1056 * (1 - scale).
          const PAGE_HEIGHT_PX = 1056;
          const negativeMargin = -PAGE_HEIGHT_PX * (1 - scale);
          root.style.setProperty(
            "--page-margin-fix",
            negativeMargin.toFixed(0) + "px",
          );
        }

        function applyFormat(cmd, arg) {
          if (!lastFocusedEditable) {
            showToast("Click into a text area first");
            return;
          }
          try {
            lastFocusedEditable.focus();
            // styleWithCSS=true emits inline CSS instead of deprecated <font> tags.
            document.execCommand("styleWithCSS", false, true);
            document.execCommand(cmd, false, arg);
            const evt = new Event("input", { bubbles: true });
            lastFocusedEditable.dispatchEvent(evt);
          } catch (err) {
            console.warn("Format command failed:", cmd, err);
          }
        }

        function insertIcon(type) {
          const html = ICON_HTML[type];
          if (!html) return;
          if (!lastFocusedEditable) {
            showToast("Click into a text area first");
            return;
          }
          try {
            lastFocusedEditable.focus();
            document.execCommand("insertHTML", false, html + "&nbsp;");
            const evt = new Event("input", { bubbles: true });
            lastFocusedEditable.dispatchEvent(evt);
          } catch (err) {
            console.warn("Icon insert failed:", type, err);
          }
        }

        // ---------- Toast ----------
        let toastTimer = null;
        function showToast(msg) {
          const t = document.getElementById("toast");
          if (!t) return;
          t.textContent = msg;
          t.classList.add("show");
          if (toastTimer) clearTimeout(toastTimer);
          toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
        }

        // ---------- Init ----------
        window.exportTemplate = exportTemplate;
        window.importTemplate = importTemplate;
        window.newDocument = newDocument;

        document.addEventListener("DOMContentLoaded", () => {
          loadState();
          render();
          setupFocusTracking();
          setupBlockToolbar();
          setupFormatToolbar();
          setupSidebarToggle();
          updatePageScale();
        });

        // Recompute scale on resize / orientation change.
        let _resizeTimer = null;
        window.addEventListener("resize", () => {
          if (_resizeTimer) clearTimeout(_resizeTimer);
          _resizeTimer = setTimeout(() => {
            updatePageScale();
          }, 120);
        });
        window.addEventListener("orientationchange", () => {
          setTimeout(updatePageScale, 200);
        });
      })();
    </script>
  </body>
</html>
