    }
  }

  // ---------- Block operations ----------
  function moveBlock(id, dir) {
    const idx = findBlockIndex(id);
    if (idx < 0) return;
    const block = state.blocks[idx];

    if (dir === +1) {
      const newIdx = idx + 1;
      if (newIdx >= state.blocks.length) {
        // No block below to swap with. Push this block down by one
        // block-height of empty space (a "spacer"). Each repeated click
        // adds another spacer; once the cumulative gap pushes the block
        // past the page boundary, pagination naturally moves it onto the
        // next page. There's no upper cap - if the user wants to stack a
        // dozen spacers and walk the block across multiple pages, that's
        // allowed.
        block.precedingSpacers = (block.precedingSpacers | 0) + 1;
        saveState();
        focusBlockIdAfterRender = id;
        render();
        return;
      }
      const removed = state.blocks.splice(idx, 1)[0];
      state.blocks.splice(newIdx, 0, removed);
    } else if (dir === -1) {
      // Up arrow: peel off any spacers above this block first (they're
      // "yours" - you put them there with previous down clicks). Only after
      // the spacers are gone does up arrow fall through to the array swap.
      if ((block.precedingSpacers | 0) > 0) {
        block.precedingSpacers = (block.precedingSpacers | 0) - 1;
        saveState();
        focusBlockIdAfterRender = id;
        render();
        return;
      }
      const newIdx = idx - 1;
      if (newIdx < 0) return;
      const removed = state.blocks.splice(idx, 1)[0];
      state.blocks.splice(newIdx, 0, removed);
    } else {
      return;
    }

    saveState();
    focusBlockIdAfterRender = id;
    render();
  }

  function deleteBlock(id) {
    const block = findBlockById(id);
    if (!block) return;
    let hasContent = false;
    if (block.type === 'step') {
      hasContent = !!(block.img || (block.text && block.text.trim()));
    } else if (block.type === 'callout') {
      hasContent = !!(block.text && block.text.trim());
    } else if (block.type === 'section') {
      hasContent = !!(block.text && block.text.trim());
    } else if (block.type === 'parts') {
      hasContent = Array.isArray(block.rows) &&
        block.rows.some(r => Array.isArray(r) && r.some(c => c && c.trim()));
    } else if (block.type === 'photoarray') {
      hasContent = Array.isArray(block.rows) &&
        block.rows.some(r => Array.isArray(r) && r.some(c => !!c));
    } else if (block.type === 'textbox') {
      hasContent = !!(block.text && block.text.replace(/<[^>]*>/g, '').trim());
    }
    if (hasContent) {
      let label;
      if (block.type === 'callout') {
        label = (CALLOUT_KINDS[block.kind] ? CALLOUT_KINDS[block.kind].label : 'callout').toLowerCase() + ' callout';
      } else if (block.type === 'section') {
        label = 'section header';
      } else if (block.type === 'parts') {
        label = 'parts list';
      } else if (block.type === 'photoarray') {
        label = 'photo array';
      } else if (block.type === 'textbox') {
        label = 'text box';
      } else {
        label = 'step';
      }
      if (!confirm('Delete this ' + label + '?')) return;
    }
    state.blocks = state.blocks.filter(b => b.id !== id);
    if (lastFocusedBlockId === id) {
      lastFocusedBlockId = null;
      lastFocusedEditable = null;
    }
    saveState();
    render();
  }

  function insertBlockAfter(referenceId, newBlock) {
    const idx = referenceId ? findBlockIndex(referenceId) : -1;
    if (idx < 0) {
      state.blocks.push(newBlock);
    } else {
      state.blocks.splice(idx + 1, 0, newBlock);
    }
    saveState();
    focusBlockIdAfterRender = newBlock.id;
    render();
  }

  function addStep() {
    // null reference -> insertBlockAfter pushes to the end of state.blocks.
    // Behaviour the user expects: every new block lands at the bottom of
    // the document, never spliced into the middle just because a different
    // block had focus earlier.
    insertBlockAfter(null, createStepBlock());
  }

  function addCallout(kind) {
    if (!CALLOUT_KINDS[kind]) {
      console.warn('Unknown callout kind:', kind);
      return;
    }
    insertBlockAfter(null, createCalloutBlock(kind));
  }

  function addSection() {
    insertBlockAfter(null, createSectionBlock());
  }

  function addParts() {
    insertBlockAfter(null, createPartsBlock());
  }

  function addPhotoArray() {
    insertBlockAfter(null, createPhotoArrayBlock());
  }

  function addTextBox() {
    insertBlockAfter(null, createTextBoxBlock());
  }

  // ---------- Document-level operations ----------
  function newDocument() {
    if (!confirm('Clear ALL content and start a fresh document?\n\n(The logo will be kept.)')) return;
    const savedLogo = state.logo;
    state = createEmptyState();
    state.logo = savedLogo;
    lastFocusedBlockId = null;
    lastFocusedEditable = null;
    saveState();
    render();
  }

  // ---------- Export / Import ----------
  function exportTemplate() {
    try {
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const safeName = (state.title || 'work_instruction')
        .replace(/[^a-z0-9_.-]/gi, '_')
        .slice(0, 60) || 'work_instruction';
      a.href = url;
      a.download = safeName + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      alert('Save failed: ' + e.message);
    }
  }

  async function importTemplate() {
    const file = await pickFile('.json,application/json');
    if (!file) return;
    const reader = new FileReader();
    reader.onerror = () => alert('Failed to read file.');
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        let next = parsed;
        // If it's a legacy file, migrate.
        if (!Array.isArray(parsed.blocks)) {
          next = migrateLegacyState(parsed);
        }
        if (!next || !Array.isArray(next.blocks)) {
          throw new Error('File does not contain valid template data.');
        }
        if (!confirm('Replace current document with the loaded file?')) return;
        state = normalizeState(next);
        lastFocusedBlockId = null;
        lastFocusedEditable = null;
        saveState();
        render();
      } catch (err) {
        alert('Could not load file: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ---------- Toolbar wiring ----------
  // contenteditable="false" on each badge tells the browser to treat the
  // whole span as a single atomic unit inside the parent rich-text editor.
  // Combined with the click-to-select handler installed by
  // setupInlineIconRemoval(), this lets the user click the badge and press
  // Delete/Backspace once to remove it cleanly (previously backspace ate one
  // character of the badge label at a time, leaving an empty span behind).
  const ICON_HTML = {
    warning: '<span class="wi-icon wi-warning" contenteditable="false">\u26A0 WARNING</span>',
    caution: '<span class="wi-icon wi-caution" contenteditable="false">\u26A0 CAUTION</span>',
    inspect: '<span class="wi-icon wi-inspect" contenteditable="false">\u25C9 INSPECT</span>',
    torque:  '<span class="wi-icon wi-torque"  contenteditable="false">\u2699 TORQUE</span>'
  };

  function setupFocusTracking() {
    document.addEventListener('focusin', (e) => {
      const el = e.target;
      if (el && el.classList && el.classList.contains('rich-text-editor')) {
        lastFocusedEditable = el;
        lastFocusedBlockId = el.dataset.blockId || null;
      }
    });
  }

  // Make inline icon badges (.wi-icon) clickable for removal. A click on a
  // badge selects the entire span as a DOM range so pressing Delete or
  // Backspace removes it in one keystroke instead of nibbling its label.
  // Also normalizes any legacy badges still in the saved document that
  // were inserted before contenteditable="false" was added to ICON_HTML.
  function setupInlineIconRemoval() {
    document.addEventListener('click', (e) => {
      const icon = e.target && e.target.closest && e.target.closest('.wi-icon');
      if (!icon) return;
      // The badge must live inside one of our rich-text editors - using
      // the class avoids relying on contenteditable attribute reflection
      // (which jsdom doesn't propagate from the property setter).
      const editable = icon.closest('.rich-text-editor');
      if (!editable) return;
      // Upgrade legacy badges that don't have the attribute yet so future
      // interactions also treat them as atomic.
      if (icon.getAttribute('contenteditable') !== 'false') {
        icon.setAttribute('contenteditable', 'false');
      }
      try {
        // Focus FIRST, then set the selection. Reversing the order would
        // cause the focus() call to collapse the range we just added.
        editable.focus();
        const range = document.createRange();
        range.selectNode(icon);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      } catch (err) {
        console.warn('Could not select inline icon for removal:', err);
      }
    });
  }

  function setupBlockToolbar() {
    document.querySelectorAll('.sidebar [data-add]').forEach(btn => {
      btn.addEventListener('click', () => {
        const kind = btn.dataset.add;
        if (kind === 'step') {
          addStep();
        } else if (kind === 'callout') {
          addCallout(btn.dataset.kind);
        } else if (kind === 'section') {
          addSection();
        } else if (kind === 'parts') {
          addParts();
        } else if (kind === 'photoarray') {
          addPhotoArray();
        } else if (kind === 'textbox') {
          addTextBox();
        }
      });
    });
  }

  function setupFormatToolbar() {
    // Prevent the format buttons from stealing focus from the editor.
    // Scope: format-related controls in either the sidebar or the floating
    // popup toolbar (both carry data-cmd / data-icon attributes).
    const fmtSelectors = '.sidebar [data-cmd], .sidebar [data-icon],' +
                         ' .floating-fmt-toolbar [data-cmd], .floating-fmt-toolbar [data-icon]';
    document.querySelectorAll(fmtSelectors).forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
    });

    document.querySelectorAll(
      '.sidebar [data-cmd], .floating-fmt-toolbar [data-cmd]'
    ).forEach(btn => {
      btn.addEventListener('click', () => {
        applyFormat(btn.dataset.cmd, btn.dataset.arg || null);
      });
    });

    document.querySelectorAll(
      '.sidebar [data-icon], .floating-fmt-toolbar [data-icon]'
    ).forEach(btn => {
      btn.addEventListener('click', () => {
        insertIcon(btn.dataset.icon);
      });
    });
  }

  // Show the floating format toolbar whenever a rich-text editor has focus,
  // hide it when focus moves outside both the toolbar and any editor. This
  // avoids the user having to open the hamburger menu to apply formatting.
  function setupFloatingFormatToolbar() {
    const toolbar = document.getElementById('floatingFormatToolbar');
    if (!toolbar) return;

    const isEditable = (el) =>
      el && el.classList && el.classList.contains('rich-text-editor');

    const showToolbar = () => { toolbar.hidden = false; };
    const hideToolbar = () => { toolbar.hidden = true; };

    document.addEventListener('focusin', (e) => {
      if (isEditable(e.target)) showToolbar();
    });

    // focusout fires before the next focusin. Defer the active-element check
    // so we see where focus landed - if it's another editable or inside the
    // toolbar itself, keep the toolbar visible.
    document.addEventListener('focusout', () => {
      setTimeout(() => {
        const a = document.activeElement;
        if (isEditable(a)) return;
        if (a && toolbar.contains(a)) return;
        hideToolbar();
      }, 0);
    });

    // Click anywhere outside the toolbar AND outside any editor closes it.
    // Covers the case where the user taps a non-focusable region (like a
    // page background) where focusout might not fire reliably on all
    // browsers.
    document.addEventListener('mousedown', (e) => {
      if (toolbar.hidden) return;
      const t = e.target;
      if (toolbar.contains(t)) return;
      if (t && t.closest && t.closest('.rich-text-editor')) return;
      hideToolbar();
    });
  }

  // ---------- Sidebar collapse / expand (hamburger menu) ----------
  // Bumped to v4 since the prior key persisted "open" defaults that no longer
  // make sense for the hamburger model (we want it default-closed everywhere).
  const SIDEBAR_STATE_KEY = 'workInstructionBuilder_v4_sidebar';

  function setSidebarCollapsed(collapsed, persist) {
    document.body.classList.toggle('sidebar-collapsed', !!collapsed);
    const hamburgerBtn   = document.getElementById('hamburgerBtn');
    const collapseBtn    = document.getElementById('sidebarCollapseBtn');
    if (hamburgerBtn) {
      hamburgerBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      hamburgerBtn.title = collapsed ? 'Open menu' : 'Close menu';
    }
    if (collapseBtn) {
      collapseBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    }
    if (persist) {
      try {
        localStorage.setItem(SIDEBAR_STATE_KEY, collapsed ? 'collapsed' : 'open');
      } catch (e) {
        // Ignore storage errors (private mode, quota, etc.) - the UI still works.
      }
    }
  }

  function toggleSidebar() {
    const isCollapsed = document.body.classList.contains('sidebar-collapsed');
    setSidebarCollapsed(!isCollapsed, true);
  }

  function setupSidebarToggle() {
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const collapseBtn  = document.getElementById('sidebarCollapseBtn');
    const backdrop     = document.getElementById('sidebarBackdrop');

    if (hamburgerBtn) {
      // preventDefault on mousedown so opening the menu doesn't steal focus
      // (and consequently the selection range) from a contenteditable. Same
      // trick used on the format buttons themselves - this just extends it
      // to the hamburger so the chain "highlight text -> open menu -> click
      // Bold" actually preserves the selection end to end.
      hamburgerBtn.addEventListener('mousedown', (e) => e.preventDefault());
      hamburgerBtn.addEventListener('click', toggleSidebar);
    }
    if (collapseBtn) {
      collapseBtn.addEventListener('mousedown', (e) => e.preventDefault());
      collapseBtn.addEventListener('click', () => setSidebarCollapsed(true, true));
    }
    // Backdrop click closes the menu (hamburger UX standard)
    if (backdrop) {
      backdrop.addEventListener('click', () => setSidebarCollapsed(true, true));
    }
    // Esc closes the menu when it's open
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.body.classList.contains('sidebar-collapsed')) {
        setSidebarCollapsed(true, true);
      }
    });

    // Always default to closed for the hamburger model. Persisted "open" only
    // restores within the same session (closes again on next reload).
    setSidebarCollapsed(true, false);
  }

  function isMobileViewport() {
    return window.matchMedia && window.matchMedia('(max-width: 900px)').matches;
  }

  // ---------- Mobile page-scale ----------
  // Compute and apply a CSS scale so the 8.5in printed page fits within the
  // current viewport width. The underlying layout stays at print dimensions.
  function updatePageScale() {
    const root = document.documentElement;
    if (!isMobileViewport()) {
      root.style.setProperty('--page-scale', '1');
      root.style.setProperty('--page-margin-fix', '0px');
      return;
    }
    // 8.5in at 96dpi = 816px. Subtract a small horizontal padding for breathing room.
    const PAGE_WIDTH_PX = 816;
    const available = Math.max(280, window.innerWidth - 16);
    const scale = Math.min(1, available / PAGE_WIDTH_PX);
    root.style.setProperty('--page-scale', scale.toFixed(4));
    // Because we use transform: scale(), the element still occupies full
    // unscaled height in the document flow. Compensate so subsequent pages
    // don't have huge empty gaps below them.
    // 11in at 96dpi = 1056px. Empty space below scaled page = 1056 * (1 - scale).
    const PAGE_HEIGHT_PX = 1056;
    const negativeMargin = -PAGE_HEIGHT_PX * (1 - scale);
    root.style.setProperty('--page-margin-fix', negativeMargin.toFixed(0) + 'px');
  }

  function applyFormat(cmd, arg) {
    // If the user has a multi-cell drag selection in a Chart (parts) block,
    // apply the format to every selected cell instead of only the focused
    // one. The selection survives the click because the format buttons use
    // mousedown preventDefault.
    if (partsCellSelection.size > 0) {
      let appliedAny = false;
      partsCellSelection.forEach((cells, blockId) => {
        const blockEl = document.querySelector(
          '.parts-block[data-block-id="' + blockId + '"]'
        );
        if (!blockEl) return;
        cells.forEach(key => {
          const [r, c] = key.split('-');
          const cellEl = blockEl.querySelector(
            '.parts-cell[data-parts-row="' + r + '"][data-parts-col="' + c + '"]'
          );
          if (!cellEl) return;
          try {
            // Programmatically select all of the cell's content, then run
            // the same execCommand path so behaviour matches the single-cell
            // case exactly (bold toggling, color spans, etc).
            cellEl.focus();
            const range = document.createRange();
            range.selectNodeContents(cellEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            document.execCommand('styleWithCSS', false, true);
            document.execCommand(cmd, false, arg);
            cellEl.dispatchEvent(new Event('input', { bubbles: true }));
            appliedAny = true;
          } catch (err) {
            console.warn('Multi-cell format failed:', cmd, err);
          }
        });
      });
      if (appliedAny) {
        // Restore the visual highlight - execCommand's selection moves
        // wiped the .parts-cell-selected classes off the <td>s.
        applyPartsSelectionVisual();
        return;
      }
      // Fall through to single-cell path if nothing actually applied.
    }
    if (!lastFocusedEditable) {
      showToast('Click into a text area first');
      return;
    }
    try {
      lastFocusedEditable.focus();
      // styleWithCSS=true emits inline CSS instead of deprecated <font> tags.
      document.execCommand('styleWithCSS', false, true);
      document.execCommand(cmd, false, arg);
      const evt = new Event('input', { bubbles: true });
      lastFocusedEditable.dispatchEvent(evt);
    } catch (err) {
      console.warn('Format command failed:', cmd, err);
    }
  }

  function insertIcon(type) {
    const html = ICON_HTML[type];
    if (!html) return;
    if (!lastFocusedEditable) {
      showToast('Click into a text area first');
      return;
    }
    try {
      lastFocusedEditable.focus();
      document.execCommand('insertHTML', false, html + '&nbsp;');
      const evt = new Event('input', { bubbles: true });
      lastFocusedEditable.dispatchEvent(evt);
    } catch (err) {
      console.warn('Icon insert failed:', type, err);
    }
  }

  // ---------- Color picker ----------
  const COLOR_PRESETS = [
    '#b85c58', '#c07080', '#d49098',
    '#b87550', '#c08560', '#c89070',
    '#b89840', '#c4a860', '#d0bc80',
    '#477060', '#5e8a6a', '#7a9e85',
    '#708c60', '#90a870', '#5a8e90',
    '#6ea0a0', '#4e72a0', '#6888b0',
    '#8898c8', '#826090', '#7870a8',
    '#9888c0', '#a07898'
  ];

  function hideColorPicker() {
    const popup = document.getElementById('colorPickerPopup');
    if (popup) popup.remove();
    document.removeEventListener('click', _colorPickerOutsideClick);
  }

  function _colorPickerOutsideClick(e) {
    const popup = document.getElementById('colorPickerPopup');
    if (popup && !popup.contains(e.target)) hideColorPicker();
  }

  function showColorPicker(block, anchorBtn) {
    hideColorPicker();

    const popup = document.createElement('div');
    popup.id = 'colorPickerPopup';
    popup.className = 'color-picker-popup no-print';

    COLOR_PRESETS.forEach(color => {
      const sw = document.createElement('button');
      sw.className = 'cp-swatch';
      sw.style.background = color;
      sw.title = color;
      if (block.color === color) {
        sw.style.outline = '2px solid var(--navy)';
        sw.style.outlineOffset = '1px';
      }
      sw.addEventListener('mousedown', e => e.preventDefault());
      sw.addEventListener('click', (e) => {
        e.stopPropagation();
        block.color = color;
        saveState();
        hideColorPicker();
        render();
      });
      popup.appendChild(sw);
    });

    // Custom color row
    const row = document.createElement('div');
    row.className = 'cp-row';

    const label = document.createElement('label');
    label.textContent = 'Custom:';

    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = block.color || '#4e72a0';
    colorInput.addEventListener('mousedown', e => e.stopPropagation());
    colorInput.addEventListener('input', () => {
      // Live preview without full re-render
      const blockEl = document.querySelector('[data-block-id="' + block.id + '"]');
      if (blockEl) blockEl.style.setProperty('--callout-color', colorInput.value);
    });
    colorInput.addEventListener('change', () => {
      block.color = colorInput.value;
      saveState();
      hideColorPicker();
      render();
    });

    const resetBtn = document.createElement('button');
    resetBtn.className = 'cp-reset';
    resetBtn.textContent = '✕ Reset';
    resetBtn.title = 'Remove custom color';
    resetBtn.addEventListener('mousedown', e => e.preventDefault());
    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      delete block.color;
      saveState();
      hideColorPicker();
      render();
    });

    row.appendChild(label);
    row.appendChild(colorInput);
    row.appendChild(resetBtn);
    popup.appendChild(row);

    // Position near the button
    const rect = anchorBtn.getBoundingClientRect();
    popup.style.position = 'fixed';
    popup.style.zIndex = '10000';
    // Prefer to align right edge of popup with right edge of button
    const popupWidth = 148; // 6 * 22px + gaps + padding ≈ 148
    let left = rect.right - popupWidth;
    if (left < 4) left = 4;
    popup.style.left = left + 'px';
    popup.style.top = (rect.bottom + 4) + 'px';

    document.body.appendChild(popup);
    setTimeout(() => document.addEventListener('click', _colorPickerOutsideClick), 0);
  }

  // ---------- Drag and Drop ----------
  function endDrag() {
    document.body.classList.remove('is-dragging', 'is-dragging-sidebar', 'is-dragging-block');
    const indicator = document.getElementById('dropIndicator');
    if (indicator) indicator.style.display = 'none';
    document.querySelectorAll('.block-dragging').forEach(el => el.classList.remove('block-dragging'));
    _dragData = null;
    _dragInsertIdx = -1;
  }

  // Given a clientY position over a content-area element, return the index
  // in state.blocks where the dragged block should be inserted.
  function calcDropInsertIdx(contentAreaEl, clientY) {
    const rows = Array.from(contentAreaEl.querySelectorAll('.row[data-row-block-id]'));
    if (rows.length === 0) return state.blocks.length;
    for (let i = 0; i < rows.length; i++) {
      const rect = rows[i].getBoundingClientRect();
      if (clientY < rect.top + rect.height / 2) {
        const blockId = rows[i].dataset.rowBlockId;
        const idx = findBlockIndex(blockId);
        return idx >= 0 ? idx : 0;
      }
    }
    // Below all rows
    const lastId = rows[rows.length - 1].dataset.rowBlockId;
    const lastIdx = findBlockIndex(lastId);
    return lastIdx >= 0 ? lastIdx + 1 : state.blocks.length;
  }

  // Position the floating drop indicator line.
  function positionDropIndicator(contentAreaEl, clientY) {
    const indicator = document.getElementById('dropIndicator');
    if (!indicator) return;
    const rows = Array.from(contentAreaEl.querySelectorAll('.row[data-row-block-id]'));
    const pageEl = contentAreaEl.closest('.page');
    const pageRect = pageEl ? pageEl.getBoundingClientRect() : contentAreaEl.getBoundingClientRect();
    let insertY;
    if (rows.length === 0) {
      insertY = contentAreaEl.getBoundingClientRect().top + 10;
    } else {
      let found = false;
      for (let i = 0; i < rows.length; i++) {
        const rect = rows[i].getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          insertY = rect.top - 2;
          found = true;
          break;
        }
      }
      if (!found) {
        const lastRect = rows[rows.length - 1].getBoundingClientRect();
        insertY = lastRect.bottom + 2;
      }
    }
    indicator.style.display = 'block';
    indicator.style.top = insertY + 'px';
    indicator.style.left = pageRect.left + 'px';
    indicator.style.width = pageRect.width + 'px';
  }

  function setupDragAndDrop() {
    // Track mousedown target so handle-only drag detection works
    document.addEventListener('mousedown', (e) => { _lastMousedownEl = e.target; });

    // Make sidebar insert buttons draggable
    document.querySelectorAll('.sidebar [data-add]').forEach(btn => {
      btn.setAttribute('draggable', 'true');
      btn.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('application/json', JSON.stringify({
          source: 'sidebar',
          add: btn.dataset.add,
          kind: btn.dataset.kind || null
        }));
        _dragData = { source: 'sidebar', add: btn.dataset.add, kind: btn.dataset.kind || null };
        document.body.classList.add('is-dragging', 'is-dragging-sidebar');
      });
      btn.addEventListener('dragend', endDrag);
    });

    // Global dragover - handle both sidebar and block drags over the page
    document.addEventListener('dragover', (e) => {
      if (!_dragData) return;
      const contentArea = e.target.closest && e.target.closest('.content-area');
      if (!contentArea) {
        // Not over a page - hide indicator
        const indicator = document.getElementById('dropIndicator');
        if (indicator) indicator.style.display = 'none';
        return;
      }
      e.preventDefault();
      e.dataTransfer.dropEffect = _dragData.source === 'sidebar' ? 'copy' : 'move';
      positionDropIndicator(contentArea, e.clientY);
      _dragInsertIdx = calcDropInsertIdx(contentArea, e.clientY);
    });

    // Hide indicator when leaving a content area
    document.addEventListener('dragleave', (e) => {
      if (!_dragData) return;
      const contentArea = e.target.closest && e.target.closest('.content-area');
      if (!contentArea) return;
      if (!e.relatedTarget || !contentArea.contains(e.relatedTarget)) {
        const indicator = document.getElementById('dropIndicator');
        if (indicator) indicator.style.display = 'none';
      }
    });

    // Global drop
    document.addEventListener('drop', (e) => {
      if (!_dragData) return;
      const contentArea = e.target.closest && e.target.closest('.content-area');
      if (!contentArea) { endDrag(); return; }
      e.preventDefault();

      const insertIdx = (_dragInsertIdx >= 0) ? _dragInsertIdx : state.blocks.length;

      if (_dragData.source === 'sidebar') {
        let newBlock;
        if (_dragData.add === 'step')          newBlock = createStepBlock();
        else if (_dragData.add === 'callout')   newBlock = createCalloutBlock(_dragData.kind || 'note');
        else if (_dragData.add === 'section')   newBlock = createSectionBlock();
        else if (_dragData.add === 'parts')     newBlock = createPartsBlock();
        else if (_dragData.add === 'photoarray') newBlock = createPhotoArrayBlock();
        else if (_dragData.add === 'textbox')   newBlock = createTextBoxBlock();
        if (newBlock) {
          state.blocks.splice(insertIdx, 0, newBlock);
          saveState();
          focusBlockIdAfterRender = newBlock.id;
          render();
        }
      } else if (_dragData.source === 'block') {
        const fromIdx = findBlockIndex(_dragData.id);
        if (fromIdx >= 0) {
          // Adjust target index for the removal of the block from its original position
          const toIdx = fromIdx < insertIdx ? insertIdx - 1 : insertIdx;
          if (fromIdx !== toIdx) {
            const [moved] = state.blocks.splice(fromIdx, 1);
            state.blocks.splice(toIdx, 0, moved);
            saveState();
            focusBlockIdAfterRender = _dragData.id;
            render();
          }
        }
      }

      endDrag();
    });

    // Cleanup on dragend anywhere (covers cases where drop fires elsewhere)
    document.addEventListener('dragend', () => {
      if (_dragData) endDrag();
    });
  }

  // ---------- Toast ----------
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  // ---------- Init ----------
  window.exportTemplate = exportTemplate;
  window.importTemplate = importTemplate;
  window.newDocument = newDocument;

  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    // Mark the body when running on a touch-primary device. Used by the
    // print stylesheet to size pages differently: desktop keeps a fixed
    // 11in page (footer at the bottom of the sheet), mobile uses
    // content-driven height so iOS Safari's print headers don't push the
    // footer onto a phantom second page.
    try {
      if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) {
        document.body.classList.add('is-touch');
      }
    } catch (e) { /* matchMedia missing on very old browsers - ignore */ }
    render();
    setupFocusTracking();
    setupInlineIconRemoval();
    setupBlockToolbar();
    setupFormatToolbar();
    setupFloatingFormatToolbar();
    setupSidebarToggle();
    setupDragAndDrop();
    updatePageScale();
  });

  // Recompute scale on resize / orientation change.
  let _resizeTimer = null;
  window.addEventListener('resize', () => {
    if (_resizeTimer) clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      updatePageScale();
    }, 120);
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(updatePageScale, 200);
  });
})();
</script>

</body>
