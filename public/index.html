<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1D2B4F">
  <title>Work Instruction Builder</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --navy:     #1D2B4F;
      --steel:    #B8C4D8;
      --frost:    #E8EBF0;
      --charcoal: #595959;
      --white:    #FFFFFF;
      --dew:      #d0d7e3;
      /* Reds */
      --color-ember:    #b85c58;
      --color-rose:     #c07080;
      --color-blush:    #d49098;
      /* Oranges */
      --color-rust:     #b87550;
      --color-clay:     #c08560;
      --color-terra:    #c89070;
      /* Yellows */
      --color-gold:     #b89840;
      --color-straw:    #c4a860;
      --color-flax:     #d0bc80;
      /* Greens */
      --color-pine:     #477060;
      --color-fern:     #5e8a6a;
      --color-sage:     #7a9e85;
      --color-moss:     #708c60;
      --color-reed:     #90a870;
      /* Teals */
      --color-teal:     #5a8e90;
      --color-seafoam:  #6ea0a0;
      /* Blues */
      --color-cobalt:     #4e72a0;
      --color-sky:        #6888b0;
      --color-periwinkle: #8898c8;
      /* Violets */
      --color-plum:     #826090;
      --color-iris:     #7870a8;
      --color-lavender: #9888c0;
      --color-mauve:    #a07898;
      /* Legacy palette - kept so existing buttons/links don't break.
         Insert-block colors now use the --color-* vars above. */
      --danger:   #b3261e;
      --success:  #2e7d32;
      --info:     #1565c0;
      --amber:    #f4b400;
      --orange:   #e67e22;
      --purple:   #5d3fd3;
      --teal:     #00695c;
      --cyan:     #0288d1;
      --magenta:  #ad1457;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Verdana, Arial, sans-serif;
      background: #d4d7dc;
      color: var(--charcoal);
    }

    /* ---------- Layout ---------- */
    body {
      padding-top: calc(48px + env(safe-area-inset-top, 0px));
      /* Sidebar is a hamburger-style overlay; content does not get pushed. */
      padding-left: 0;
    }

    /* ---------- Top bar (file ops) ---------- */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      /* Reserve space for the iOS status bar (notch / dynamic island)
         when the app is added to the home screen. env() falls back to 0
         in browsers/contexts that don't expose safe-area insets. */
      padding: env(safe-area-inset-top, 0) 14px 0
               max(14px, env(safe-area-inset-right, 0));
      height: calc(48px + env(safe-area-inset-top, 0px));
      background: var(--navy);
      color: white;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .topbar h1 {
      margin: 0 14px 0 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .topbar button {
      padding: 7px 13px;
      border: none;
      background: var(--steel);
      color: var(--navy);
      cursor: pointer;
      border-radius: 3px;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .topbar button:hover { background: var(--frost); }
    .topbar button.primary { background: var(--success); color: white; }
    .topbar button.primary:hover { background: #3a8e3f; }
    .topbar .spacer { flex: 1; }
    .topbar .hint { font-size: 12px; opacity: 0.85; }
    .topbar .btn-label-short { display: none; }

    /* ---------- Hamburger button (in topbar) ---------- */
    .topbar .hamburger-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      width: 38px;
      height: 36px;
      padding: 0;
      margin-right: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .topbar .hamburger-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.6);
    }
    .topbar .hamburger-btn .hamburger-icon {
      position: relative;
      display: inline-block;
      width: 18px;
      height: 14px;
    }
    .topbar .hamburger-btn .hamburger-icon::before,
    .topbar .hamburger-btn .hamburger-icon::after,
    .topbar .hamburger-btn .hamburger-icon > span {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: white;
      border-radius: 1px;
      transition: transform 0.18s ease, opacity 0.18s ease, top 0.18s ease;
    }
    .topbar .hamburger-btn .hamburger-icon::before { top: 0; }
    .topbar .hamburger-btn .hamburger-icon > span { top: 6px; }
    .topbar .hamburger-btn .hamburger-icon::after  { top: 12px; }
    /* When the menu is open, morph hamburger -> X */
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::before {
      top: 6px; transform: rotate(45deg);
    }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::after {
      top: 6px; transform: rotate(-45deg);
    }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon > span {
      opacity: 0;
    }

    /* ---------- Sidebar (hamburger menu panel) ---------- */
    .sidebar {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      left: 0;
      bottom: 0;
      width: 300px;
      max-width: 88vw;
      background: #f1f3f7;
      border-right: 1px solid var(--steel);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 220;
      display: flex;
      flex-direction: column;
      transform-origin: top left;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 4px 6px 18px rgba(0,0,0,0.22);
    }
    body.sidebar-collapsed .sidebar {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }

    /* Backdrop dim while the menu is open (clicking it closes the menu) */
    .sidebar-backdrop {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.32);
      z-index: 210;
      opacity: 1;
      transition: opacity 0.18s ease;
    }
    body.sidebar-collapsed .sidebar-backdrop {
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-header {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px 6px 14px;
      background: var(--frost);
      border-bottom: 1px solid var(--steel);
      font-size: 11px;
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      z-index: 1;
    }
    .sidebar-toggle {
      background: white;
      border: 1px solid var(--steel);
      color: var(--charcoal);
      cursor: pointer;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 3px;
      font-size: 16px;
      font-family: inherit;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-toggle:hover { background: var(--frost); border-color: var(--navy); }
    .sidebar-section {
      padding: 12px 14px 14px;
      border-bottom: 1px solid var(--steel);
    }
    .sidebar-section:last-child { border-bottom: none; }
    .sidebar-section h3 {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--charcoal);
    }
    .sidebar-section h4 {
      margin: 12px 0 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--charcoal);
      opacity: 0.85;
    }

    /* Block insertion buttons (full-width, stacked) */
    .sidebar-block-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-block-list button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      letter-spacing: 0.3px;
    }
    .sidebar-block-list button:hover {
      filter: brightness(1.07);
      border-color: var(--navy);
    }
    .sidebar-block-list .add-step {
      background: #e8eaed;
      color: var(--charcoal);
      border-color: #c8ccd1;
    }
    /* Sidebar buttons mirror the on-page callout palette, so each button
       reads like the block it inserts. Borders match the background for a
       clean flat look. */
    .sidebar-block-list .add-warning  { background: var(--color-ember);   color: white; border-color: var(--color-ember); }
    .sidebar-block-list .add-caution  { background: var(--color-gold);    color: white; border-color: var(--color-gold); }
    .sidebar-block-list .add-note     { background: var(--color-cobalt);  color: white; border-color: var(--color-cobalt); }
    .sidebar-block-list .add-watch    { background: var(--color-rust);    color: white; border-color: var(--color-rust); }
    .sidebar-block-list .add-monitor  { background: var(--color-plum);    color: white; border-color: var(--color-plum); }
    .sidebar-block-list .add-record   { background: var(--color-pine);    color: white; border-color: var(--color-pine); }
    .sidebar-block-list .add-tools    { background: var(--color-teal);    color: white; border-color: var(--color-teal); }
    .sidebar-block-list .add-inspect  { background: var(--color-sky);     color: white; border-color: var(--color-sky); }
    .sidebar-block-list .add-measure  { background: var(--color-seafoam); color: white; border-color: var(--color-seafoam); }
    .sidebar-block-list .add-finding  { background: var(--color-fern);    color: white; border-color: var(--color-fern); }
    .sidebar-block-list .add-concern  { background: var(--color-rose);    color: white; border-color: var(--color-rose); }
    .sidebar-block-list .add-analysis { background: var(--color-iris);    color: white; border-color: var(--color-iris); }
    /* Chart was Parts List - uses the user-specified blue */
    .sidebar-block-list .add-parts {
      background: var(--color-cobalt);
      color: white;
      border-color: var(--color-cobalt);
    }
    .sidebar-block-list .add-photoarray {
      background: #d8dde4;
      color: var(--charcoal);
      border-color: #b8c0cc;
    }
    .sidebar-block-list .add-textbox {
      background: white;
      color: var(--charcoal);
      border: 1px dashed var(--steel);
      font-weight: 500;
      font-style: italic;
    }
    .sidebar-block-list .add-section {
      background: white;
      color: var(--navy);
      border-color: var(--navy);
      border-width: 2px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    /* Format section rows */
    .sidebar-fmt-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 8px;
    }
    .sidebar-fmt-row:last-child { margin-bottom: 0; }
    .sidebar-fmt-row .label {
      font-size: 11px;
      color: var(--charcoal);
      font-weight: 600;
      margin-right: 2px;
    }
    .sidebar-fmt-row button {
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      padding: 4px 9px;
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      min-height: 26px;
    }
    .sidebar-fmt-row button:hover { border-color: var(--navy); }
    .sidebar-fmt-row button:active { background: var(--frost); }
    .sidebar-fmt-row .fmt-bold {
      font-weight: 800;
      width: 30px;
      font-size: 14px;
    }
    .sidebar-fmt-row .size-btn { width: 28px; padding: 4px 0; text-align: center; }
    .sidebar-fmt-row .size-btn[data-arg="2"] { font-size: 10px; }
    .sidebar-fmt-row .size-btn[data-arg="3"] { font-size: 12px; }
    .sidebar-fmt-row .size-btn[data-arg="4"] { font-size: 14px; }
    .sidebar-fmt-row .size-btn[data-arg="5"] { font-size: 16px; }
    .sidebar-fmt-row .color-swatch {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 2px solid white;
      outline: 1px solid var(--steel);
      cursor: pointer;
      border-radius: 3px;
      min-height: 0;
    }
    .sidebar-fmt-row .color-swatch:hover { outline-color: var(--navy); }

    /* Inline-icon badge grid (2x2) */
    .sidebar-icon-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .sidebar-icon-grid button {
      border: 1px solid var(--steel);
      padding: 6px 4px;
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      min-height: 28px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .sidebar-icon-grid .fmt-icon-warning { background: var(--danger); color: white; border-color: var(--danger); }
    .sidebar-icon-grid .fmt-icon-caution { background: var(--amber);  color: #2c1f00; border-color: #d99e00; }
    .sidebar-icon-grid .fmt-icon-inspect { background: var(--info);   color: white; border-color: var(--info); }
    .sidebar-icon-grid .fmt-icon-torque  { background: #424242;       color: white; border-color: #424242; }

    .sidebar-clear-btn {
      width: 100%;
      margin-top: 10px;
      padding: 6px 8px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
    }
    .sidebar-clear-btn:hover { border-color: var(--navy); }

    /* ---------- Floating format toolbar ---------- */
    /* Appears when any rich-text editor has focus. Buttons share their
       handler wiring with the sidebar version - same data-cmd attributes,
       same applyFormat() entry point. */
    .floating-fmt-toolbar {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px) + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1px solid var(--steel);
      border-radius: 6px;
      padding: 5px 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      z-index: 250;
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100vw - 24px);
    }
    .floating-fmt-toolbar[hidden] { display: none; }
    .floating-fmt-toolbar button {
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 7px;
      min-width: 26px;
      min-height: 26px;
      line-height: 1;
    }
    .floating-fmt-toolbar button:hover { border-color: var(--navy); }
    .floating-fmt-toolbar button:active { background: var(--frost); }
    .floating-fmt-toolbar .fmt-bold {
      font-weight: 700;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .floating-fmt-toolbar .size-btn { padding: 4px 6px; }
    .floating-fmt-toolbar .size-btn[data-arg="2"] { font-size: 10px; }
    .floating-fmt-toolbar .size-btn[data-arg="3"] { font-size: 12px; }
    .floating-fmt-toolbar .size-btn[data-arg="4"] { font-size: 14px; }
    .floating-fmt-toolbar .size-btn[data-arg="5"] { font-size: 16px; }
    .floating-fmt-toolbar .color-swatch {
      width: 22px;
      height: 22px;
      min-width: 22px;
      padding: 0;
      border: 1px solid #999;
      border-radius: 3px;
      outline: 2px solid transparent;
      outline-offset: 0;
    }
    .floating-fmt-toolbar .color-swatch:hover { outline-color: var(--navy); }
    .floating-fmt-toolbar .floating-fmt-sep {
      width: 1px;
      align-self: stretch;
      background: var(--frost);
      margin: 2px 4px;
    }
    .floating-fmt-toolbar .floating-fmt-label {
      font-size: 11px;
      color: var(--charcoal);
      font-weight: 600;
      margin-right: 2px;
    }
    .floating-fmt-toolbar .floating-fmt-clear {
      font-size: 14px;
      padding: 4px 8px;
    }
    /* Compact variant for mobile - smaller buttons, drop labels via media. */
    @media (max-width: 600px) {
      .floating-fmt-toolbar {
        padding: 4px 6px;
        gap: 3px;
      }
      .floating-fmt-toolbar .floating-fmt-label { display: none; }
      .floating-fmt-toolbar button { min-width: 30px; min-height: 30px; }
    }

    /* ---------- Pages ---------- */
    .pages-container {
      padding: 22px 14px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    /* Letter size: 8.5 x 11 inches */
    .page {
      width: 8.5in;
      height: 11in;
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      padding: 0.10in 0.25in 0.25in;   /* top right/left bottom — tighter top */
      display: flex;
      flex-direction: column;
      position: relative;
      /* No overflow:hidden here. The print media block clips to page bounds
         for clean printed output, but on screen we want no-print affordances
         like the photo-array action strip ("+ Add Photo" / "Delete Row") to
         remain visible when the row ending sits at the bottom of the page. */
    }

    /* ---------- Header ---------- */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid var(--navy);
      padding-bottom: 4px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .logo-area {
      width: 1.4in;
      height: 0.85in;
      border: 2px dashed var(--steel);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: white;
    }
    .logo-area:hover { background: var(--frost); }
    .logo-area.has-image { border-style: solid; border-color: transparent; }
    .logo-area.dragover  { background: var(--frost); border-color: var(--navy); }
    .logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .logo-area .placeholder {
      color: #888;
      font-size: 10.5px;
      text-align: center;
      pointer-events: none;
      line-height: 1.3;
    }
    .logo-area .clear-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      display: none;
      line-height: 1;
    }
    .logo-area:hover .clear-btn { display: block; }

    .header-info { flex: 1; min-width: 0; }
    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-field {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      border: none;
      flex: 1;
      min-width: 0;
      outline: none;
      font-family: inherit;
      padding: 1px 0;
      background: transparent;
    }
    .title-field::placeholder { color: var(--steel); font-style: italic; font-weight: 500; }

    .form-type-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .form-type-selector label {
      color: var(--charcoal);
      font-weight: 600;
      white-space: nowrap;
    }
    .form-type-select {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 6px;
      border: 1px solid var(--steel);
      border-radius: 3px;
      background: white;
      color: var(--charcoal);
      cursor: pointer;
    }
    .form-type-select:hover { border-color: var(--navy); }
    .form-type-select:focus { outline: 2px solid var(--navy); outline-offset: -1px; }

    .meta-row {
      display: flex;
      gap: 14px;
      margin-top: 5px;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .meta-field { display: flex; align-items: baseline; gap: 4px; }
    .meta-field label { font-weight: 700; color: var(--navy); white-space: nowrap; }
    .meta-field input {
      border: none;
      border-bottom: 1px solid var(--steel);
      outline: none;
      padding: 1px 2px;
      font-family: inherit;
      font-size: 11px;
      background: transparent;
      color: var(--charcoal);
    }
    .meta-field input:focus { border-bottom-color: var(--navy); }

    /* ---------- Content area ---------- */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.10in;
      padding-top: 0.11in;          /* room for first-row step-number tabs */
      min-height: 0;
      overflow: hidden;
    }

    .row-step {
      flex: 0 0 auto;
      min-height: 2.15in;
    }

    .row-callout {
      flex: 0 0 auto;
      min-height: 0.32in;
    }

    .row-section {
      flex: 0 0 0.60in;
      height: 0.60in;
    }

    .row-spacer {
      /* Empty vertical gap added by the down-arrow on the last block. The
         inline style sets the height; flex: 0 0 auto keeps the gap from
         being compressed by the content-area's flex layout. */
      flex: 0 0 auto;
      pointer-events: none;
    }

    .row-parts {
      flex: 0 0 auto;
      min-height: 0.40in;
    }

    .row-photoarray {
      flex: 0 0 auto;
      min-height: 2.60in;
    }

    .row-textbox {
      flex: 0 0 auto;
      min-height: 0.50in;
    }

    /* ---------- Photo array block ---------- */
    .photoarray-block {
      background: white;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.10in;
    }
    .photoarray-row {
      display: grid;
      gap: 0.10in;
      width: 7.70in;
      max-width: 100%;
      margin: 0 auto;
      height: 2.50in;
    }
    /* The count-N class is set by buildPhotoArrayElement based on how many
       images the row actually contains. Empty rows get count-3 so the user
       sees three placeholder cells to click. */
    .photoarray-row.count-1 { grid-template-columns: 1fr; }
    .photoarray-row.count-2 { grid-template-columns: 1fr 1fr; }
    .photoarray-row.count-3 { grid-template-columns: 1fr 1fr 1fr; }
    .photoarray-cell {
      background: var(--frost);
      border: 1px dashed var(--steel);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    /* Empty cell: center the placeholder text vertically and horizontally. */
    .photoarray-cell:not(.has-image) {
      align-items: center;
      justify-content: center;
    }
    .photoarray-cell:hover { background: #dde4ee; }
    .photoarray-cell:focus {
      outline: 2px solid var(--navy);
      outline-offset: 2px;
      background: #dde4ee;
    }
    .photoarray-cell:focus:not(.has-image) { background: var(--frost); }
    .photoarray-cell.has-image { background: white; border-style: solid; border-color: var(--frost); }
    .photoarray-cell.dragover  { background: var(--frost); border-color: var(--navy); border-style: solid; }
    /* Image area (only inside has-image cells). Takes all space the caption
       isn't using; image scales to fit while preserving aspect ratio. */
    .photoarray-cell-image {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .photoarray-cell-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    /* Caption: single-line input pinned to the bottom of the cell. Renders as
       plain italic text in print (border/background drop). */
    .photoarray-caption {
      flex: 0 0 auto;
      border: none;
      border-top: 1px solid var(--frost);
      outline: none;
      background: transparent;
      text-align: center;
      font-size: 11px;
      font-style: italic;
      color: var(--charcoal);
      padding: 2px 6px;
      width: 100%;
      height: 20px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .photoarray-caption:focus { background: rgba(232, 235, 240, 0.5); }
    .photoarray-caption::placeholder { color: var(--steel); font-style: italic; }
    .photoarray-cell .placeholder {
      color: #888;
      font-size: 10px;
      text-align: center;
      padding: 4px;
      pointer-events: none;
      line-height: 1.25;
    }
    /* Cell clear button anchored bottom-right. The block-level controls
       (up / down / delete) live at the block's top-right, so anchoring the
       cell clear button there caused them to overlap on the rightmost cell.
       Bottom-right keeps the button reachable in every layout. */
    .photoarray-cell .clear-btn {
      position: absolute;
      bottom: 3px;
      right: 3px;
      background: rgba(0,0,0,0.65);
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      display: none;
      line-height: 1;
    }
    .photoarray-cell:hover .clear-btn { display: block; }
    /* Per-row delete: ✕ button at right edge of each row, hidden in print */
    .photoarray-row-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
    }
    /* Inline action strip below each row. Holds the "+ Add Photo" and
       "Delete Row" buttons in plain sight (the previous floating-circle
       design lived in the page gutter and was easy to miss).
       Centered to the same width as the row above it. */
    .photoarray-row-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      width: 7.70in;
      max-width: 100%;
      margin: 4px auto 0;
      min-height: 22px;
    }
    .photoarray-add-image {
      padding: 3px 10px;
      border: 1px solid var(--navy);
      background: white;
      color: var(--navy);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.4;
    }
    .photoarray-add-image:hover {
      background: var(--navy);
      color: white;
    }
    .photoarray-row-delete {
      padding: 3px 10px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.4;
    }
    .photoarray-row-delete:hover {
      border-color: var(--color-ember);
      color: var(--color-ember);
    }
    /* Add-row button (no-print) */
    .photoarray-add-row {
      align-self: flex-start;
      margin-top: 2px;
      padding: 4px 12px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
    }
    .photoarray-add-row:hover {
      border-color: var(--navy);
      color: var(--navy);
    }

    /* ---------- Plain text box block ---------- */
    .textbox-block {
      background: white;
      border: 1px solid var(--steel);
      border-radius: 3px;
      padding: 6px 10px;
      position: relative;
      min-height: 0.50in;
    }
    .textbox-text {
      outline: none;
      font-family: inherit;
      font-size: 11px;
      line-height: 1.4;
      color: var(--charcoal);
      cursor: text;
      min-height: 18px;
    }
    .textbox-text:focus { background: rgba(232, 235, 240, 0.4); border-radius: 2px; }
    .textbox-text:empty::before {
      content: attr(data-placeholder);
      color: var(--steel);
      font-style: italic;
      pointer-events: none;
    }

    /* ---------- Parts list table block ---------- */
    .parts-block {
      background: white;
      border: 1.5px solid var(--color-cobalt);
      border-radius: 3px;
      position: relative;
      overflow: visible;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .parts-header {
      background: var(--color-cobalt);
      color: white;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.6px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ---------- Optional block title bar ---------- */
    /* Used by Image|Text (step) and Photo Array blocks. Visually mirrors the
       Chart block's header so titled blocks read as a family. The bar is
       conditionally rendered - block.title === undefined means "no bar".
       Toggled on by the "T" button in block-controls, off by the bar's own
       \u2715 button. */
    .block-title-bar {
      background: var(--color-cobalt);
      color: white;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.6px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .block-title-text {
      flex: 1;
      outline: none;
      cursor: text;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }
    .block-title-text:focus { background: rgba(255,255,255,0.18); border-radius: 2px; }
    .block-title-text:empty::before {
      content: attr(data-placeholder);
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      font-style: italic;
      letter-spacing: normal;
    }
    .block-title-remove {
      background: rgba(0,0,0,0.18);
      border: none;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
    }
    .block-title-remove:hover { background: rgba(0,0,0,0.32); }
    .parts-header-label {
      flex: 1;
      outline: none;
      cursor: text;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }
    .parts-header-label:focus { background: rgba(255,255,255,0.18); border-radius: 2px; }
    .parts-header-label:empty::before {
      content: attr(data-placeholder);
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      font-style: italic;
      letter-spacing: normal;
    }

    .parts-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    .parts-table thead th {
      background: #eef0f3;
      border: 1px solid var(--steel);
      padding: 0;
      text-align: left;
      vertical-align: middle;
      position: relative;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .parts-table tbody td {
      border: 1px solid var(--steel);
      padding: 0;
      vertical-align: middle;
      position: relative;
    }
    /* When a body cell is part of a multi-cell drag selection, tint it so
       the user knows which cells the next format command will apply to. */
    .parts-table tbody td.parts-cell-selected {
      background: rgba(78, 114, 160, 0.18);  /* cobalt-derived tint */
      box-shadow: inset 0 0 0 1px var(--color-cobalt);
    }
    .parts-table tbody td.parts-cell-selected .parts-cell {
      background: transparent;
    }

    .parts-cell {
      outline: none;
      cursor: text;
      padding: 4px 8px;
      min-height: 18px;
      font-size: 10.5px;
      line-height: 1.3;
      color: var(--charcoal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .parts-cell:focus {
      background: var(--frost);
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }
    .parts-cell:empty::before {
      content: attr(data-placeholder);
      color: var(--steel);
      font-style: italic;
    }
    .parts-col-header {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.3px;
      color: var(--navy);
      background: #eef0f3;
      text-transform: uppercase;
    }

    /* Column-delete: small ✕ that floats above the column header */
    .parts-col-delete {
      visibility: hidden;
      position: absolute;
      top: -8px;
      right: -8px;
      width: 16px;
      height: 16px;
      padding: 0;
      border: 1px solid var(--steel);
      background: white;
      color: var(--danger);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 3;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .parts-table thead th:hover .parts-col-delete {
      visibility: visible;
    }

    /* Right gutter column - holds row-delete buttons, hidden in print */
    .parts-actions-col {
      width: 22px;
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      position: relative;
    }

    .parts-row-delete {
      visibility: hidden;
      position: absolute;
      top: 50%;
      left: 3px;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      padding: 0;
      border: 1px solid var(--steel);
      background: white;
      color: var(--danger);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }
    .parts-table tbody tr:hover .parts-row-delete {
      visibility: visible;
    }

    /* Action footer (Add Row / Add Column) - on-screen only */
    .parts-actions {
      padding: 4px 10px;
      background: #f5f6f8;
      display: flex;
      gap: 6px;
      border-top: 1px solid var(--steel);
    }
    .parts-actions button {
      font-size: 11px;
      padding: 2px 10px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-weight: 600;
    }
    .parts-actions button:hover {
      border-color: var(--navy);
      color: var(--navy);
    }
    .parts-paste-hint {
      font-size: 10px;
      color: var(--charcoal);
      opacity: 0.7;
      font-style: italic;
      margin-left: auto;
      align-self: center;
    }

    /* ---------- Section header block ---------- */
    .section-header {
      display: flex;
      /* Title sits at the TOP of the row. The empty space below acts as a
         visual section separator before the next block. Bottom-aligning
         caused the empty space to land above the title - when a section
         was the first block on a page that gap read as "extra room below
         the page header" (and was inconsistent with pages whose first
         block wasn't a section). */
      align-items: flex-start;
      background: white;
      color: var(--navy);
      padding: 0 2px;
      position: relative;
      height: 100%;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .section-header-text {
      flex: 1;
      outline: none;
      cursor: text;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      min-width: 0;
      line-height: 1.2;
      /* Underline now lives on the text element so it sits directly under
         the title rather than at the very bottom of the row. */
      border-bottom: 2.5px solid var(--navy);
      padding: 0 0 4px 4px;
    }
    .section-header-text:focus { background: var(--frost); border-radius: 2px; }
    .section-header-text:empty::before {
      content: attr(data-placeholder);
      color: var(--steel);
      font-weight: 400;
      font-style: italic;
      text-transform: none;
      letter-spacing: normal;
    }

    /* ---------- Step block (horizontal: image left, text right) ---------- */
    .step {
      border: 1.5px solid var(--navy);
      border-radius: 3px;
      padding: 4px 5px;
      display: flex;
      flex-direction: row;
      gap: 6px;
      overflow: visible;            /* allow step-number tab to extend above */
      position: relative;
      background: white;
      height: 2.15in;
    }

    .step-number {
      background: var(--navy);
      color: white;
      min-width: 22px;
      height: 18px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      position: absolute;
      top: -10px;                   /* stick out above the cell border */
      left: 4px;
      border-radius: 3px;
      letter-spacing: 0.3px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      z-index: 2;
    }

    .step-image {
      flex: 0 0 3.75in;             /* fixed width per design spec */
      height: 2.00in;                /* fixed height per design spec */
      background: var(--frost);
      border: 1px dashed var(--steel);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }
    .step-image:hover { background: #dde4ee; }
    .step-image.has-image { background: white; border-style: solid; border-color: var(--frost); }
    .step-image.dragover  { background: var(--frost); border-color: var(--navy); border-style: solid; }
    .step-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .step-image .placeholder {
      color: #888;
      font-size: 10px;
      text-align: center;
      padding: 4px;
      pointer-events: none;
      line-height: 1.25;
    }
    .step-image .clear-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,0.65);
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      display: none;
      line-height: 1;
    }
    .step-image:hover .clear-btn { display: block; }

    /* ---------- Editable rich text (right of image, full remaining width) ---------- */
    .step-text {
      flex: 1;                      /* fill remaining width */
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.35;
      height: 100%;
      padding: 4px 6px;
      background: transparent;
      color: var(--charcoal);
      overflow: hidden;
      cursor: text;
      min-width: 0;                 /* allow flex shrinking past content */
    }
    .step-text:focus { background: rgba(232, 235, 240, 0.5); }
    .step-text:empty::before {
      content: attr(data-placeholder);
      color: var(--steel);
      font-style: italic;
      pointer-events: none;
    }
    /* When the block has an optional title bar above, the step-number can't
       stick out above the step (the title bar is there). Tuck it just
       inside the top-left of the step instead. */
    .step.has-title .step-number {
      top: 4px;
      left: 4px;
    }
    .step.has-title {
      /* Slight extra top padding so the number badge has room. */
      padding-top: 18px;
    }

    /* execCommand fontSize emits CSS keyword sizes; map to print-friendly pixels. */
    .rich-text-editor [style*="font-size: small"]    { font-size: 9px    !important; line-height: 1.25; }
    .rich-text-editor [style*="font-size: medium"]   { font-size: 10.5px !important; line-height: 1.3;  }
    .rich-text-editor [style*="font-size: large"]    { font-size: 13px   !important; line-height: 1.35; }
    .rich-text-editor [style*="font-size: x-large"]  { font-size: 16px   !important; line-height: 1.4;  }
    .rich-text-editor [style*="font-size: xx-large"] { font-size: 16px   !important; line-height: 1.4;  }

    /* ---------- Inline icon badges (within editable text) ---------- */
    .wi-icon {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.4px;
      margin: 0 2px 0 0;
      white-space: nowrap;
      vertical-align: baseline;
      font-family: 'Segoe UI', Tahoma, Verdana, Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .wi-warning { background: var(--danger); color: #ffffff; }
    .wi-caution { background: var(--amber);  color: #2c1f00; }
    .wi-inspect { background: var(--info);   color: #ffffff; }
    .wi-torque  { background: #424242;       color: #ffffff; }

    /* ---------- Callout block (full width) ---------- */
    .callout {
      display: flex;
      align-items: stretch;
      border: 2px solid var(--callout-color, var(--charcoal));
      border-radius: 3px;
      background: white;
      min-height: 100%;
      position: relative;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Insert-block palette - dark/medium tones with white text. */
    .callout-warning  { --callout-color: var(--color-ember);   --callout-text-color: #ffffff; }
    .callout-caution  { --callout-color: var(--color-gold);    --callout-text-color: #ffffff; }
    .callout-note     { --callout-color: var(--color-cobalt);  --callout-text-color: #ffffff; }
    .callout-watch    { --callout-color: var(--color-rust);    --callout-text-color: #ffffff; }
    .callout-monitor  { --callout-color: var(--color-plum);    --callout-text-color: #ffffff; }
    .callout-record   { --callout-color: var(--color-pine);    --callout-text-color: #ffffff; }
    .callout-tools    { --callout-color: var(--color-teal);    --callout-text-color: #ffffff; }
    .callout-inspect  { --callout-color: var(--color-sky);     --callout-text-color: #ffffff; }
    .callout-measure  { --callout-color: var(--color-seafoam); --callout-text-color: #ffffff; }
    .callout-finding  { --callout-color: var(--color-fern);    --callout-text-color: #ffffff; }
    .callout-concern  { --callout-color: var(--color-rose);    --callout-text-color: #ffffff; }
    .callout-analysis { --callout-color: var(--color-iris);    --callout-text-color: #ffffff; }

    .callout-badge {
      background: var(--callout-color);
      color: var(--callout-text-color);
      font-weight: 700;
      font-size: 11px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      min-width: 0.85in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .callout-text {
      flex: 1;
      padding: 4px 10px;
      font-size: 11px;
      line-height: 1.35;
      color: var(--charcoal);
      outline: none;
      cursor: text;
      /* Multi-line: text wraps and the row grows to fit */
      overflow-wrap: break-word;
      word-break: break-word;
      white-space: normal;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }
    .callout-text:focus { background: rgba(232, 235, 240, 0.5); }
    .callout-text:empty::before {
      content: attr(data-placeholder);
      color: var(--steel);
      font-style: italic;
      pointer-events: none;
    }

    /* ---------- Block controls (delete / move) ---------- */
    .block-controls {
      position: absolute;
      top: 3px;
      right: 3px;
      display: flex;
      gap: 2px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .step:hover > .block-controls,
    .callout:hover > .block-controls,
    .section-header:hover > .block-controls,
    .parts-block:hover > .block-controls,
    .photoarray-block:hover > .block-controls,
    .textbox-block:hover > .block-controls {
      opacity: 1;
    }
    .block-controls button {
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      line-height: 1;
      padding: 0;
      font-family: inherit;
    }
    .block-controls button:hover { background: rgba(0, 0, 0, 0.85); }
    .block-controls button.delete:hover { background: var(--danger); }
    /* Add-title button tints to the title-bar color on hover so the user can
       see what's about to appear. */
    .block-controls button.add-title:hover { background: var(--color-cobalt); }

    /* ---------- Drag and Drop ---------- */
    .drop-indicator {
      position: fixed;
      height: 3px;
      background: var(--color-cobalt);
      pointer-events: none;
      z-index: 600;
      display: none;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(78,114,160,0.55);
    }
    body.is-dragging .drop-indicator { display: block; }
    .block-dragging { opacity: 0.35; }
    .block-drag-handle {
      cursor: grab !important;
      font-size: 13px !important;
      letter-spacing: -1px;
    }
    .block-drag-handle:active { cursor: grabbing !important; }

    /* ---------- Color picker popup ---------- */
    .color-picker-popup {
      background: white;
      border: 1px solid var(--steel);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(6, 22px);
      gap: 4px;
    }
    .color-picker-popup .cp-swatch {
      width: 22px;
      height: 22px;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .color-picker-popup .cp-swatch:hover {
      border-color: var(--navy);
      transform: scale(1.12);
    }
    .color-picker-popup .cp-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 6px;
      align-items: center;
      padding-top: 6px;
      border-top: 1px solid var(--frost);
      margin-top: 2px;
    }
    .color-picker-popup .cp-row label {
      font-size: 10px; color: var(--charcoal); font-weight: 600;
    }
    .color-picker-popup .cp-row input[type=color] {
      width: 30px; height: 22px;
      border: 1px solid var(--steel); border-radius: 3px;
      padding: 1px; cursor: pointer;
    }
    .color-picker-popup .cp-reset {
      font-size: 10px; padding: 2px 7px;
      border: 1px solid var(--steel); background: white;
      border-radius: 3px; cursor: pointer;
      font-family: inherit; color: var(--danger);
      margin-left: auto;
    }
    .color-picker-popup .cp-reset:hover { border-color: var(--danger); }
    .block-controls button.paint-btn { font-size: 11px; }
    .block-controls button.paint-btn:hover { background: rgba(90,142,144,0.9); }

    /* ---------- Empty state ---------- */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--charcoal);
      border: 2px dashed var(--steel);
      border-radius: 4px;
      padding: 30px;
    }
    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.3px;
    }
    .empty-state-body {
      font-size: 13px;
      color: var(--charcoal);
      opacity: 0.8;
      text-align: center;
      max-width: 380px;
      line-height: 1.4;
    }
    .empty-state-body strong { color: var(--navy); }

    /* ---------- Footer ---------- */
    .page-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      color: var(--charcoal);
      padding-top: 5px;
      border-top: 1px solid var(--frost);
      margin-top: 6px;
      flex-shrink: 0;
      gap: 12px;
    }
    .page-footer-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .page-footer-pageno {
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: 160px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 14px;
      border-radius: 4px;
      z-index: 1000;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }

    /* ---------- Mobile / narrow-screen layout ---------- */
    @media screen and (max-width: 900px) {
      body {
        /* No fixed-sidebar offset on small screens; sidebar overlays the page when opened. */
        padding-left: 0;
        padding-top: calc(52px + env(safe-area-inset-top, 0px));
        /* Allow horizontal scroll for the letter-sized page if user zooms out. */
        overflow-x: auto;
      }

      .topbar {
        height: calc(52px + env(safe-area-inset-top, 0px));
        padding: env(safe-area-inset-top, 0)
                 max(8px, env(safe-area-inset-right, 0))
                 0
                 max(8px, env(safe-area-inset-left, 0));
        gap: 5px;
        overflow-x: auto;
      }
      .topbar h1 {
        font-size: 13px;
        margin: 0 4px 0 0;
        white-space: nowrap;
      }
      .topbar button {
        padding: 9px 10px;
        font-size: 12px;
        flex-shrink: 0;
        min-height: 36px;
        white-space: nowrap;
      }
      .topbar .hint { display: none; }
      .topbar .spacer { flex: 1; }

      /* Sidebar already overlays content on all screen sizes; only the
         sidebar top offset needs to track the taller mobile topbar. */
      .sidebar,
      .sidebar-backdrop {
        top: calc(52px + env(safe-area-inset-top, 0px));
      }

      /* Bigger tap targets in sidebar */
      .sidebar-block-list button {
        padding: 11px 12px;
        font-size: 13px;
        min-height: 44px;
      }
      .sidebar-fmt-row button { min-height: 36px; }
      .sidebar-icon-grid button { min-height: 38px; }
      .sidebar-toggle {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      /* Scale the letter-size page down to fit the viewport */
      .pages-container {
        padding: 12px 0 30px;
        gap: 14px;
      }
      .page {
        /* Use CSS transform to keep the print layout intact while shrinking visually. */
        transform: scale(var(--page-scale, 1));
        transform-origin: top center;
        margin-bottom: var(--page-margin-fix, 0px);
      }

      /* Step number badge needs a bit more bottom margin since it sits above */
      .row-step:first-child { margin-top: 6px; }

      /* Touch target hint for hover-only controls */
      .step-image .clear-btn,
      .parts-row-delete,
      .parts-col-delete,
      .photoarray-cell .clear-btn,
      .photoarray-row-delete {
        visibility: visible;
      }
      /* Photo array: clear-btn is display:none by default; on mobile always show */
      .photoarray-cell .clear-btn { display: block; }
      /* Permanently show block controls on mobile (touch can't hover) */
      .block-controls { opacity: 1; }
      .block-controls button {
        width: 28px;
        height: 28px;
        font-size: 13px;
      }
    }

    @media screen and (max-width: 600px) {
      .topbar h1 { display: none; }
      .topbar button { padding: 8px 10px; font-size: 12px; }
      .topbar .btn-label-full { display: none; }
      .topbar .btn-label-short { display: inline; }
    }

    /* ---------- Print rules ---------- */
    @page {
      size: letter;
      margin: 0;
    }

    @media print {
      html, body {
        background: white;
        margin: 0;
        padding: 0 !important;
      }
      .topbar, .sidebar, .sidebar-backdrop, .no-print, .block-controls { display: none !important; }
      .step-image .clear-btn, .logo-area .clear-btn,
      .photoarray-cell .clear-btn, .photoarray-row-delete,
      .photoarray-add-row, .photoarray-add-image { display: none !important; }
      /* Photo array: hide empty cell placeholder text in print, and drop the
         dashed border on cells that don't have an image. */
      .photoarray-cell:not(.has-image) .placeholder { display: none; }
      .photoarray-cell:not(.has-image) {
        background: white;
        border: 1px solid #bbb;
      }
      .pages-container { padding: 0; gap: 0; }
      .page {
        box-shadow: none;
        margin: 0 !important;
        /* In print we DO want to clip to page bounds so no-print stragglers
           and any overflow stays out of the printed sheet. (Base CSS keeps
           overflow visible on screen so action strips remain accessible.) */
        overflow: hidden;
        /* Defensive: undo any mobile transform/margin that might leak into
           print (Safari iOS especially) so the page renders at full 8.5x11
           and doesn't leave blank space below it. */
        transform: none !important;
        margin-bottom: 0 !important;
        page-break-after: always;
        break-after: page;
        /* Prefer to keep an entire .page on a single physical page. */
        break-inside: avoid-page;
        page-break-inside: avoid;
      }
      /* Empty pages only: collapse to content size. Fixed 11in works on
         desktop where the browser respects @page margin: 0, but mobile
         Safari/Chrome reserve ~1in for their own print headers/footers
         regardless of CSS, so an 11in EMPTY page would overflow into a
         phantom physical page 2. Pages with content keep the fixed 11in
         height so their footer stays pinned to the bottom of the page on
         every device. (On mobile, very-content-heavy pages can still
         overflow if the user has browser print headers/footers enabled;
         that's a browser-level setting, not something CSS can override.) */
      .page.is-empty {
        height: auto !important;
        min-height: 0 !important;
      }
      .page:last-child { page-break-after: auto; break-after: auto; }
      .step-image:not(.has-image) {
        background: white;
        border: 1px solid #bbb;
      }
      .step-image:not(.has-image) .placeholder { display: none; }
      .logo-area:not(.has-image) { border: none; }
      .logo-area:not(.has-image) .placeholder { display: none; }
      .title-field::placeholder,
      .meta-field input::placeholder,
      .photoarray-caption::placeholder { color: transparent !important; }
      /* Photo caption: keep the text, drop the editor chrome. */
      .photoarray-caption {
        border-top: 1px solid #ddd;
        background: transparent;
      }
      /* When a caption has no value, hide the input entirely so the image
         area expands to fill the full cell height. This also dodges the iOS
         Safari quirk where `::placeholder { color: transparent }` is
         sometimes ignored, leaving the literal word "Caption" on the page. */
      .photoarray-caption:placeholder-shown { display: none; }
      .step-text:empty::before,
      .callout-text:empty::before,
      .textbox-text:empty::before,
      .section-header-text:empty::before { content: ''; }
      .step-text:focus, .callout-text:focus, .textbox-text:focus { background: transparent; }
      /* Textbox: drop visible border in print so it reads as plain text */
      .textbox-block { border-color: transparent !important; padding: 0 !important; }
      .empty-state { display: none; }
    }
  </style>
</head>
<body>

<header class="topbar no-print">
  <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Toggle menu" aria-controls="sidebar" aria-expanded="true" title="Open menu">
    <span class="hamburger-icon" aria-hidden="true"><span></span></span>
  </button>
  <h1>Work Instruction Builder</h1>
  <span class="spacer"></span>
  <button class="primary" onclick="window.print()">
    <span class="btn-label-full">Print / Save PDF</span>
    <span class="btn-label-short">Print</span>
  </button>
  <button onclick="exportTemplate()">
    <span class="btn-label-full">Save File</span>
    <span class="btn-label-short">Save</span>
  </button>
  <button onclick="importTemplate()">
    <span class="btn-label-full">Load File</span>
    <span class="btn-label-short">Load</span>
  </button>
  <button onclick="newDocument()">
    <span class="btn-label-full">Clear All</span>
    <span class="btn-label-short">Clear</span>
  </button>
</header>

<aside class="sidebar no-print" id="sidebar" aria-label="Editing tools">
  <div class="sidebar-header">
    <span>Tools</span>
    <button class="sidebar-toggle" id="sidebarCollapseBtn" type="button" title="Close menu" aria-label="Close menu" aria-controls="sidebar" aria-expanded="true">✕</button>
  </div>

  <div class="sidebar-section">
    <h3>Insert Block</h3>
    <div class="sidebar-block-list">
      <button class="add-section"    data-add="section"                      type="button" title="Add a section title">+ Section Title</button>
      <button class="add-step"       data-add="step"                         type="button" title="Add an image and text block">+ Image | Text</button>
      <button class="add-photoarray" data-add="photoarray"                   type="button" title="Add a photo array (3-column grid of images)">+ Photo Array</button>
      <button class="add-textbox"    data-add="textbox"                      type="button" title="Add a plain text box">+ Text Box</button>
      <button class="add-parts"      data-add="parts"                        type="button" title="Add a chart / table">+ Chart</button>
      <button class="add-finding"    data-add="callout" data-kind="finding"  type="button" title="Add a Finding banner">+ Finding</button>
      <button class="add-concern"    data-add="callout" data-kind="concern"  type="button" title="Add a Concern banner">+ Concern</button>
      <button class="add-analysis"   data-add="callout" data-kind="analysis" type="button" title="Add an Analysis banner">+ Analysis</button>
      <button class="add-warning"    data-add="callout" data-kind="warning"  type="button" title="Add a Warning banner">+ Warning</button>
      <button class="add-caution"    data-add="callout" data-kind="caution"  type="button" title="Add a Caution banner">+ Caution</button>
      <button class="add-note"       data-add="callout" data-kind="note"     type="button" title="Add a Note banner">+ Note</button>
      <button class="add-watch"      data-add="callout" data-kind="watch"    type="button" title="Add a Tip banner">+ Tip</button>
      <button class="add-monitor"    data-add="callout" data-kind="monitor"  type="button" title="Add a Monitor banner">+ Monitor</button>
      <button class="add-record"     data-add="callout" data-kind="record"   type="button" title="Add a Record banner">+ Record</button>
      <button class="add-tools"      data-add="callout" data-kind="tools"    type="button" title="Add a Tools banner">+ Tools</button>
      <button class="add-inspect"    data-add="callout" data-kind="inspect"  type="button" title="Add an Inspect banner">+ Inspect</button>
      <button class="add-measure"    data-add="callout" data-kind="measure"  type="button" title="Add a Measure banner">+ Measure</button>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>Format Text</h3>
    <div class="sidebar-fmt-row">
      <button class="fmt-bold" data-cmd="bold" type="button" title="Bold (toggle)">B</button>
      <span class="label">Size:</span>
      <button class="size-btn" data-cmd="fontSize" data-arg="2" type="button" title="Small text">S</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="3" type="button" title="Normal text">N</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="4" type="button" title="Medium text">M</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="5" type="button" title="Large text">L</button>
    </div>
    <div class="sidebar-fmt-row">
      <span class="label">Color:</span>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#595959" style="background:#595959" type="button" title="Charcoal (default)" aria-label="Charcoal"></button>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#b3261e" style="background:#b3261e" type="button" title="Red" aria-label="Red"></button>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#1565c0" style="background:#1565c0" type="button" title="Blue" aria-label="Blue"></button>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#2e7d32" style="background:#2e7d32" type="button" title="Green" aria-label="Green"></button>
    </div>
    <h4>Inline icon badges</h4>
    <div class="sidebar-icon-grid">
      <button class="fmt-icon-warning" data-icon="warning" type="button" title="Inline WARNING badge">⚠ WARNING</button>
      <button class="fmt-icon-caution" data-icon="caution" type="button" title="Inline CAUTION badge">⚠ CAUTION</button>
      <button class="fmt-icon-inspect" data-icon="inspect" type="button" title="Inline INSPECT badge">◉ INSPECT</button>
      <button class="fmt-icon-torque"  data-icon="torque"  type="button" title="Inline TORQUE badge">⚙ TORQUE</button>
    </div>
    <button class="sidebar-clear-btn" data-cmd="removeFormat" type="button" title="Clear formatting from selection">⌫ Clear formatting</button>
  </div>
</aside>

<div class="sidebar-backdrop no-print" id="sidebarBackdrop"></div>

<!--
  Floating format toolbar. Appears when any rich-text editor has focus and
  hides when focus moves elsewhere. Lives outside the sidebar so the user
  doesn't have to open the hamburger menu just to bold a word.
  Buttons share data-cmd / data-icon attributes with the sidebar version,
  so setupFormatToolbar() picks them up automatically.
-->
<div class="floating-fmt-toolbar no-print" id="floatingFormatToolbar" hidden>
  <button class="fmt-bold" data-cmd="bold" type="button" title="Bold (toggle)">B</button>
  <span class="floating-fmt-sep"></span>
  <span class="floating-fmt-label">Size</span>
  <button class="size-btn" data-cmd="fontSize" data-arg="2" type="button" title="Small">S</button>
  <button class="size-btn" data-cmd="fontSize" data-arg="3" type="button" title="Normal">N</button>
  <button class="size-btn" data-cmd="fontSize" data-arg="4" type="button" title="Medium">M</button>
  <button class="size-btn" data-cmd="fontSize" data-arg="5" type="button" title="Large">L</button>
  <span class="floating-fmt-sep"></span>
  <span class="floating-fmt-label">Color</span>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#595959" style="background:#595959" type="button" title="Charcoal" aria-label="Charcoal"></button>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#b3261e" style="background:#b3261e" type="button" title="Red" aria-label="Red"></button>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#1565c0" style="background:#1565c0" type="button" title="Blue" aria-label="Blue"></button>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#2e7d32" style="background:#2e7d32" type="button" title="Green" aria-label="Green"></button>

</div>

<div id="pagesContainer" class="pages-container"></div>
<div id="toast" class="toast no-print"></div>
<div class="drop-indicator no-print" id="dropIndicator"></div>

<script>
(function () {
  'use strict';

  // ---------- Storage ----------
  // v3: blocks-based document model. Older keys are migrated on first load.
  const STORAGE_KEY = 'workInstructionBuilder_v4';
  const LEGACY_KEYS = [
    'workInstructionBuilder_v3',
    'workInstructionBuilder_v2',
    'workInstructionBuilder_v1'
  ];

  // ---------- Pagination constants (inches) ----------
  // Available content height per page is ~8.98in (11 - 0.7 padding - ~1.07 header
  // - ~0.25 footer). Use 8.9 as a safety threshold.
  const PAGE_CONTENT_HEIGHT = 9.20;
  const STEP_ROW_HEIGHT     = 2.20;
  const CALLOUT_ROW_HEIGHT  = 0.32;
  const SECTION_ROW_HEIGHT  = 0.60;
  const ROW_GAP             = 0.10;
  // Optional title bar (Image|Text and Photo Array). Bar height equals
  // its CSS layout (4px top + ~14px text + 4px bottom ≈ 22px ≈ 0.23in).
  // The pagination math adds this whenever block.title is a string, since
  // that's when the bar actually renders.
  const TITLE_BAR_HEIGHT    = 0.23;

  // Parts list table heights:
  // Brown header bar (~0.30") + column header row (~0.25")
  // + each data row (~0.22") + action footer (~0.27", visible on screen, hidden in print)
  const PARTS_BASE_HEIGHT = 0.85;
  const PARTS_ROW_HEIGHT  = 0.22;

  // ---------- Callout kinds ----------
  // The `key` is what's stored in saved files. The `label` is what's shown.
  // Icons are no longer rendered on the badge - left here as data only in
  // case anyone wants to revive them later.
  const CALLOUT_KINDS = {
    warning:   { label: 'WARNING',  icon: '\u26A0' },  // ⚠
    caution:   { label: 'CAUTION',  icon: '\u26A0' },  // ⚠
    note:      { label: 'NOTE',     icon: '\u2139' },  // ℹ
    watch:     { label: 'TIP',      icon: '\u2757' },  // ❗ (key 'watch' kept for back-compat)
    monitor:   { label: 'MONITOR',  icon: '\u25C9' },  // ◉
    record:    { label: 'RECORD',   icon: '\u270E' },  // ✎
    tools:     { label: 'TOOLS',    icon: '\u2692' },  // ⚒
    inspect:   { label: 'INSPECT',  icon: '\u2315' },  // ⌕
    measure:   { label: 'MEASURE',  icon: '\u2194' },  // ↔
    finding:   { label: 'FINDING',  icon: '' },
    concern:   { label: 'CONCERN',  icon: '' },
    analysis:  { label: 'ANALYSIS', icon: '' }
  };

  // ---------- Form type schemas ----------
  // Each form type has a label (shown in the dropdown), title placeholder
  // text, and an ordered list of metadata fields. Field keys are stable
  // identifiers stored in saved files; labels can be changed without
  // breaking back-compat.
  const FORM_TYPES = {
    blank: {
      label: 'Blank',
      titlePlaceholder: 'Form Title',
      fields: []
    },
    workInstruction: {
      label: 'Work Instruction',
      titlePlaceholder: 'Work Instruction Title (e.g., Turbocharger Cartridge Assembly)',
      fields: [
        { key: 'partNumber', label: 'Part #',    width: 110 },
        { key: 'operation',  label: 'Operation', width: 130 },
        { key: 'rev',        label: 'Rev',       width: 50  },
        { key: 'date',       label: 'Date',      width: 90  }
      ]
    },
    sampleProductAnalysis: {
      label: 'Sample Product Analysis',
      titlePlaceholder: 'Sample Product Analysis Title',
      fields: [
        { key: 'vendor',           label: 'Vendor',           width: 120 },
        { key: 'vendorPartNumber', label: 'Vendor Part #',    width: 110 },
        { key: 'pdiPartNumber',    label: 'PDI Part #',       width: 110 },
        { key: 'partDescription',  label: 'Part Description', width: 180 },
        { key: 'date',             label: 'Date',             width: 90  }
      ]
    },
    incomingQuality: {
      label: 'Incoming Quality Inspection',
      titlePlaceholder: 'Incoming Quality Inspection Title',
      fields: [
        { key: 'vendor',          label: 'Vendor',          width: 110 },
        { key: 'inspectionDate',  label: 'Inspection Date', width: 95  },
        { key: 'inspector',       label: 'Inspector',       width: 110 },
        { key: 'pdiPoNumber',     label: 'PDI PO #',        width: 100 },
        { key: 'lotNumber',       label: 'Lot #',           width: 90  },
        { key: 'pdiPartNumber',   label: 'PDI Part #',      width: 100 },
        { key: 'partDescription', label: 'Part Description', width: 150 },
        { key: 'sampleQty',       label: 'Sample Qty',      width: 70  }
      ]
    },
    warranty: {
      label: 'Warranty Analysis',
      titlePlaceholder: 'Warranty Analysis Title',
      fields: [
        { key: 'customerName',      label: 'Customer Name',      width: 140 },
        { key: 'partNumber',        label: 'Part #',             width: 100 },
        { key: 'quantity',          label: 'Qty',                width: 60  },
        { key: 'installDate',       label: 'Install Date',       width: 90  },
        { key: 'failDate',          label: 'Fail Date',          width: 90  },
        { key: 'customerComplaint', label: 'Customer Complaint', width: 180 }
      ]
    }
  };

  function getFormSchema(formType) {
    return FORM_TYPES[formType] || FORM_TYPES.blank;
  }
  // _idCounter must be declared before state is constructed because
  // createEmptyState() -> createDefaultBlocks() -> genId() reads it.
  let _idCounter = 0;
  let state = createEmptyState();
  let lastFocusedEditable = null;
  let lastFocusedBlockId = null;
  let focusBlockIdAfterRender = null;
  // Transient UI state: which photo array rows are currently showing an
  // "extra" placeholder cell that the user requested via "+ Add Photo".
  // Key: blockId + '__' + rowIdx, value: number of pending placeholders.
  // Never persisted - only valid for this in-memory session, and reset on
  // the user uploading to the placeholder, deleting the row, or refreshing.
  const pendingPhotoSlot = new Map();

  // Transient UI state for the Chart (parts) block's drag-to-select multi-cell
  // gesture. Selected cells are highlighted; when a format-toolbar button is
  // clicked while a selection is non-empty, the format applies to every
  // selected cell instead of only the single focused cell.
  //   partsCellSelection: Map<blockId, Set<"rowIdx-colIdx">>
  //   partsDrag: drag-in-progress state; null when idle.
  const partsCellSelection = new Map();
  let partsDrag = null;

  // Drag-and-drop state
  let _dragData = null;
  let _dragInsertIdx = -1;
  let _lastMousedownEl = null;

  function genId() {
    _idCounter += 1;
    return 'b_' + Date.now().toString(36) + '_' + _idCounter.toString(36);
  }

  function createStepBlock(img, text) {
    return {
      id: genId(),
      type: 'step',
      img: img == null ? null : img,
      text: text == null ? '' : text
    };
  }

  function createCalloutBlock(kind, text) {
    return {
      id: genId(),
      type: 'callout',
      kind: CALLOUT_KINDS[kind] ? kind : 'note',
      text: text == null ? '' : text
    };
  }

  function createSectionBlock(text) {
    return {
      id: genId(),
      type: 'section',
      text: text == null ? '' : text
    };
  }

  function createPartsBlock(columns, rows, title) {
    const cols = Array.isArray(columns) && columns.length > 0
      ? columns.slice()
      : ['Part Number', 'Description', 'Quantity'];
    let rs;
    if (Array.isArray(rows) && rows.length > 0) {
      rs = rows.map(r => {
        const out = Array(cols.length).fill('');
        if (Array.isArray(r)) {
          for (let i = 0; i < Math.min(r.length, cols.length); i++) {
            out[i] = typeof r[i] === 'string' ? r[i] : '';
          }
        }
        return out;
      });
    } else {
      rs = [Array(cols.length).fill('')];
    }
    return {
      id: genId(),
      type: 'parts',
      title: typeof title === 'string' ? title : '',
      columns: cols,
      rows: rs
    };
  }

  function createPhotoArrayBlock(rows) {
    // rows is an array of row arrays; each row array holds 3 entries (cells).
    // Each entry is either null or { src: dataUrl, caption: string }.
    // Older callers may still pass plain string data URLs; we coerce those
    // to the object form here so the rest of the code only deals with one
    // shape.
    function coerceCell(c) {
      if (!c) return null;
      if (typeof c === 'string') return { src: c, caption: '' };
      if (typeof c === 'object' && typeof c.src === 'string' && c.src) {
        return { src: c.src, caption: typeof c.caption === 'string' ? c.caption : '' };
      }
      return null;
    }
    let rs;
    if (Array.isArray(rows) && rows.length > 0) {
      rs = rows.map(r => {
        const out = [null, null, null];
        if (Array.isArray(r)) {
          out[0] = coerceCell(r[0]);
          out[1] = coerceCell(r[1]);
          out[2] = coerceCell(r[2]);
        }
        return out;
      });
    } else {
      rs = [[null, null, null]];
    }
    return {
      id: genId(),
      type: 'photoarray',
      rows: rs
    };
  }

  function createTextBoxBlock(text) {
    return {
      id: genId(),
      type: 'textbox',
      text: text == null ? '' : text
    };
  }

  function createEmptyState() {
    return {
      logo: null,
      title: '',
      formType: 'blank',
      metaFields: {},
      blocks: []
    };
  }

  // ---------- Migration ----------
  // Older saves stored partNumber/operation/rev/date as top-level fields.
  // Newer schema moves those into state.metaFields and adds a formType.
  function migrateLegacyState(old) {
    if (!old || typeof old !== 'object') return null;

    // Helper: pull legacy top-level keys into a metaFields object.
    function legacyMeta() {
      const m = {};
      ['partNumber', 'operation', 'rev', 'date'].forEach(k => {
        if (typeof old[k] === 'string' && old[k]) m[k] = old[k];
      });
      return m;
    }

    // Decide formType: if any legacy WI fields are populated, assume the
    // file is a work instruction; otherwise default to blank.
    function decideFormType(meta) {
      if (typeof old.formType === 'string' && FORM_TYPES[old.formType]) {
        return old.formType;
      }
      const hasWiData = ['partNumber', 'operation', 'rev', 'date']
        .some(k => meta[k] && meta[k].trim());
      return hasWiData ? 'workInstruction' : 'blank';
    }

    // v3+ (blocks array exists). Filter empty placeholder steps.
    if (Array.isArray(old.blocks)) {
      const blocks = old.blocks.filter(b => {
        if (!b) return false;
        if (b.type !== 'step' && b.type !== 'callout' && b.type !== 'section' && b.type !== 'parts' && b.type !== 'photoarray' && b.type !== 'textbox') return false;
        if (b.type === 'callout') return true;
        if (b.type === 'parts') return true;
        if (b.type === 'photoarray') return true;
        if (b.type === 'textbox') return true;
        if (b.type === 'section') {
          const hasText = typeof b.text === 'string' && b.text.replace(/<[^>]*>/g, '').trim().length > 0;
          return hasText;
        }
        // step
        const hasImg = !!b.img;
        const hasText = typeof b.text === 'string' && b.text.replace(/<[^>]*>/g, '').trim().length > 0;
        return hasImg || hasText;
      });

      // metaFields: prefer the new format if present, otherwise migrate legacy keys.
      let meta;
      if (old.metaFields && typeof old.metaFields === 'object') {
        meta = {};
        Object.keys(old.metaFields).forEach(k => {
          const v = old.metaFields[k];
          if (typeof v === 'string') meta[k] = v;
        });
      } else {
        meta = legacyMeta();
      }

      return {
        logo: old.logo || null,
        title: old.title || '',
        formType: decideFormType(meta),
        metaFields: meta,
        blocks: blocks
      };
    }

    // v1/v2 had pages of steps
    if (Array.isArray(old.pages)) {
      const blocks = [];
      for (const page of old.pages) {
        if (!page || !Array.isArray(page.steps)) continue;
        for (const step of page.steps) {
          if (!step) continue;
          const hasImg = !!step.img;
          const hasText = typeof step.text === 'string' && step.text.trim().length > 0;
          if (hasImg || hasText) {
            blocks.push(createStepBlock(step.img || null, step.text || ''));
          }
        }
      }
      const meta = legacyMeta();
      return {
        logo: old.logo || null,
        title: old.title || '',
        formType: decideFormType(meta),
        metaFields: meta,
        blocks: blocks
      };
    }
    return null;
  }

  function normalizeState(s) {
    if (!s || typeof s !== 'object') return createEmptyState();
    if (typeof s.logo === 'undefined') s.logo = null;
    if (typeof s.title !== 'string') s.title = '';

    // Form type: validate against the schema list
    if (typeof s.formType !== 'string' || !FORM_TYPES[s.formType]) {
      // Try to infer from legacy top-level keys (in case migration didn't happen)
      const legacyKeys = ['partNumber', 'operation', 'rev', 'date'];
      const hasWi = legacyKeys.some(k => typeof s[k] === 'string' && s[k]);
      s.formType = hasWi ? 'workInstruction' : 'blank';
    }

    // Meta fields: ensure object, migrate any legacy top-level WI keys.
    if (!s.metaFields || typeof s.metaFields !== 'object') {
      s.metaFields = {};
    }
    ['partNumber', 'operation', 'rev', 'date'].forEach(k => {
      if (typeof s[k] === 'string' && s[k] && !s.metaFields[k]) {
        s.metaFields[k] = s[k];
      }
      delete s[k];
    });
    // Coerce non-string meta values
    Object.keys(s.metaFields).forEach(k => {
      if (typeof s.metaFields[k] !== 'string') s.metaFields[k] = '';
    });

    if (!Array.isArray(s.blocks)) s.blocks = [];

    // In-place upgrade: previous versions stored Parts List as a callout.
    // Convert any { type: 'callout', kind: 'parts' } into a structured parts table.
    s.blocks = s.blocks.map(b => {
      if (b && b.type === 'callout' && b.kind === 'parts') {
        const text = (typeof b.text === 'string' ? b.text : '').replace(/<[^>]*>/g, '').trim();
        return {
          id: b.id || genId(),
          type: 'parts',
          columns: ['Part Number', 'Description', 'Quantity'],
          rows: text ? [['', text, '']] : [['', '', '']]
        };
      }
      return b;
    });

    s.blocks = s.blocks.filter(b => b && (
      b.type === 'step' ||
      b.type === 'callout' ||
      b.type === 'section' ||
      b.type === 'parts' ||
      b.type === 'photoarray' ||
      b.type === 'textbox'
    ));
    s.blocks.forEach(b => {
      if (!b.id) b.id = genId();
      // precedingSpacers: integer count of "spacer" rows to render above this
      // block. Each spacer occupies one block-height of vertical space and
      // is added/removed by the down/up arrows on the last block (a way to
      // push a block lower on the page in block-height increments). Spacers
      // can spill onto a previous/next page just like real rows.
      if (typeof b.precedingSpacers !== 'number' || !isFinite(b.precedingSpacers) || b.precedingSpacers < 0) {
        b.precedingSpacers = 0;
      } else {
        b.precedingSpacers = Math.floor(b.precedingSpacers);
      }
      // Back-compat: prior versions used forcePageBreakBefore=true to push a
      // block onto the next page. Convert that to one spacer (the closest
      // approximation), then drop the field. If the user wants more space
      // they can keep clicking down.
      if (b.forcePageBreakBefore === true && b.precedingSpacers === 0) {
        b.precedingSpacers = 1;
      }
      delete b.forcePageBreakBefore;
      if (b.type === 'step') {
        if (typeof b.img === 'undefined') b.img = null;
        if (typeof b.text !== 'string') b.text = '';
        // Drop any legacy orientation field; the layout is now fixed at 2.5x2.5.
        if ('orientation' in b) delete b.orientation;
        // Optional title bar above the image/text. Undefined = no bar,
        // string (even '') = bar rendered. Anything else collapses to no bar.
        if ('title' in b && typeof b.title !== 'string') delete b.title;
