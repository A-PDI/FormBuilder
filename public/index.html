      } else if (b.type === 'callout') {
        if (!CALLOUT_KINDS[b.kind]) b.kind = 'note';
        if (typeof b.text !== 'string') b.text = '';
        if (typeof b.color !== 'string' || !/^#[0-9a-fA-F]{3,8}$/.test(b.color)) {
          delete b.color;
        }
      } else if (b.type === 'section') {
        if (typeof b.text !== 'string') b.text = '';
      } else if (b.type === 'parts') {
        // Title text shown in the parts header bar. Editable. Default to
        // empty so the placeholder shows; legacy blocks without a title
        // get coerced to '' here.
        if (typeof b.title !== 'string') b.title = '';
        // Defaults
        if (!Array.isArray(b.columns) || b.columns.length === 0) {
          b.columns = ['Part Number', 'Description', 'Quantity'];
        }
        b.columns = b.columns.map(c => typeof c === 'string' ? c : '');
        if (!Array.isArray(b.rows)) b.rows = [];
        // Normalize each row to match the columns length
        b.rows = b.rows.map(r => {
          const out = Array(b.columns.length).fill('');
          if (Array.isArray(r)) {
            for (let i = 0; i < Math.min(r.length, b.columns.length); i++) {
              out[i] = typeof r[i] === 'string' ? r[i] : '';
            }
          }
          return out;
        });
        if (b.rows.length === 0) {
          b.rows = [Array(b.columns.length).fill('')];
        }
      } else if (b.type === 'photoarray') {
        if (!Array.isArray(b.rows)) b.rows = [];
        b.rows = b.rows.map(r => {
          // Pull populated entries (in their original slot order), normalize
          // each to the {src, caption} object form, then pad with nulls.
          // Result: left-compacted [a, b, null] / [a, null, null] / [a, b, c]
          // / [null, null, null]. The display layer relies on this invariant
          // to determine how many cells to render.
          const populated = [];
          if (Array.isArray(r)) {
            for (let i = 0; i < Math.min(r.length, 3); i++) {
              const c = r[i];
              if (typeof c === 'string' && c) {
                // Legacy: bare data URL
                populated.push({ src: c, caption: '' });
              } else if (c && typeof c === 'object' && typeof c.src === 'string' && c.src) {
                populated.push({
                  src: c.src,
                  caption: typeof c.caption === 'string' ? c.caption : ''
                });
              }
            }
          }
          while (populated.length < 3) populated.push(null);
          return populated;
        });
        if (b.rows.length === 0) {
          b.rows = [[null, null, null]];
        }
        if ('orientation' in b) delete b.orientation;
        // Optional title bar above the photo grid. Undefined = no bar,
        // string = bar rendered with that text. See step branch above.
        if ('title' in b && typeof b.title !== 'string') delete b.title;
      } else if (b.type === 'textbox') {
        if (typeof b.text !== 'string') b.text = '';
      }
    });
    return s;
  }

  // ---------- Persistence ----------
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      // Quota likely exceeded with many large images. Don't block work —
      // user can still save to file.
      console.warn('Auto-save skipped (storage limit). Use "Save File" to keep your work.', e);
    }
  }

  function loadState() {
    // Try the current schema key first
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        if (parsed && Array.isArray(parsed.blocks)) {
          // Detect if normalization will rewrite the shape (legacy top-level
          // fields, missing formType, non-compact photoarray rows) so we can
          // persist the cleaned-up version on load instead of waiting for the
          // next user action.
          const hasNonCompactPhotoarray = parsed.blocks.some(b => {
            if (!b || b.type !== 'photoarray' || !Array.isArray(b.rows)) return false;
            // A row is non-compact if a populated cell appears AFTER an empty
            // one. The simplest check: any null that has a populated cell to
            // its right.
            return b.rows.some(r => {
              if (!Array.isArray(r)) return true; // any malformed row triggers rewrite
              for (let i = 0; i < r.length - 1; i++) {
                if (!r[i] && r.slice(i + 1).some(x => !!x)) return true;
              }
              return false;
            });
          });
          const hasLegacyStringPhoto = parsed.blocks.some(b => {
            if (!b || b.type !== 'photoarray' || !Array.isArray(b.rows)) return false;
            return b.rows.some(r => Array.isArray(r) && r.some(c => typeof c === 'string'));
          });
          // Legacy field from a prior version: forcePageBreakBefore is now
          // migrated into precedingSpacers. Detecting it here ensures the
          // migrated shape gets persisted back so we don't redo the work
          // on every load.
          const hasLegacyPageBreak = parsed.blocks.some(b => b && 'forcePageBreakBefore' in b);
          const needsRewrite =
            !parsed.metaFields ||
            typeof parsed.formType !== 'string' ||
            'partNumber' in parsed ||
            'operation'  in parsed ||
            'rev'        in parsed ||
            'date'       in parsed ||
            hasNonCompactPhotoarray ||
            hasLegacyStringPhoto ||
            hasLegacyPageBreak;
          state = normalizeState(parsed);
          if (needsRewrite) saveState();
          return true;
        }
      }
    } catch (e) {
      console.warn('Could not load saved state:', e);
    }
    // Fall back to legacy keys
    for (const key of LEGACY_KEYS) {
      try {
        const data = localStorage.getItem(key);
        if (!data) continue;
        const parsed = JSON.parse(data);
        const migrated = migrateLegacyState(parsed);
        if (migrated) {
          state = normalizeState(migrated);
          saveState(); // Persist under current key
          return true;
        }
      } catch (e) {
        console.warn('Could not migrate legacy state from', key, e);
      }
    }
    return false;
  }

  // ---------- Image processing ----------
  // For JPEG output, fill the canvas white first so transparent source pixels
  // (e.g. PNGs with the background removed) don't go black on re-encode.
  function processImage(file, opts) {
    return new Promise((resolve, reject) => {
      if (!file || !file.type || !file.type.startsWith('image/')) {
        reject(new Error('Selected file is not an image.'));
        return;
      }
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Failed to read image file.'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('Failed to decode image.'));
        img.onload = () => {
          try {
            const maxW = opts.maxWidth;
            const maxH = opts.maxHeight;
            let w = img.naturalWidth || img.width;
            let h = img.naturalHeight || img.height;
            if (w > maxW || h > maxH) {
              const ratio = Math.min(maxW / w, maxH / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');

            if (opts.mimeType === 'image/jpeg') {
              ctx.fillStyle = '#FFFFFF';
              ctx.fillRect(0, 0, w, h);
            }
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL(opts.mimeType, opts.quality));
          } catch (err) {
            reject(err);
          }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function loadLogoFile(file) {
    return processImage(file, {
      maxWidth: 800, maxHeight: 400, mimeType: 'image/png', quality: 1.0
    });
  }

  function loadStepImageFile(file) {
    return processImage(file, {
      maxWidth: 1600, maxHeight: 1600, mimeType: 'image/jpeg', quality: 0.85
    });
  }

  function pickFile(accept) {
    return new Promise((resolve) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = accept || 'image/*';
      input.onchange = () => {
        resolve(input.files && input.files[0] ? input.files[0] : null);
      };
      input.click();
    });
  }

  // ---------- Block helpers ----------
  function findBlockById(id) {
    return state.blocks.find(b => b.id === id) || null;
  }

  function findBlockIndex(id) {
    return state.blocks.findIndex(b => b.id === id);
  }

  // ---------- Folding blocks into rows ----------
  // Steps pair greedily into 2-up rows; callouts always force a row break
  // and take their own full-width row.
  // The "spacer" is a unit of vertical empty space that the user can stack
  // before a block by clicking the down arrow on the last block. One spacer
  // = one row-equivalent of the block - so clicking down on a step adds a
  // step-height of space, clicking down on a callout adds a callout-height
  // of space, etc. Photo arrays use one photo-row's worth.
  function estimateSpacerHeight(block) {
    if (!block) return STEP_ROW_HEIGHT;
    let h;
    if (block.type === 'callout')           h = estimateCalloutHeight(block);
    else if (block.type === 'section')      h = SECTION_ROW_HEIGHT;
    else if (block.type === 'parts')        h = estimatePartsHeight(block);
    else if (block.type === 'photoarray')   h = 2.50;
    else if (block.type === 'textbox')      h = estimateTextBoxHeight(block);
    else                                    h = STEP_ROW_HEIGHT;
    // The optional title bar is part of the block's visible height. Including
    // it here means one down-arrow click moves the block down by exactly its
    // own rendered height, matching the user's mental model.
    if ((block.type === 'step' || block.type === 'photoarray')
        && typeof block.title === 'string') {
      h += TITLE_BAR_HEIGHT;
    }
    return h;
  }

  function blocksToRows(blocks) {
    // Each block now occupies its own full-width row. Steps, callouts, and
    // section headers are structurally identical from a pagination standpoint;
    // only their height differs (handled in paginate()).
    //
    // Photo arrays are special: each interior row is independently
    // paginatable so a multi-row block can split across pages instead of
    // forcing the whole block to bump to a new page (which would leave the
    // previous page mostly empty).
    //
    // precedingSpacers prepends N "spacer" rows before the block - that's
    // how the down-arrow-on-last-block UX leaves block-height-sized empty
    // gaps on the page.
    const rows = [];
    for (const block of blocks) {
      const sh = estimateSpacerHeight(block);
      const spacers = Math.max(0, block.precedingSpacers | 0);
      for (let s = 0; s < spacers; s++) {
        rows.push({ type: 'spacer', block, height: sh });
      }
      if (block.type === 'callout') {
        rows.push({ type: 'callout', block });
      } else if (block.type === 'step') {
        rows.push({ type: 'step', block });
      } else if (block.type === 'section') {
        rows.push({ type: 'section', block });
      } else if (block.type === 'parts') {
        rows.push({ type: 'parts', block });
      } else if (block.type === 'photoarray') {
        const numRows = (Array.isArray(block.rows) && block.rows.length > 0)
          ? block.rows.length : 1;
        for (let i = 0; i < numRows; i++) {
          rows.push({
            type: 'photoarrayrow',
            block,
            rowIdx: i,
            isFirstInBlock: i === 0,
            isLastInBlock: i === numRows - 1
          });
        }
      } else if (block.type === 'textbox') {
        rows.push({ type: 'textbox', block });
      }
    }
    return rows;
  }

  // ---------- Pagination ----------

  // Estimate how many visual lines a callout's HTML will occupy at the current
  // text width. We translate explicit <br>/<div>/<p> boundaries to newlines,
  // strip remaining markup, then estimate wrap on each logical line based on
  // an approximate character budget. Conservative on the high side so we
  // don't under-allocate space.
  function countCalloutLines(html) {
    if (!html) return 1;
    const normalized = html
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/(div|p)\s*>/gi, '\n')
      .replace(/<(div|p)[^>]*>/gi, '');
    const plain = normalized
      .replace(/<[^>]*>/g, '')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'");
    if (!plain.trim()) return 1;

    // Available text width on the page is roughly:
    //   page (8.5") - page padding (0.6") - badge (~0.85") - text padding (~0.2")
    //   ≈ 6.85" ≈ 657px. At 11px font with mixed casing avg ~5.8px/char, ~113
    // chars/line. Round down for safety.
    const CHARS_PER_LINE = 100;

    let totalLines = 0;
    for (const line of plain.split('\n')) {
      if (line.length === 0) {
        totalLines += 1;
      } else {
        totalLines += Math.max(1, Math.ceil(line.length / CHARS_PER_LINE));
      }
    }
    return Math.max(1, totalLines);
  }

  function estimateCalloutHeight(block) {
    const lines = countCalloutLines(block.text || '');
    if (lines <= 1) return CALLOUT_ROW_HEIGHT;
    // Each additional wrapped line at 11px / line-height 1.35 ≈ 14.85px ≈ 0.155in.
    // Add a touch of slop for safety.
    const ADDITIONAL_LINE = 0.16;
    return CALLOUT_ROW_HEIGHT + (lines - 1) * ADDITIONAL_LINE;
  }

  function estimatePartsHeight(block) {
    const rows = (block && Array.isArray(block.rows)) ? block.rows.length : 1;
    return PARTS_BASE_HEIGHT + Math.max(1, rows) * PARTS_ROW_HEIGHT;
  }

  // Photo array: each row holds three 2.50in square cells, separated by 0.10in gaps.
  function estimatePhotoArrayHeight(block) {
    const rows = (block && Array.isArray(block.rows)) ? Math.max(1, block.rows.length) : 1;
    const PHOTOROW = 2.50;
    const PHOTOGAP = 0.10;
    return rows * PHOTOROW + (rows - 1) * PHOTOGAP;
  }

  // Text box: estimate by line count (10–11px text wraps at ~110 chars/line in
  // a full-width row). Conservative on the high side.
  function estimateTextBoxHeight(block) {
    if (!block || typeof block.text !== 'string' || !block.text.trim()) {
      return 0.50;
    }
    const plain = block.text
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/(div|p)\s*>/gi, '\n')
      .replace(/<(div|p)[^>]*>/gi, '')
      .replace(/<[^>]*>/g, '')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>');
    const CHARS_PER_LINE = 110;
    let lines = 0;
    for (const line of plain.split('\n')) {
      lines += line.length === 0 ? 1 : Math.ceil(line.length / CHARS_PER_LINE);
    }
    lines = Math.max(1, lines);
    // 11px font / 1.4 line-height = ~15.4px ≈ 0.16in per line; plus 0.18in padding/border.
    return 0.18 + lines * 0.16;
  }

  function paginate(rows) {
    const pages = [];
    let cur = [];
    let h = 0;
    for (const row of rows) {
      let rh;
      if (row.type === 'spacer') {
        rh = row.height;
      } else if (row.type === 'callout') {
        rh = estimateCalloutHeight(row.block);
      } else if (row.type === 'section') {
        rh = SECTION_ROW_HEIGHT;
      } else if (row.type === 'parts') {
        rh = estimatePartsHeight(row.block);
      } else if (row.type === 'photoarrayrow') {
        // Single photo-array row. ROW_GAP added by paginate covers the
        // 0.10in gap between consecutive rows of the same block (matching
        // the original full-block estimate of N*2.50 + (N-1)*0.10).
        rh = 2.50;
        // Title bar appears once per block on its FIRST row only.
        if (row.isFirstInBlock && typeof row.block.title === 'string') {
          rh += TITLE_BAR_HEIGHT;
        }
      } else if (row.type === 'textbox') {
        rh = estimateTextBoxHeight(row.block);
      } else {
        // step
        rh = STEP_ROW_HEIGHT;
        if (typeof row.block.title === 'string') {
          rh += TITLE_BAR_HEIGHT;
        }
      }
      const needed = (cur.length > 0 ? ROW_GAP : 0) + rh;
      if (h + needed > PAGE_CONTENT_HEIGHT && cur.length > 0) {
        pages.push(cur);
        cur = [];
        h = 0;
      }
      const addH = (cur.length > 0 ? ROW_GAP : 0) + rh;
      cur.push(row);
      h += addH;
    }
    if (cur.length > 0) pages.push(cur);
    return pages;
  }

  // ---------- Render ----------
  function render() {
    // Assign global step numbers based on order in the document
    let n = 0;
    state.blocks.forEach(b => {
      if (b.type === 'step') {
        n += 1;
        b._number = n;
      }
    });

    const rows = blocksToRows(state.blocks);
    let pages = paginate(rows);
    if (pages.length === 0) pages = [[]];

    const container = document.getElementById('pagesContainer');
    container.innerHTML = '';
    pages.forEach((pageRows, pageIdx) => {
      container.appendChild(buildPageElement(pageRows, pageIdx, pages.length));
    });

    // Restore focus to a freshly-inserted/moved block, if any.
    if (focusBlockIdAfterRender) {
      const block = findBlockById(focusBlockIdAfterRender);
      const el = document.querySelector('[data-block-id="' + focusBlockIdAfterRender + '"]');
      if (el && block) {
        let target = null;
        // Pick the right entry point per block type.
        if (block.type === 'parts') {
          // Skip column headers; land in the first body data cell.
          target = el.querySelector('tbody .parts-cell');
        } else if (block.type === 'photoarray') {
          // No editable text; focus the first photo cell so the user can
          // press Enter / Space (or just see where to click) to upload.
          target = el.querySelector('.photoarray-cell');
        } else {
          // step / callout / section / textbox: focus the first rich-text editor
          target = el.querySelector('.rich-text-editor');
        }
        if (target) {
          target.focus();
          // For contenteditable targets, place the caret at the end so the
          // user can start typing immediately.
          if (target.contentEditable === 'true' || target.isContentEditable) {
            try {
              const range = document.createRange();
              range.selectNodeContents(target);
              range.collapse(false);
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(range);
            } catch (e) {
              // Selection APIs can fail in obscure cases; not critical.
            }
          }
          // Scroll the new block into view if it's off-screen.
          if (typeof target.scrollIntoView === 'function') {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }
      focusBlockIdAfterRender = null;
    }
  }

  function buildPageElement(rows, pageIdx, totalPages) {
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    // Tag pages with no content rows. Print CSS uses this to collapse the
    // page to its content size (header + footer only), avoiding a phantom
    // blank physical page on mobile - while leaving full-height behaviour in
    // place for pages that DO have content, so their footer stays pinned to
    // the bottom of the printed page.
    if (rows.length === 0) {
      pageEl.classList.add('is-empty');
    }

    pageEl.appendChild(buildHeader());

    const content = document.createElement('div');
    content.className = 'content-area';

    if (rows.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state no-print';
      empty.innerHTML =
        '<div class="empty-state-title">Empty document</div>' +
        '<div class="empty-state-body">Use the <strong>Insert Block</strong> menu in the sidebar to add steps and callouts.</div>';
      content.appendChild(empty);
    } else {
      // Coalesce consecutive photoarrayrow entries from the same block into a
      // single chunk. A photo array can split across pages but each page's
      // chunk is rendered as a single block element (so the user sees one
      // tidy block, not a separate sub-block per row).
      const coalesced = [];
      let i = 0;
      while (i < rows.length) {
        const row = rows[i];
        if (row.type === 'photoarrayrow') {
          const block = row.block;
          const rowIndices = [row.rowIdx];
          let j = i + 1;
          while (j < rows.length && rows[j].type === 'photoarrayrow' && rows[j].block === block) {
            rowIndices.push(rows[j].rowIdx);
            j++;
          }
          coalesced.push({
            type: 'photoarraychunk',
            block,
            rowIndices,
            // Block controls (move/delete) appear on the first chunk of the
            // block; the "+ Row" affordance appears on the last chunk.
            isFirstChunk: rowIndices[0] === 0,
            isLastChunk: rowIndices[rowIndices.length - 1] === (block.rows.length - 1)
          });
          i = j;
        } else {
          coalesced.push(row);
          i++;
        }
      }
      coalesced.forEach(row => content.appendChild(buildRowElement(row)));
    }
    pageEl.appendChild(content);

    const footer = document.createElement('div');
    footer.className = 'page-footer';
    // Build the footer DOM safely: setting innerHTML with raw user data would
    // be an XSS vector. textContent escapes everything. Title falls back to
    // a neutral placeholder when blank.
    const leftSpan = document.createElement('span');
    leftSpan.className = 'page-footer-title';
    leftSpan.textContent = (state.title && state.title.trim()) || 'Untitled';
    const rightSpan = document.createElement('span');
    rightSpan.className = 'page-footer-pageno';
    rightSpan.textContent = 'Page ' + (pageIdx + 1) + ' of ' + totalPages;
    footer.appendChild(leftSpan);
    footer.appendChild(rightSpan);
    pageEl.appendChild(footer);

    return pageEl;
  }

  function buildHeader() {
    const header = document.createElement('div');
    header.className = 'header';

    // ----- Logo -----
    const logo = document.createElement('div');
    logo.className = 'logo-area' + (state.logo ? ' has-image' : '');
    logo.title = 'Click or drop an image to set the company logo';
    logo.addEventListener('click', (e) => {
      if (e.target.classList && e.target.classList.contains('clear-btn')) return;
      handleLogoUpload();
    });
    attachDropTarget(logo, async (file) => {
      try {
        state.logo = await loadLogoFile(file);
        saveState();
        render();
      } catch (err) {
        alert('Could not load logo: ' + err.message);
      }
    });

    if (state.logo) {
      const img = document.createElement('img');
      img.src = state.logo;
      img.alt = 'Company logo';
      logo.appendChild(img);
      logo.appendChild(buildClearButton('Remove logo', (e) => {
        e.stopPropagation();
        state.logo = null;
        saveState();
        render();
      }));
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = 'Click to upload<br>company logo';
      logo.appendChild(ph);
    }
    header.appendChild(logo);

    // ----- Header info -----
    const info = document.createElement('div');
    info.className = 'header-info';

    const schema = getFormSchema(state.formType);

    // Title row: title input + form-type selector on the right.
    // The selector only renders on the first page (rendered header is also
    // duplicated on subsequent pages, but the selector is no-print and only
    // editable from the first instance to avoid confusion).
    const titleRow = document.createElement('div');
    titleRow.className = 'title-row';

    const title = document.createElement('input');
    title.className = 'title-field';
    title.type = 'text';
    title.placeholder = schema.titlePlaceholder;
    title.value = state.title || '';
    title.dataset.headerField = 'title';
    title.addEventListener('input', () => {
      state.title = title.value;
      saveState();
      syncHeaderField('title', title.value, title);
    });
    titleRow.appendChild(title);

    // Form-type selector (no-print)
    const typeWrap = document.createElement('div');
    typeWrap.className = 'form-type-selector no-print';
    const typeLabel = document.createElement('label');
    typeLabel.textContent = 'Form Type:';
    const typeSelect = document.createElement('select');
    typeSelect.className = 'form-type-select';
    Object.keys(FORM_TYPES).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = FORM_TYPES[key].label;
      if (key === state.formType) opt.selected = true;
      typeSelect.appendChild(opt);
    });
    typeSelect.addEventListener('change', () => {
      handleFormTypeChange(typeSelect.value);
    });
    typeWrap.appendChild(typeLabel);
    typeWrap.appendChild(typeSelect);
    titleRow.appendChild(typeWrap);

    info.appendChild(titleRow);

    // Meta-field row(s) - schema-driven. If the schema has no fields (e.g.
    // 'blank'), skip the row entirely.
    if (schema.fields.length > 0) {
      const metaRow = document.createElement('div');
      metaRow.className = 'meta-row';

      schema.fields.forEach(f => {
        const wrap = document.createElement('div');
        wrap.className = 'meta-field';
        const label = document.createElement('label');
        label.textContent = f.label + ':';
        const input = document.createElement('input');
        input.type = 'text';
        input.style.width = f.width + 'px';
        input.value = (state.metaFields && state.metaFields[f.key]) || '';
        input.dataset.headerField = f.key;
        input.addEventListener('input', () => {
          if (!state.metaFields) state.metaFields = {};
          state.metaFields[f.key] = input.value;
          saveState();
          syncHeaderField(f.key, input.value, input);
        });
        wrap.appendChild(label);
        wrap.appendChild(input);
        metaRow.appendChild(wrap);
      });
      info.appendChild(metaRow);
    }

    header.appendChild(info);
    return header;
  }

  function handleFormTypeChange(newType) {
    if (!FORM_TYPES[newType] || newType === state.formType) return;
    // Determine which meta fields would be lost in the switch.
    const oldKeys = Object.keys(state.metaFields || {})
      .filter(k => state.metaFields[k] && state.metaFields[k].trim());
    const newKeys = new Set(getFormSchema(newType).fields.map(f => f.key));
    const orphaned = oldKeys.filter(k => !newKeys.has(k));

    if (orphaned.length > 0) {
      const labels = orphaned.map(k => '"' + k + '"').join(', ');
      const ok = confirm(
        'Switching form types will discard data in fields not used by ' +
        'the new form: ' + labels + '. Continue?'
      );
      if (!ok) {
        // Revert the dropdown selection
        const sel = document.querySelector('.form-type-select');
        if (sel) sel.value = state.formType;
        return;
      }
      // Drop orphaned fields
      orphaned.forEach(k => { delete state.metaFields[k]; });
    }

    state.formType = newType;
    saveState();
    render();
  }

  // The header is duplicated on every page; sync without re-rendering so
  // typing doesn't lose focus.
  function syncHeaderField(field, value, sourceEl) {
    const matches = document.querySelectorAll('[data-header-field="' + field + '"]');
    matches.forEach(el => {
      if (el !== sourceEl && el.value !== value) el.value = value;
    });
    // Title also appears in every page footer; update those without a full re-render.
    if (field === 'title') {
      const display = (typeof value === 'string' && value.trim()) ? value : 'Untitled';
      document.querySelectorAll('.page-footer-title').forEach(el => {
        el.textContent = display;
      });
    }
  }

  function buildRowElement(row) {
    if (row.type === 'spacer') {
      const el = document.createElement('div');
      el.className = 'row row-spacer';
      // Height drives the visible gap. The block reference is purely for
      // diagnostics (data-attribute) - spacers have no controls or text.
      el.style.height = row.height + 'in';
      el.setAttribute('aria-hidden', 'true');
      if (row.block && row.block.id) el.dataset.spacerForBlock = row.block.id;
      return el;
    }
    if (row.type === 'callout') {
      const el = document.createElement('div');
      el.className = 'row row-callout';
      el.dataset.rowBlockId = row.block.id;
      el.appendChild(buildCalloutElement(row.block));
      return el;
    }
    if (row.type === 'section') {
      const el = document.createElement('div');
      el.className = 'row row-section';
      el.dataset.rowBlockId = row.block.id;
      el.appendChild(buildSectionElement(row.block));
      return el;
    }
    if (row.type === 'parts') {
      const el = document.createElement('div');
      el.className = 'row row-parts';
      el.dataset.rowBlockId = row.block.id;
      el.appendChild(buildPartsElement(row.block));
      return el;
    }
    if (row.type === 'photoarraychunk') {
      const el = document.createElement('div');
      el.className = 'row row-photoarray';
      el.dataset.rowBlockId = row.block.id;
      // Optional title bar above the photo grid. Only on the FIRST chunk -
      // a multi-page photo array shouldn't repeat its title on every page.
      if (row.isFirstChunk && typeof row.block.title === 'string') {
        el.appendChild(buildBlockTitleBar(row.block));
      }
      el.appendChild(buildPhotoArrayElement(row.block, {
        rowIndices: row.rowIndices,
        isFirstChunk: row.isFirstChunk,
        isLastChunk: row.isLastChunk
      }));
      return el;
    }
    if (row.type === 'photoarray') {
      // Legacy path - building the full block (no split). Used by tests and
      // any caller that bypassed blocksToRows expansion.
      const el = document.createElement('div');
      el.className = 'row row-photoarray';
      el.dataset.rowBlockId = row.block.id;
      if (typeof row.block.title === 'string') {
        el.appendChild(buildBlockTitleBar(row.block));
      }
      el.appendChild(buildPhotoArrayElement(row.block));
      return el;
    }
    if (row.type === 'textbox') {
      const el = document.createElement('div');
      el.className = 'row row-textbox';
      el.dataset.rowBlockId = row.block.id;
      el.appendChild(buildTextBoxElement(row.block));
      return el;
    }
    // step
    const el = document.createElement('div');
    el.className = 'row row-step';
    el.dataset.rowBlockId = row.block.id;
    if (typeof row.block.title === 'string') {
      el.appendChild(buildBlockTitleBar(row.block));
    }
    el.appendChild(buildStepElement(row.block));
    return el;
  }

  function buildStepElement(block) {
    const el = document.createElement('div');
    // .has-title relocates the step-number badge inside the step body so
    // it doesn't try to "stick out" above the cobalt title bar.
    el.className = 'step' + (typeof block.title === 'string' ? ' has-title' : '');
    el.dataset.blockId = block.id;

    const num = document.createElement('div');
    num.className = 'step-number';
    num.textContent = block._number != null ? block._number : '';
    el.appendChild(num);

    el.appendChild(buildBlockControls(block));

    // ----- Image area -----
    const imgArea = document.createElement('div');
    imgArea.className = 'step-image' + (block.img ? ' has-image' : '');
    imgArea.title = 'Click or drop an image';
    imgArea.addEventListener('click', (e) => {
      if (e.target.closest('.clear-btn') || e.target.closest('.block-controls')) return;
      handleStepImageUpload(block.id);
    });
    attachDropTarget(imgArea, async (file) => {
      try {
        const dataUrl = await loadStepImageFile(file);
        const b = findBlockById(block.id);
        if (b) {
          b.img = dataUrl;
          saveState();
          render();
        }
      } catch (err) {
        alert('Could not load image: ' + err.message);
      }
    });

    if (block.img) {
      const img = document.createElement('img');
      img.src = block.img;
      img.alt = 'Step ' + (block._number != null ? block._number : '') + ' image';
      imgArea.appendChild(img);
      imgArea.appendChild(buildClearButton('Remove image', (e) => {
        e.stopPropagation();
        const b = findBlockById(block.id);
        if (b) {
          b.img = null;
          saveState();
          render();
        }
      }));
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = 'Click to upload image<br><small>or drag &amp; drop</small>';
      imgArea.appendChild(ph);
    }
    el.appendChild(imgArea);

    // ----- Editable text -----
    const text = document.createElement('div');
    text.className = 'step-text rich-text-editor';
    text.contentEditable = 'true';
    text.dataset.placeholder = 'Type instruction text here...';
    text.spellcheck = true;
    text.innerHTML = block.text || '';
    text.dataset.blockId = block.id;
    text.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b) {
        b.text = text.innerHTML;
        saveState();
      }
    });
    text.addEventListener('blur', () => {
      // Browsers leave a stray <br> when the field is fully cleared; reset
      // so the placeholder reappears.
      if (text.innerHTML === '<br>' || text.textContent.trim() === '') {
        text.innerHTML = '';
        const b = findBlockById(block.id);
        if (b) {
          b.text = '';
          saveState();
        }
      }
    });
    el.appendChild(text);

    return el;
  }

  function buildPartsElement(block) {
    const el = document.createElement('div');
    el.className = 'parts-block';
    el.dataset.blockId = block.id;

    // ----- Header bar with editable title -----
    const header = document.createElement('div');
    header.className = 'parts-header';
    const headerLabel = document.createElement('div');
    headerLabel.className = 'parts-header-label rich-text-editor';
    headerLabel.contentEditable = 'true';
    headerLabel.spellcheck = true;
    headerLabel.dataset.placeholder = 'Chart title';
    headerLabel.dataset.blockId = block.id;
    headerLabel.innerHTML = block.title || '';
    // Single-line: block Enter, strip newlines from paste.
    headerLabel.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        headerLabel.blur();
      }
    });
    headerLabel.addEventListener('paste', (e) => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      if (!cd) return;
      const raw = cd.getData('text/plain') || '';
      const flat = raw.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
      if (flat) document.execCommand('insertText', false, flat);
    });
    headerLabel.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b) {
        b.title = headerLabel.innerHTML;
        saveState();
      }
    });
    headerLabel.addEventListener('blur', () => {
      // Reset stray <br> so placeholder reappears when fully cleared.
      if (headerLabel.innerHTML === '<br>' || headerLabel.textContent.trim() === '') {
        headerLabel.innerHTML = '';
        const b = findBlockById(block.id);
        if (b) {
          b.title = '';
          saveState();
        }
      }
    });
    header.appendChild(headerLabel);
    el.appendChild(header);

    // ----- Block controls (move/delete the whole table) -----
    el.appendChild(buildBlockControls(block));

    // ----- Table -----
    const table = document.createElement('table');
    table.className = 'parts-table';

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');

    block.columns.forEach((colName, colIdx) => {
      const th = document.createElement('th');
      th.appendChild(buildPartsCell(block.id, colName, {
        isHeader: true,
        colIdx: colIdx,
        placeholder: 'Column',
        onChange: (value) => {
          const b = findBlockById(block.id);
          if (b && Array.isArray(b.columns)) {
            b.columns[colIdx] = value;
            saveState();
          }
        }
      }));
      // Column delete (only if more than 1 column)
      if (block.columns.length > 1) {
        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'parts-col-delete no-print';
        delBtn.title = 'Delete this column';
        delBtn.textContent = '\u2715';  // ✕
        delBtn.addEventListener('mousedown', e => e.preventDefault());
        delBtn.addEventListener('click', () => removePartsColumn(block.id, colIdx));
        th.appendChild(delBtn);
      }
      headerRow.appendChild(th);
    });

    // Right gutter for row-action buttons
    const gutterTh = document.createElement('th');
    gutterTh.className = 'parts-actions-col no-print';
    headerRow.appendChild(gutterTh);

    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    block.rows.forEach((row, rowIdx) => {
      const tr = document.createElement('tr');
      block.columns.forEach((_, colIdx) => {
        const td = document.createElement('td');
        td.appendChild(buildPartsCell(block.id, row[colIdx] || '', {
          isHeader: false,
          rowIdx: rowIdx,
          colIdx: colIdx,
          placeholder: '',
          onChange: (value) => {
            const b = findBlockById(block.id);
            if (b && Array.isArray(b.rows) && b.rows[rowIdx]) {
              b.rows[rowIdx][colIdx] = value;
              saveState();
            }
          }
        }));
        tr.appendChild(td);
      });
      // Row delete in gutter (only if more than 1 row)
      const gutterTd = document.createElement('td');
      gutterTd.className = 'parts-actions-col no-print';
      if (block.rows.length > 1) {
        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'parts-row-delete';
        delBtn.title = 'Delete this row';
        delBtn.textContent = '\u2715';  // ✕
        delBtn.addEventListener('mousedown', e => e.preventDefault());
        delBtn.addEventListener('click', () => removePartsRow(block.id, rowIdx));
        gutterTd.appendChild(delBtn);
      }
      tr.appendChild(gutterTd);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    el.appendChild(table);

    // ----- Action footer (no-print) -----
    const actions = document.createElement('div');
    actions.className = 'parts-actions no-print';

    const addRowBtn = document.createElement('button');
    addRowBtn.type = 'button';
    addRowBtn.textContent = '+ Row';
    addRowBtn.title = 'Add a new row to the parts list';
    addRowBtn.addEventListener('mousedown', e => e.preventDefault());
    addRowBtn.addEventListener('click', () => addPartsRow(block.id));
    actions.appendChild(addRowBtn);

    const addColBtn = document.createElement('button');
    addColBtn.type = 'button';
    addColBtn.textContent = '+ Column';
    addColBtn.title = 'Add a new column to the parts list';
    addColBtn.addEventListener('mousedown', e => e.preventDefault());
    addColBtn.addEventListener('click', () => addPartsColumn(block.id));
    actions.appendChild(addColBtn);

    const hint = document.createElement('span');
    hint.className = 'parts-paste-hint';
    hint.textContent = 'Tip: paste tabular data from Excel directly into a cell';
    actions.appendChild(hint);

    el.appendChild(actions);

    return el;
  }

  function buildPartsCell(blockId, initialValue, opts) {
    // Each cell is a single-line contenteditable div. Tab moves to next cell
    // (browser default since each cell is a separate focusable contenteditable).
    const cell = document.createElement('div');
    const isHeader = !!opts.isHeader;
    cell.className = 'parts-cell' + (isHeader ? ' parts-col-header' : ' rich-text-editor');
    cell.contentEditable = 'true';
    cell.spellcheck = !isHeader;
    cell.dataset.blockId = blockId;
    if (opts.placeholder) {
      cell.dataset.placeholder = opts.placeholder;
    }
    // Body cells store HTML (so bold/color/font-size from the format toolbar
    // round-trip through save/load). Column headers are kept as plain text
    // - the saved column name is just a label, formatting it would be
    // confusing.
    if (isHeader) {
      cell.textContent = initialValue || '';
    } else {
      cell.innerHTML = initialValue || '';
      // Body cells participate in the multi-cell drag selection.
      cell.dataset.partsRow = opts.rowIdx;
      cell.dataset.partsCol = opts.colIdx;
      attachPartsCellDragHandlers(cell, blockId, opts.rowIdx, opts.colIdx);
    }
    // Single-line: block Enter
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        cell.blur();
      }
    });
    // Paste handler: detect tab/newline-delimited data (e.g. from Excel) and
    // distribute it across cells starting from the current one. Single-cell
    // pastes still go in flat as plain text.
    cell.addEventListener('paste', (e) => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      if (!cd) return;
      const raw = cd.getData('text/plain') || '';
      if (!raw) return;

      const grid = parseTabularPaste(raw);
      const isMultiCell = grid.length > 1 || (grid.length === 1 && grid[0].length > 1);

      if (!isMultiCell || isHeader) {
        // Single-cell paste, or paste into a column header: keep flat behavior.
        const flat = raw.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
        if (flat) {
          document.execCommand('insertText', false, flat);
        }
        return;
      }

      // Multi-cell paste into a body cell: drop the grid into the table starting here.
      pasteGridIntoTable(blockId, opts.rowIdx, opts.colIdx, grid);
    });
    cell.addEventListener('input', () => {
      if (isHeader) {
        opts.onChange(cell.textContent);
      } else {
        // Body cells round-trip HTML so format-toolbar marks survive saves.
        opts.onChange(cell.innerHTML);
      }
    });
    cell.addEventListener('blur', () => {
      if (isHeader) return;
      // Browsers leave a stray <br> when the field is fully cleared; reset
      // so the placeholder reappears.
      if (cell.innerHTML === '<br>') {
        cell.innerHTML = '';
        opts.onChange('');
      }
    });
    return cell;
  }

  // ---------- Parts: drag-to-select multi-cell selection ----------
  function clearPartsCellSelection() {
    partsCellSelection.clear();
    document.querySelectorAll('.parts-cell-selected')
      .forEach(td => td.classList.remove('parts-cell-selected'));
  }

  function applyPartsSelectionVisual() {
    // Cheaper than re-rendering: just toggle the selected class on each
    // body cell's wrapping <td> based on the current selection map.
    document.querySelectorAll('.parts-table tbody td.parts-cell-selected')
      .forEach(td => td.classList.remove('parts-cell-selected'));
    partsCellSelection.forEach((cells, blockId) => {
      const blockEl = document.querySelector('.parts-block[data-block-id="' + blockId + '"]');
      if (!blockEl) return;
      cells.forEach(key => {
        const [r, c] = key.split('-');
        const cellEl = blockEl.querySelector(
          '.parts-cell[data-parts-row="' + r + '"][data-parts-col="' + c + '"]'
        );
        if (cellEl && cellEl.parentElement) {
          cellEl.parentElement.classList.add('parts-cell-selected');
        }
      });
    });
  }

  function extendPartsSelection(blockId, r1, c1, r2, c2) {
    const minR = Math.min(r1, r2);
    const maxR = Math.max(r1, r2);
    const minC = Math.min(c1, c2);
    const maxC = Math.max(c1, c2);
    const set = new Set();
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        set.add(r + '-' + c);
      }
    }
    // Replace any previous selection on this block - the drag starts fresh
    // each mousedown.
    partsCellSelection.set(blockId, set);
    applyPartsSelectionVisual();
  }

  function attachPartsCellDragHandlers(cell, blockId, rowIdx, colIdx) {
    cell.addEventListener('mousedown', (e) => {
      // Left button only. Don't interfere with right-click, middle-click, etc.
      if (e.button !== 0) return;
      // A fresh mousedown clears any previous selection (across all blocks)
      // so the user can drag a brand new range without first clicking off.
      clearPartsCellSelection();
      partsDrag = {
        blockId: blockId,
        startRow: rowIdx,
        startCol: colIdx,
        hasMoved: false
      };
    });
    cell.addEventListener('mouseenter', () => {
      // Drag must be active AND moving into a NEW cell to count as a
      // multi-cell selection gesture. A single click that never moves
      // leaves no selection (regular text-cursor placement).
      if (!partsDrag || partsDrag.blockId !== blockId) return;
      if (partsDrag.startRow === rowIdx && partsDrag.startCol === colIdx) return;
      partsDrag.hasMoved = true;
      extendPartsSelection(blockId, partsDrag.startRow, partsDrag.startCol, rowIdx, colIdx);
    });
  }

  // Global mouseup ends the drag. If the user never moved into another cell
  // the selection map stays clear (mousedown reset it but we never extended)
  // - that's a plain click, not a multi-cell gesture.
  document.addEventListener('mouseup', () => {
    if (partsDrag) partsDrag = null;
  });
  // Clicking anywhere outside any parts-table body cell clears the
  // selection so it doesn't linger after the user has moved on. Exempt
  // the format toolbars - those are valid follow-up interactions on an
  // active multi-cell selection (their buttons preventDefault on mousedown
  // to preserve the selection).
  document.addEventListener('mousedown', (e) => {
    if (partsCellSelection.size === 0) return;
    const t = e.target;
    if (!t || !t.closest) return;
    if (t.closest('.parts-table tbody .parts-cell')) return;
    if (t.closest('.floating-fmt-toolbar')) return;
    if (t.closest('.sidebar')) return;
    clearPartsCellSelection();
  });

  // ---------- Parts: tabular paste handling ----------

  // Parse plain-text tabular data (TSV / CSV / pipe-delimited / multi-space).
  // Excel and Google Sheets put tab-separated values on the clipboard, with
  // newlines between rows. We accept other reasonable delimiters too.
  function parseTabularPaste(raw) {
    // Normalize line endings, drop any trailing blank line that Excel adds.
    const lines = raw.replace(/\r\n?/g, '\n').replace(/\n+$/, '').split('\n');
    if (lines.length === 0) return [[]];

    // Pick a delimiter: TSV first (Excel default), then CSV, then pipe, then
    // 2+ spaces. Fall back to "single cell per line" if none match.
    let delimiter = null;
    if (lines.some(l => l.indexOf('\t') !== -1)) {
      delimiter = '\t';
    } else if (lines.some(l => l.indexOf(',') !== -1)) {
      // CSV-ish. We use a real splitter that handles quoted fields.
      return lines.map(parseCsvLine);
    } else if (lines.some(l => l.indexOf('|') !== -1)) {
      delimiter = '|';
    } else if (lines.some(l => /\S {2,}\S/.test(l))) {
      // Multi-space-delimited (e.g. fixed-width text)
      return lines.map(l => l.split(/ {2,}/).map(c => c.trim()));
    }

    if (delimiter !== null) {
      return lines.map(l => l.split(delimiter).map(c => c.trim()));
    }
    return lines.map(l => [l.trim()]);
  }

  // Split one CSV line, respecting "double quoted" fields (handles escaped "")
  function parseCsvLine(line) {
    const out = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"') {
          if (line[i + 1] === '"') { cur += '"'; i++; }
          else { inQuotes = false; }
        } else {
          cur += ch;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          out.push(cur.trim());
          cur = '';
        } else {
          cur += ch;
        }
      }
    }
    out.push(cur.trim());
    return out;
  }

  // Drop a 2D grid of values into the table starting at (rowIdx, colIdx).
  // Grows rows and columns as needed so nothing is silently truncated.
  function pasteGridIntoTable(blockId, rowIdx, colIdx, grid) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'parts') return;
    if (typeof rowIdx !== 'number' || typeof colIdx !== 'number') return;

    const rowsNeeded = grid.length;
    const colsNeeded = grid.reduce((m, r) => Math.max(m, r.length), 0);
    if (rowsNeeded === 0 || colsNeeded === 0) return;

    // Grow columns if pasting wider than the table
    while (b.columns.length < colIdx + colsNeeded) {
      b.columns.push('Column ' + (b.columns.length + 1));
      b.rows.forEach(r => r.push(''));
    }
    // Grow rows if pasting taller than the table
    while (b.rows.length < rowIdx + rowsNeeded) {
      b.rows.push(Array(b.columns.length).fill(''));
    }
    // Stamp values
    for (let r = 0; r < rowsNeeded; r++) {
      const targetRow = rowIdx + r;
      const sourceRow = grid[r] || [];
      for (let c = 0; c < colsNeeded; c++) {
        const targetCol = colIdx + c;
        const v = (sourceRow[c] == null) ? '' : String(sourceRow[c]);
        b.rows[targetRow][targetCol] = v;
      }
    }

    saveState();
    // Re-render so the grown cells show up; restore focus to the anchor cell
    // afterwards so users can keep typing there.
    focusBlockIdAfterRender = blockId;
    render();

    // Defer focus restore until after the render so the new DOM is in place.
    setTimeout(() => {
      const sel = '.parts-block[data-block-id="' + blockId + '"] tbody tr:nth-child(' + (rowIdx + 1) + ') td:nth-child(' + (colIdx + 1) + ') .parts-cell';
      const cell = document.querySelector(sel);
      if (cell) cell.focus();
    }, 0);
  }

  // ---------- Parts table operations ----------
  function addPartsRow(blockId) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'parts') return;
    b.rows.push(Array(b.columns.length).fill(''));
    saveState();
    render();
  }

  function removePartsRow(blockId, rowIdx) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'parts') return;
    if (b.rows.length <= 1) return;  // never delete the last row
    if (rowIdx < 0 || rowIdx >= b.rows.length) return;
    const hasData = b.rows[rowIdx].some(c => c && c.trim());
    if (hasData && !confirm('Delete this row? Data will be lost.')) return;
    b.rows.splice(rowIdx, 1);
    saveState();
    render();
  }

  function addPartsColumn(blockId) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'parts') return;
    b.columns.push('Column ' + (b.columns.length + 1));
    b.rows.forEach(r => r.push(''));
    saveState();
    render();
  }

  function removePartsColumn(blockId, colIdx) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'parts') return;
    if (b.columns.length <= 1) return;  // never delete the last column
    if (colIdx < 0 || colIdx >= b.columns.length) return;
    const hasData = b.rows.some(r => r[colIdx] && r[colIdx].trim());
    if (hasData && !confirm('Delete this column? Data will be lost.')) return;
    b.columns.splice(colIdx, 1);
    b.rows.forEach(r => r.splice(colIdx, 1));
    saveState();
    render();
  }

  // ---------- Photo array element ----------
  // Keep a photo array row's data left-compacted: populated cells first,
  // padded with nulls. Display relies on this invariant. A "populated" cell
  // is an object with a non-empty src (caption is allowed to be empty).
  function compactPhotoArrayRow(row) {
    if (!Array.isArray(row)) return [null, null, null];
    const out = row.filter(c => c && typeof c === 'object' && typeof c.src === 'string' && c.src).slice(0, 3);
    while (out.length < 3) out.push(null);
    return out;
  }

  function buildPhotoArrayElement(block, chunkOpts) {
    // chunkOpts is optional. When omitted, the entire block renders (legacy
    // behavior). When supplied:
    //   - rowIndices: which row indices of block.rows to render (in order)
    //   - isFirstChunk: true if this chunk contains row 0 of the block
    //   - isLastChunk:  true if this chunk contains the last row of the block
    // Block-level controls (move/delete) appear on the first chunk only;
    // the "+ Row" affordance appears on the last chunk only. Per-row
    // controls (Delete Row / + Add Photo) live on each row regardless.
    const rowIndices = chunkOpts && Array.isArray(chunkOpts.rowIndices)
      ? chunkOpts.rowIndices
      : block.rows.map((_, i) => i);
    const isFirstChunk = chunkOpts ? !!chunkOpts.isFirstChunk : true;
    const isLastChunk  = chunkOpts ? !!chunkOpts.isLastChunk  : true;

    const el = document.createElement('div');
    el.className = 'photoarray-block';
    el.dataset.blockId = block.id;
    if (!isFirstChunk) el.classList.add('photoarray-block-continuation');

    if (isFirstChunk) el.appendChild(buildBlockControls(block));

    rowIndices.forEach(rowIdx => {
      const row = block.rows[rowIdx];
      if (!row) return;  // safety: skip out-of-range indices
      const rowWrap = document.createElement('div');
      rowWrap.className = 'photoarray-row-wrapper';

      // Count populated cells. Data is normalized to be left-compact, so the
      // count is just the leading non-null run. A populated cell is an object
      // with a non-empty src (the caption is allowed to be empty).
      const populatedCount = row.filter(c => c && c.src).length;

      // Pending placeholder cells = how many empty placeholder cells to
      // render past the populated ones. The user adds these by clicking
      // "+ Add Photo"; they let the user click-to-pick OR drag-and-drop a
      // file into a clearly visible empty box, matching the look of an
      // initially-empty row.
      const pendingKey = block.id + '__' + rowIdx;
      // Drop stale entries: pending only makes sense between 1 and 2
      // populated cells. Outside that range it's never rendered.
      if (populatedCount === 0 || populatedCount >= 3) {
        pendingPhotoSlot.delete(pendingKey);
      }
      const pending = pendingPhotoSlot.get(pendingKey) || 0;

      // Empty row: show three placeholders so the user can pick where to
      // start. Otherwise, render the populated cells plus any requested
      // pending placeholders; the count drives grid-template-columns via
      // the count-N modifier class. Capped at 3 cells per row.
      let cellsToRender;
      if (populatedCount === 0) {
        cellsToRender = 3;
      } else {
        cellsToRender = Math.min(3, populatedCount + pending);
      }
      const layoutClass = 'count-' + cellsToRender;

      const grid = document.createElement('div');
      grid.className = 'photoarray-row ' + layoutClass;

      for (let i = 0; i < cellsToRender; i++) {
        // Slot i < populatedCount renders the populated entry at that slot.
        // Slot i >= populatedCount renders a placeholder cell (entry = null).
        // The placeholder uses colIdx = i so the upload/drop handler writes
        // into the right slot.
        grid.appendChild(buildPhotoArrayCell(block.id, rowIdx, i, row[i] || null));
      }

      rowWrap.appendChild(grid);

      // Action strip below the row: holds the "+ Add Photo" and "Delete Row"
      // buttons. Built inline so they're always visible (the previous
      // floating-circle design lived in the page gutter and was easy to
      // miss). Strip is rendered only when at least one action exists.
      // Hide "+ Add Photo" once every visible cell is either populated or
      // pending - there's no room for another.
      const showAddBtn = populatedCount > 0 && (populatedCount + pending) < 3;
      const showDelBtn = block.rows.length > 1;

      if (showAddBtn || showDelBtn) {
        const actions = document.createElement('div');
        actions.className = 'photoarray-row-actions no-print';

        if (showAddBtn) {
          const addBtn = document.createElement('button');
          addBtn.type = 'button';
          addBtn.className = 'photoarray-add-image';
          addBtn.title = 'Show an empty cell to drop or click an image into';
          addBtn.textContent = '+ Add Photo';
          addBtn.addEventListener('mousedown', e => e.preventDefault());
          addBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const cur = pendingPhotoSlot.get(pendingKey) || 0;
            if (populatedCount + cur < 3) {
              pendingPhotoSlot.set(pendingKey, cur + 1);
              render();
            }
          });
          actions.appendChild(addBtn);
        }

        if (showDelBtn) {
          const del = document.createElement('button');
          del.type = 'button';
          del.className = 'photoarray-row-delete';
          del.title = 'Delete this row';
          del.textContent = 'Delete Row';
          del.addEventListener('mousedown', e => e.preventDefault());
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            removePhotoArrayRow(block.id, rowIdx);
          });
          actions.appendChild(del);
        }

        rowWrap.appendChild(actions);
      }

      el.appendChild(rowWrap);
    });

    // "+ Row" lives at the bottom of the BLOCK. When the block is split
    // across pages we only render it on the last chunk so it doesn't appear
    // mid-block.
    if (isLastChunk) {
      const addRowBtn = document.createElement('button');
      addRowBtn.type = 'button';
      addRowBtn.className = 'photoarray-add-row no-print';
      addRowBtn.textContent = '+ Row';
      addRowBtn.title = 'Add a new row of photos';
      addRowBtn.addEventListener('mousedown', e => e.preventDefault());
      addRowBtn.addEventListener('click', () => addPhotoArrayRow(block.id));
      el.appendChild(addRowBtn);
    }

    return el;
  }

  function buildPhotoArrayCell(blockId, rowIdx, colIdx, entry) {
    // entry is either null (placeholder cell) or { src, caption }.
    const imgDataUrl = entry && entry.src ? entry.src : null;
    const captionText = entry && typeof entry.caption === 'string' ? entry.caption : '';

    const cell = document.createElement('div');
    cell.className = 'photoarray-cell' + (imgDataUrl ? ' has-image' : '');
    cell.title = imgDataUrl ? 'Click to replace this image' : 'Click or drop an image';
    cell.tabIndex = 0;  // make focusable so render() can focus it after insert

    cell.addEventListener('click', (e) => {
      // Clicks on the clear button or the caption input shouldn't trigger
      // the upload picker - let those handlers run on their own.
      if (e.target.closest('.clear-btn')) return;
      if (e.target.closest('.photoarray-caption')) return;
      handlePhotoArrayUpload(blockId, rowIdx, colIdx);
    });
    // Keyboard activation: Enter or Space opens the upload picker
    cell.addEventListener('keydown', (e) => {
      // Caption input handles its own keys; don't hijack them
      if (e.target.closest('.photoarray-caption')) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handlePhotoArrayUpload(blockId, rowIdx, colIdx);
      }
    });
    attachDropTarget(cell, async (firstFile, allFiles) => {
      // Multi-file support: dropping N files starting at colIdx K fills slots
      // K, K+1, K+2 (capped at the row's 3-cell capacity). Files past the
      // capacity are ignored. Existing captions are preserved when a slot
      // already has one.
      const files = (allFiles && allFiles.length) ? allFiles : [firstFile];
      const b = findBlockById(blockId);
      if (!b || b.type !== 'photoarray' || !b.rows[rowIdx]) return;

      let wrote = 0;
      for (let fi = 0; fi < files.length; fi++) {
        const targetSlot = colIdx + fi;
        if (targetSlot >= 3) break;  // row is at capacity
        const f = files[fi];
        if (!f || !f.type || !f.type.startsWith('image/')) continue;
        try {
          const dataUrl = await loadStepImageFile(f);
          const existing = b.rows[rowIdx][targetSlot];
          const keepCaption = (existing && typeof existing === 'object' && typeof existing.caption === 'string')
            ? existing.caption : '';
          b.rows[rowIdx][targetSlot] = { src: dataUrl, caption: keepCaption };
          wrote++;
        } catch (err) {
          console.warn('Could not load image:', err && err.message);
        }
      }

      if (wrote > 0) {
        b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
        // Each file consumed one pending placeholder (if any were active).
        const k = blockId + '__' + rowIdx;
        const cur = pendingPhotoSlot.get(k) || 0;
        const next = Math.max(0, cur - wrote);
        if (next === 0) pendingPhotoSlot.delete(k);
        else pendingPhotoSlot.set(k, next);
        saveState();
        render();
      } else if (files.length === 0 || !files.some(f => f && f.type && f.type.startsWith('image/'))) {
        alert('Please drop an image file.');
      }
    });

    if (imgDataUrl) {
      // Image area takes the upper portion of the cell.
      const imgArea = document.createElement('div');
      imgArea.className = 'photoarray-cell-image';

      const img = document.createElement('img');
      img.src = imgDataUrl;
      img.alt = 'Photo';
      imgArea.appendChild(img);
      imgArea.appendChild(buildClearButton('Remove image', (e) => {
        e.stopPropagation();
        const b = findBlockById(blockId);
        if (b && b.type === 'photoarray' && b.rows[rowIdx]) {
          // Removing the image discards the caption too - they belong to the
          // same cell. If you want to keep the caption, edit the image instead.
          b.rows[rowIdx][colIdx] = null;
          b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
          saveState();
          render();
        }
      }));
      cell.appendChild(imgArea);

      // Caption input below the image. Single-line text only.
      const cap = document.createElement('input');
      cap.type = 'text';
      cap.className = 'photoarray-caption';
      cap.placeholder = 'Caption';
      cap.value = captionText;
      cap.maxLength = 200;
      cap.addEventListener('mousedown', e => e.stopPropagation());
      cap.addEventListener('click', e => e.stopPropagation());
      cap.addEventListener('input', () => {
        const b = findBlockById(blockId);
        if (b && b.type === 'photoarray' && b.rows[rowIdx] && b.rows[rowIdx][colIdx]) {
          b.rows[rowIdx][colIdx].caption = cap.value;
          saveState();
          // No render() here - the caption text is already in the input;
          // re-rendering would steal focus and lose the cursor position.
        }
      });
      cell.appendChild(cap);
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = 'Click to upload<br><small>or drag &amp; drop</small>';
      cell.appendChild(ph);
    }
    return cell;
  }

  async function handlePhotoArrayUpload(blockId, rowIdx, colIdx) {
    const file = await pickFile('image/*');
    if (!file) return;
    try {
      const dataUrl = await loadStepImageFile(file);
      const b = findBlockById(blockId);
      if (b && b.type === 'photoarray' && b.rows[rowIdx]) {
        // Preserve any caption already on this cell when replacing the image.
        const existing = b.rows[rowIdx][colIdx];
        const keepCaption = (existing && typeof existing === 'object' && typeof existing.caption === 'string')
          ? existing.caption : '';
        b.rows[rowIdx][colIdx] = { src: dataUrl, caption: keepCaption };
        // Re-compact in case caller pointed at a slot past the populated run
        // (e.g. clicking the placeholder cell rendered for + Add Photo).
        b.rows[rowIdx] = compactPhotoArrayRow(b.rows[rowIdx]);
        // A placeholder cell just became populated, so consume one pending
        // slot for this row (if any).
        const k = blockId + '__' + rowIdx;
        const cur = pendingPhotoSlot.get(k) || 0;
        if (cur > 0) {
          const next = cur - 1;
          if (next === 0) pendingPhotoSlot.delete(k);
          else pendingPhotoSlot.set(k, next);
        }
        saveState();
        render();
      }
    } catch (err) {
      alert('Could not load image: ' + err.message);
    }
  }

  function addPhotoArrayRow(blockId) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'photoarray') return;
    b.rows.push([null, null, null]);
    saveState();
    render();
  }

  function removePhotoArrayRow(blockId, rowIdx) {
    const b = findBlockById(blockId);
    if (!b || b.type !== 'photoarray') return;
    if (b.rows.length <= 1) return;
    if (rowIdx < 0 || rowIdx >= b.rows.length) return;
    const hasData = (b.rows[rowIdx][0] || b.rows[rowIdx][1] || b.rows[rowIdx][2]);
    if (hasData && !confirm('Delete this row? Photos will be lost.')) return;
    b.rows.splice(rowIdx, 1);
    // Row indices for this block shift after deletion, which makes the
    // pendingPhotoSlot keys (blockId + '__' + rowIdx) ambiguous. Cleanest
    // fix: clear all pending entries for this block. The user can re-click
    // + Add Photo on any other row to bring its placeholder back.
    for (const k of Array.from(pendingPhotoSlot.keys())) {
      if (k.startsWith(blockId + '__')) pendingPhotoSlot.delete(k);
    }
    saveState();
    render();
  }

  // ---------- Text box element ----------
  function buildTextBoxElement(block) {
    const el = document.createElement('div');
    el.className = 'textbox-block';
    el.dataset.blockId = block.id;

    el.appendChild(buildBlockControls(block));

    const text = document.createElement('div');
    text.className = 'textbox-text rich-text-editor';
    text.contentEditable = 'true';
    text.dataset.placeholder = 'Type text here...';
    text.spellcheck = true;
    text.innerHTML = block.text || '';
    text.dataset.blockId = block.id;
    text.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b) {
        b.text = text.innerHTML;
        saveState();
      }
    });
    text.addEventListener('blur', () => {
      const b = findBlockById(block.id);
      if (!b) return;
      if (text.innerHTML === '<br>' || text.textContent.trim() === '') {
        text.innerHTML = '';
        b.text = '';
        saveState();
      }
      // Re-paginate so a multi-line text box correctly reflows.
      setTimeout(() => render(), 0);
    });
    el.appendChild(text);

    return el;
  }

  function buildSectionElement(block) {
    const el = document.createElement('div');
    el.className = 'section-header';
    el.dataset.blockId = block.id;

    const text = document.createElement('div');
    text.className = 'section-header-text rich-text-editor';
    text.contentEditable = 'true';
    text.dataset.placeholder = 'Section title';
    text.spellcheck = true;
    text.innerHTML = block.text || '';
    text.dataset.blockId = block.id;
    // Single-line: block newline insertion
    text.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        text.blur();
      }
    });
    // Strip newlines/formatting from pasted content
    text.addEventListener('paste', (e) => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      if (!cd) return;
      const raw = cd.getData('text/plain') || '';
      const flat = raw.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
      if (flat) {
        document.execCommand('insertText', false, flat);
      }
    });
    text.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b) {
        b.text = text.innerHTML;
        saveState();
      }
    });
    text.addEventListener('blur', () => {
      if (text.innerHTML === '<br>' || text.textContent.trim() === '') {
        text.innerHTML = '';
        const b = findBlockById(block.id);
        if (b) {
          b.text = '';
          saveState();
        }
      }
    });
    el.appendChild(text);

    el.appendChild(buildBlockControls(block));

    return el;
  }

  function buildCalloutElement(block) {
    const meta = CALLOUT_KINDS[block.kind] || CALLOUT_KINDS.note;
    const el = document.createElement('div');
    el.className = 'callout callout-' + (CALLOUT_KINDS[block.kind] ? block.kind : 'note');
    el.dataset.blockId = block.id;
    if (block.color) {
      el.style.setProperty('--callout-color', block.color);
    }

    const badge = document.createElement('div');
    badge.className = 'callout-badge';
    badge.textContent = meta.label;
    el.appendChild(badge);

    const text = document.createElement('div');
    text.className = 'callout-text rich-text-editor';
    text.contentEditable = 'true';
    text.dataset.placeholder = 'Type ' + meta.label.toLowerCase() + ' text here...';
    text.spellcheck = true;
    text.innerHTML = block.text || '';
    text.dataset.blockId = block.id;
    // Strip rich formatting from pasted content but preserve newlines
    text.addEventListener('paste', (e) => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      if (!cd) return;
      const raw = cd.getData('text/plain') || '';
      if (raw) {
        document.execCommand('insertText', false, raw);
      }
    });
    text.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b) {
        b.text = text.innerHTML;
        saveState();
      }
    });
    text.addEventListener('blur', () => {
      // Browsers leave a stray <br> when the field is fully cleared; reset
      // so the placeholder reappears.
      const b = findBlockById(block.id);
      if (!b) return;
      if (text.innerHTML === '<br>' || text.textContent.trim() === '') {
        b.text = '';
        saveState();
      }
      // Defer the re-render so removing the focused element doesn't disrupt
      // the current event loop. This recomputes pagination based on the new
      // (possibly multi-line) callout height.
      setTimeout(() => render(), 0);
    });
    el.appendChild(text);

    el.appendChild(buildBlockControls(block));

    return el;
  }

  function buildBlockControls(block) {
    const wrap = document.createElement('div');
    wrap.className = 'block-controls no-print';

    // Drag handle - initiates block reorder drag
    const handle = document.createElement('button');
    handle.textContent = '☰';  // ☰ grip icon
    handle.title = 'Drag to reorder';
    handle.className = 'block-drag-handle';
    handle.setAttribute('draggable', 'true');
    handle.addEventListener('mousedown', (e) => e.stopPropagation());
    handle.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('application/json', JSON.stringify({ source: 'block', id: block.id }));
      _dragData = { source: 'block', id: block.id };
      document.body.classList.add('is-dragging', 'is-dragging-block');
      // Visually dim the block being dragged
      const blockEl = handle.closest('[data-block-id]');
      if (blockEl) {
        setTimeout(() => blockEl.classList.add('block-dragging'), 0);
      }
    });
    handle.addEventListener('dragend', endDrag);
    wrap.appendChild(handle);

    // Optional title bar toggle. Only step (Image|Text) and photoarray
    // blocks support a title; the button is only offered when the block
    // doesn't already have one (the title bar itself has its own ✕ for
    // removal).
    const titleAble = (block.type === 'step' || block.type === 'photoarray');
    if (titleAble && typeof block.title !== 'string') {
      const titleBtn = document.createElement('button');
      titleBtn.textContent = 'T';
      titleBtn.title = 'Add a title bar to this block';
      titleBtn.className = 'add-title';
      titleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        addBlockTitle(block.id);
      });
      wrap.appendChild(titleBtn);
    }

    // Color picker - callout blocks only
    if (block.type === 'callout') {
      const paintBtn = document.createElement('button');
      paintBtn.title = 'Change color';
      paintBtn.className = 'paint-btn';
      paintBtn.textContent = '▣';  // ▣ filled square (color indicator)
      if (block.color) paintBtn.style.color = block.color;
      paintBtn.addEventListener('mousedown', (e) => e.preventDefault());
      paintBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showColorPicker(block, paintBtn);
      });
      wrap.appendChild(paintBtn);
    }

    const upBtn = document.createElement('button');
    upBtn.textContent = '\u2191';
    upBtn.title = 'Move up';
    upBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      moveBlock(block.id, -1);
    });

    const downBtn = document.createElement('button');
    downBtn.textContent = '\u2193';
    downBtn.title = 'Move down';
    downBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      moveBlock(block.id, +1);
    });

    const delBtn = document.createElement('button');
    delBtn.textContent = '\u2715';
    delBtn.title = 'Delete';
    delBtn.className = 'delete';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteBlock(block.id);
    });

    wrap.appendChild(upBtn);
    wrap.appendChild(downBtn);
    wrap.appendChild(delBtn);
    return wrap;
  }

  // Add an optional title bar to a step or photoarray block. Sets
  // block.title to '' so it renders with the placeholder, then focuses
  // the new editable so the user can type immediately.
  function addBlockTitle(blockId) {
    const b = findBlockById(blockId);
    if (!b || (b.type !== 'step' && b.type !== 'photoarray')) return;
    if (typeof b.title === 'string') return;
    b.title = '';
    saveState();
    render();
    // Focus the newly-rendered bar so the user can start typing.
    const titleEl = document.querySelector(
      '[data-block-id="' + blockId + '"] .block-title-text'
    );
    if (titleEl) titleEl.focus();
  }

  function removeBlockTitle(blockId) {
    const b = findBlockById(blockId);
    if (!b || typeof b.title !== 'string') return;
    delete b.title;
    saveState();
    render();
  }

  // Build the title bar element. Caller is responsible for inserting it at
  // the top of the block's DOM. The bar is editable (rich-text-editor so
  // the floating format toolbar appears on focus) and carries a ✕ that
  // removes the bar entirely.
  function buildBlockTitleBar(block) {
    const bar = document.createElement('div');
    bar.className = 'block-title-bar no-print-no'; // bar prints with the block
    const text = document.createElement('div');
    text.className = 'block-title-text rich-text-editor';
    text.contentEditable = 'true';
    text.spellcheck = true;
    text.dataset.placeholder = 'Title';
    text.dataset.blockId = block.id;
    text.innerHTML = block.title || '';
    // Single-line: block Enter (blur to finish), strip newlines on paste.
    text.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        text.blur();
      }
    });
    text.addEventListener('paste', (e) => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      if (!cd) return;
      const raw = cd.getData('text/plain') || '';
      const flat = raw.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
      if (flat) document.execCommand('insertText', false, flat);
    });
    text.addEventListener('input', () => {
      const b = findBlockById(block.id);
      if (b && typeof b.title === 'string') {
        b.title = text.innerHTML;
        saveState();
      }
    });
    text.addEventListener('blur', () => {
      // Reset stray <br> so placeholder reappears on clear.
      if (text.innerHTML === '<br>' || text.textContent.trim() === '') {
        text.innerHTML = '';
        const b = findBlockById(block.id);
        if (b && typeof b.title === 'string') {
          b.title = '';
          saveState();
        }
      }
    });
    bar.appendChild(text);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'block-title-remove no-print';
    removeBtn.textContent = '\u2715';
    removeBtn.title = 'Remove title bar';
    removeBtn.addEventListener('mousedown', e => e.preventDefault());
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeBlockTitle(block.id);
    });
    bar.appendChild(removeBtn);

    return bar;
  }

  function buildClearButton(title, onClick) {
    const btn = document.createElement('button');
    btn.className = 'clear-btn no-print';
    btn.textContent = '\u2715';
    btn.title = title;
    btn.addEventListener('click', onClick);
    return btn;
  }

  function attachDropTarget(el, fileHandler) {
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      el.classList.add('dragover');
    });
    el.addEventListener('dragleave', () => {
      el.classList.remove('dragover');
    });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('dragover');
      const filesList = e.dataTransfer && e.dataTransfer.files;
      if (!filesList || !filesList[0]) return;
      const first = filesList[0];
      if (!first.type.startsWith('image/')) {
        alert('Please drop an image file.');
        return;
      }
      // Pass the first file (back-compat for single-image callers like the
      // logo and step image) plus the full list as a second argument for
      // callers that handle multi-file drops (the photo array).
      const allImages = Array.from(filesList).filter(f => f.type.startsWith('image/'));
      fileHandler(first, allImages);
    });
  }

  // ---------- Upload handlers ----------
  async function handleLogoUpload() {
    const file = await pickFile('image/*');
    if (!file) return;
    try {
      state.logo = await loadLogoFile(file);
      saveState();
      render();
    } catch (err) {
      alert('Could not load logo: ' + err.message);
    }
  }

  async function handleStepImageUpload(blockId) {
    const file = await pickFile('image/*');
    if (!file) return;
    try {
      const dataUrl = await loadStepImageFile(file);
      const b = findBlockById(blockId);
      if (b) {
