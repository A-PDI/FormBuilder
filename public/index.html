<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1D2B4F">
  <title>Work Instruction Builder</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --navy:     #1D2B4F;
      --steel:    #B8C4D8;
      --frost:    #E8EBF0;
      --charcoal: #595959;
      --white:    #FFFFFF;
      --dew:      #d0d7e3;
      /* Reds */
      --color-ember:    #b85c58;
      --color-rose:     #c07080;
      --color-blush:    #d49098;
      /* Oranges */
      --color-rust:     #b87550;
      --color-clay:     #c08560;
      --color-terra:    #c89070;
      /* Yellows */
      --color-gold:     #b89840;
      --color-straw:    #c4a860;
      --color-flax:     #d0bc80;
      /* Greens */
      --color-pine:     #477060;
      --color-fern:     #5e8a6a;
      --color-sage:     #7a9e85;
      --color-moss:     #708c60;
      --color-reed:     #90a870;
      /* Teals */
      --color-teal:     #5a8e90;
      --color-seafoam:  #6ea0a0;
      /* Blues */
      --color-cobalt:     #4e72a0;
      --color-sky:        #6888b0;
      --color-periwinkle: #8898c8;
      /* Violets */
      --color-plum:     #826090;
      --color-iris:     #7870a8;
      --color-lavender: #9888c0;
      --color-mauve:    #a07898;
      /* Legacy palette */
      --danger:   #b3261e;
      --success:  #2e7d32;
      --info:     #1565c0;
      --amber:    #f4b400;
      --orange:   #e67e22;
      --purple:   --color-lavender;
      --teal:     #00695c;
      --cyan:     #0288d1;
      --magenta:  #ad1457;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Verdana, Arial, sans-serif;
      background: #d4d7dc;
      color: var(--charcoal);
      transition: padding-left 0.2s ease;
    }

    /* ---------- Layout Base ---------- */
    body {
      padding-top: calc(48px + env(safe-area-inset-top, 0px));
      padding-left: 300px; /* Static non-overlay structure by default on desktop */
    }
    body.sidebar-collapsed {
      padding-left: 0;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 0) 14px 0 max(14px, env(safe-area-inset-right, 0));
      height: calc(48px + env(safe-area-inset-top, 0px));
      background: var(--navy);
      color: white;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 240; /* Above sidebar */
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .topbar h1 {
      margin: 0 14px 0 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .topbar button {
      padding: 7px 13px;
      border: none;
      background: var(--steel);
      color: var(--navy);
      cursor: pointer;
      border-radius: 3px;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .topbar button:hover { background: var(--frost); }
    .topbar button.primary { background: var(--success); color: white; }
    .topbar button.primary:hover { background: #3a8e3f; }
    .topbar .spacer { flex: 1; }
    .topbar .hint { font-size: 12px; opacity: 0.85; }
    .topbar .btn-label-short { display: none; }

    /* ---------- Hamburger button ---------- */
    .topbar .hamburger-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      width: 38px;
      height: 36px;
      padding: 0;
      margin-right: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .topbar .hamburger-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.6);
    }
    .topbar .hamburger-btn .hamburger-icon {
      position: relative;
      display: inline-block;
      width: 18px;
      height: 14px;
    }
    .topbar .hamburger-btn .hamburger-icon::before,
    .topbar .hamburger-btn .hamburger-icon::after,
    .topbar .hamburger-btn .hamburger-icon > span {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: white;
      border-radius: 1px;
      transition: transform 0.18s ease, opacity 0.18s ease, top 0.18s ease;
    }
    .topbar .hamburger-btn .hamburger-icon::before { top: 0; }
    .topbar .hamburger-btn .hamburger-icon > span { top: 6px; }
    .topbar .hamburger-btn .hamburger-icon::after  { top: 12px; }
    
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::before {
      top: 6px; transform: rotate(45deg);
    }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::after {
      top: 6px; transform: rotate(-45deg);
    }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon > span {
      opacity: 0;
    }

    /* ---------- Sidebar Base Layout ---------- */
    .sidebar {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      left: 0;
      bottom: 0;
      width: 300px;
      background: #f1f3f7;
      border-right: 1px solid var(--steel);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 220;
      display: flex;
      flex-direction: column;
      transform-origin: top left;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.08);
    }
    body.sidebar-collapsed .sidebar {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }

    /* Backdrop on desktop is inactive to allow parallel sheet modification */
    .sidebar-backdrop {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 210;
      opacity: 1;
      display: none; /* Inactive on full screens */
      transition: opacity 0.18s ease;
    }
    
    .sidebar-header {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px 6px 14px;
      background: var(--frost);
      border-bottom: 1px solid var(--steel);
      font-size: 11px;
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      z-index: 1;
    }
    .sidebar-toggle {
      background: white;
      border: 1px solid var(--steel);
      color: var(--charcoal);
      cursor: pointer;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 3px;
      font-size: 16px;
      font-family: inherit;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-toggle:hover { background: var(--frost); border-color: var(--navy); }
    .sidebar-section {
      padding: 12px 14px 14px;
      border-bottom: 1px solid var(--steel);
    }
    .sidebar-section:last-child { border-bottom: none; }
    .sidebar-section h3 {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--charcoal);
    }
    .sidebar-section h4 {
      margin: 12px 0 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--charcoal);
      opacity: 0.85;
    }

    .sidebar-block-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-block-list button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--steel);
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      letter-spacing: 0.3px;
    }
    .sidebar-block-list button:hover {
      filter: brightness(1.07);
      border-color: var(--navy);
    }
    .sidebar-block-list .add-step { background: #e8eaed; color: var(--charcoal); border-color: #c8ccd1; }
    .sidebar-block-list .add-warning  { background: var(--color-ember);   color: white; border-color: var(--color-ember); }
    .sidebar-block-list .add-caution  { background: var(--color-gold);    color: white; border-color: var(--color-gold); }
    .sidebar-block-list .add-note     { background: var(--color-cobalt);  color: white; border-color: var(--color-cobalt); }
    .sidebar-block-list .add-watch    { background: var(--color-rust);    color: white; border-color: var(--color-rust); }
    .sidebar-block-list .add-monitor  { background: var(--color-plum);    color: white; border-color: var(--color-plum); }
    .sidebar-block-list .add-record   { background: var(--color-pine);    color: white; border-color: var(--color-pine); }
    .sidebar-block-list .add-tools    { background: var(--color-teal);    color: white; border-color: var(--color-teal); }
    .sidebar-block-list .add-inspect  { background: var(--color-sky);     color: white; border-color: var(--color-sky); }
    .sidebar-block-list .add-measure  { background: var(--color-seafoam); color: white; border-color: var(--color-seafoam); }
    .sidebar-block-list .add-finding  { background: var(--color-fern);    color: white; border-color: var(--color-fern); }
    .sidebar-block-list .add-concern  { background: var(--color-rose);    color: white; border-color: var(--color-rose); }
    .sidebar-block-list .add-analysis { background: var(--color-iris);    color: white; border-color: var(--color-iris); }
    .sidebar-block-list .add-parts    { background: var(--color-cobalt);  color: white; border-color: var(--color-cobalt); }
    .sidebar-block-list .add-photoarray { background: #d8dde4; color: var(--charcoal); border-color: #b8c0cc; }
    .sidebar-block-list .add-textbox { background: white; color: var(--charcoal); border: 1px dashed var(--steel); font-weight: 500; font-style: italic; }
    .sidebar-block-list .add-section { background: white; color: var(--navy); border-color: var(--navy); border-width: 2px; font-weight: 800; letter-spacing: 0.4px; }

    .sidebar-fmt-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 8px; }
    .sidebar-fmt-row:last-child { margin-bottom: 0; }
    .sidebar-fmt-row .label { font-size: 11px; color: var(--charcoal); font-weight: 600; margin-right: 2px; }
    .sidebar-fmt-row button { border: 1px solid var(--steel); background: white; color: var(--charcoal); padding: 4px 9px; cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 12px; font-weight: 500; min-height: 26px; }
    .sidebar-fmt-row button:hover { border-color: var(--navy); }
    .sidebar-fmt-row button:active { background: var(--frost); }
    .sidebar-fmt-row .fmt-bold { font-weight: 800; width: 30px; font-size: 14px; }
    .sidebar-fmt-row .size-btn { width: 28px; padding: 4px 0; text-align: center; }
    .sidebar-fmt-row .size-btn[data-arg="2"] { font-size: 10px; }
    .sidebar-fmt-row .size-btn[data-arg="3"] { font-size: 12px; }
    .sidebar-fmt-row .size-btn[data-arg="4"] { font-size: 14px; }
    .sidebar-fmt-row .size-btn[data-arg="5"] { font-size: 16px; }
    .sidebar-fmt-row .color-swatch { width: 24px; height: 24px; padding: 0; border: 2px solid white; outline: 1px solid var(--steel); cursor: pointer; border-radius: 3px; min-height: 0; }
    .sidebar-fmt-row .color-swatch:hover { outline-color: var(--navy); }

    .sidebar-icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .sidebar-icon-grid button { border: 1px solid var(--steel); padding: 6px 4px; cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; min-height: 28px; print-color-adjust: exact; }
    .sidebar-icon-grid .fmt-icon-warning { background: var(--danger); color: white; border-color: var(--danger); }
    .sidebar-icon-grid .fmt-icon-caution { background: var(--amber);  color: #2c1f00; border-color: #d99e00; }
    .sidebar-icon-grid .fmt-icon-inspect { background: var(--info);   color: white; border-color: var(--info); }
    .sidebar-icon-grid .fmt-icon-torque  { background: #424242;       color: white; border-color: #424242; }

    .sidebar-clear-btn { width: 100%; margin-top: 10px; padding: 6px 8px; border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 11px; font-weight: 600; }
    .sidebar-clear-btn:hover { border-color: var(--navy); }

    /* ---------- Floating format toolbar ---------- */
    .floating-fmt-toolbar { position: fixed; top: calc(48px + env(safe-area-inset-top, 0px) + 6px); left: 50%; transform: translateX(-50%); background: white; border: 1px solid var(--steel); border-radius: 6px; padding: 5px 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); z-index: 250; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; max-width: calc(100vw - 24px); }
    .floating-fmt-toolbar[hidden] { display: none; }
    .floating-fmt-toolbar button { border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 12px; padding: 4px 7px; min-width: 26px; min-height: 26px; line-height: 1; }
    .floating-fmt-toolbar button:hover { border-color: var(--navy); }
    .floating-fmt-toolbar button:active { background: var(--frost); }
    .floating-fmt-toolbar .fmt-bold { font-weight: 700; font-family: Georgia, 'Times New Roman', serif; }
    .floating-fmt-toolbar .size-btn { padding: 4px 6px; }
    .floating-fmt-toolbar .size-btn[data-arg="2"] { font-size: 10px; }
    .floating-fmt-toolbar .size-btn[data-arg="3"] { font-size: 12px; }
    .floating-fmt-toolbar .size-btn[data-arg="4"] { font-size: 14px; }
    .floating-fmt-toolbar .size-btn[data-arg="5"] { font-size: 16px; }
    .floating-fmt-toolbar .color-swatch { width: 22px; height: 22px; min-width: 22px; padding: 0; border: 1px solid #999; border-radius: 3px; outline: 2px solid transparent; outline-offset: 0; }
    .floating-fmt-toolbar .color-swatch:hover { outline-color: var(--navy); }
    .floating-fmt-toolbar .floating-fmt-sep { width: 1px; align-self: stretch; background: var(--frost); margin: 2px 4px; }
    .floating-fmt-toolbar .floating-fmt-label { font-size: 11px; color: var(--charcoal); font-weight: 600; margin-right: 2px; }
    .floating-fmt-toolbar .floating-fmt-clear { font-size: 14px; padding: 4px 8px; }

    @media (max-width: 600px) {
      .floating-fmt-toolbar { padding: 4px 6px; gap: 3px; }
      .floating-fmt-toolbar .floating-fmt-label { display: none; }
      .floating-fmt-toolbar button { min-width: 30px; min-height: 30px; }
    }

    /* ---------- Pages ---------- */
    .pages-container { padding: 22px 14px 40px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
    .page { width: 8.5in; height: 11in; background: white; box-shadow: 0 4px 16px rgba(0,0,0,0.22); padding: 0.10in 0.25in 0.25in; display: flex; flex-direction: column; position: relative; }

    /* ---------- Header ---------- */
    .header { display: flex; align-items: center; gap: 14px; border-bottom: 2px solid var(--navy); padding-bottom: 4px; margin-bottom: 4px; flex-shrink: 0; }
    .logo-area { width: 1.4in; height: 0.85in; border: 2px dashed var(--steel); border-radius: 3px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; overflow: hidden; position: relative; background: white; }
    .logo-area:hover { background: var(--frost); }
    .logo-area.has-image { border-style: solid; border-color: transparent; }
    .logo-area.dragover  { background: var(--frost); border-color: var(--navy); }
    .logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .logo-area .placeholder { color: #888; font-size: 10.5px; text-align: center; pointer-events: none; line-height: 1.3; }
    .logo-area .clear-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.6); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; font-weight: bold; display: none; line-height: 1; }
    .logo-area:hover .clear-btn { display: block; }

    .header-info { flex: 1; min-width: 0; }
    .title-row { display: flex; align-items: center; gap: 12px; }
    .title-field { font-size: 22px; font-weight: 700; color: var(--navy); border: none; flex: 1; min-width: 0; outline: none; font-family: inherit; padding: 1px 0; background: transparent; }
    .title-field::placeholder { color: var(--steel); font-style: italic; font-weight: 500; }

    .form-type-selector { display: flex; align-items: center; gap: 6px; font-size: 11px; flex-shrink: 0; }
    .form-type-selector label { color: var(--charcoal); font-weight: 600; white-space: nowrap; }
    .form-type-select { font-family: inherit; font-size: 11px; padding: 3px 6px; border: 1px solid var(--steel); border-radius: 3px; background: white; color: var(--charcoal); cursor: pointer; }
    .form-type-select:hover { border-color: var(--navy); }
    .form-type-select:focus { outline: 2px solid var(--navy); outline-offset: -1px; }

    .meta-row { display: flex; gap: 14px; margin-top: 5px; font-size: 11px; flex-wrap: wrap; }
    .meta-field { display: flex; align-items: baseline; gap: 4px; }
    .meta-field label { font-weight: 700; color: var(--navy); white-space: nowrap; }
    .meta-field input { border: none; border-bottom: 1px solid var(--steel); outline: none; padding: 1px 2px; font-family: inherit; font-size: 11px; background: transparent; color: var(--charcoal); }
    .meta-field input:focus { border-bottom-color: var(--navy); }

    /* ---------- Content area ---------- */
    .content-area { flex: 1; display: flex; flex-direction: column; gap: 0.10in; padding-top: 0.11in; min-height: 0; overflow: hidden; }
    .row-step { flex: 0 0 auto; min-height: 2.15in; }
    .row-callout { flex: 0 0 auto; min-height: 0.32in; }
    .row-section { flex: 0 0 0.60in; height: 0.60in; }
    .row-spacer { flex: 0 0 auto; pointer-events: none; }
    .row-parts { flex: 0 0 auto; min-height: 0.40in; }
    .row-photoarray { flex: 0 0 auto; min-height: 2.60in; }
    .row-textbox { flex: 0 0 auto; min-height: 0.50in; }

    /* ---------- Visual Block Modifiers (Dynamic Core Borders/Backgrounds) ---------- */
    .step { border: 1.5px solid var(--block-color, var(--navy)); border-radius: 3px; padding: 4px 5px; display: flex; flex-direction: row; gap: 6px; position: relative; background: white; height: 2.15in; }
    .step-number { background: var(--block-color, var(--navy)); color: white; min-width: 22px; height: 18px; padding: 0 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; position: absolute; top: -10px; left: 4px; border-radius: 3px; letter-spacing: 0.3px; box-shadow: 0 1px 2px rgba(0,0,0,0.18); print-color-adjust: exact; z-index: 2; }
    
    .parts-block { background: white; border: 1.5px solid var(--block-color, var(--color-cobalt)); border-radius: 3px; position: relative; overflow: visible; print-color-adjust: exact; }
    .parts-header { background: var(--block-color, var(--color-cobalt)); color: white; font-weight: 700; font-size: 12px; letter-spacing: 0.6px; padding: 4px 12px; display: flex; align-items: center; print-color-adjust: exact; }

    .block-title-bar { background: var(--block-color, var(--color-cobalt)); color: white; font-weight: 700; font-size: 12px; letter-spacing: 0.6px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; print-color-adjust: exact; }
    .section-header-text { flex: 1; outline: none; cursor: text; font-weight: 700; font-size: 15px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--block-color, var(--navy)); white-space: nowrap; overflow: hidden; text-overflow: clip; min-width: 0; line-height: 1.2; border-bottom: 2.5px solid var(--block-color, var(--navy)); padding: 0 0 4px 4px; }
    
    .textbox-block { background: white; border: 1.5px solid var(--block-color, var(--steel)); border-radius: 3px; padding: 6px 10px; position: relative; min-height: 0.50in; }

    /* ---------- Photo array block ---------- */
    .photoarray-block { background: white; position: relative; display: flex; flex-direction: column; gap: 0.10in; }
    .photoarray-row { display: grid; gap: 0.10in; width: 7.70in; max-width: 100%; margin: 0 auto; height: 2.50in; }
    .photoarray-row.count-1 { grid-template-columns: 1fr; }
    .photoarray-row.count-2 { grid-template-columns: 1fr 1fr; }
    .photoarray-row.count-3 { grid-template-columns: 1fr 1fr 1fr; }
    .photoarray-cell { background: var(--frost); border: 1px dashed var(--steel); border-radius: 3px; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; position: relative; min-height: 0; }
    .photoarray-cell:not(.has-image) { align-items: center; justify-content: center; }
    .photoarray-cell:hover { background: #dde4ee; }
    .photoarray-cell.has-image { background: white; border-style: solid; border-color: var(--frost); }
    .photoarray-cell.dragover  { background: var(--frost); border-color: var(--navy); border-style: solid; }
    .photoarray-cell-image { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .photoarray-cell-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .photoarray-caption { flex: 0 0 auto; border: none; border-top: 1px solid var(--frost); outline: none; background: transparent; text-align: center; font-size: 11px; font-style: italic; color: var(--charcoal); padding: 2px 6px; width: 100%; height: 20px; font-family: inherit; box-sizing: border-box; }
    .photoarray-cell .placeholder { color: #888; font-size: 10px; text-align: center; padding: 4px; pointer-events: none; line-height: 1.25; }
    .photoarray-cell .clear-btn { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.65); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 11px; font-weight: bold; display: none; line-height: 1; }
    .photoarray-cell:hover .clear-btn { display: block; }
    .photoarray-row-wrapper { position: relative; display: flex; flex-direction: column; }
    .photoarray-row-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; width: 7.70in; max-width: 100%; margin: 4px auto 0; min-height: 22px; }
    .photoarray-add-image { padding: 3px 10px; border: 1px solid var(--navy); background: white; color: var(--navy); border-radius: 3px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; line-height: 1.4; }
    .photoarray-add-image:hover { background: var(--navy); color: white; }
    .photoarray-row-delete { padding: 3px 10px; border: 1px solid var(--steel); background: white; color: var(--charcoal); border-radius: 3px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; line-height: 1.4; }
    .photoarray-row-delete:hover { border-color: var(--color-ember); color: var(--color-ember); }
    .photoarray-add-row { align-self: flex-start; margin-top: 2px; padding: 4px 12px; border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 11px; font-weight: 600; }
    .photoarray-add-row:hover { border-color: var(--navy); color: var(--navy); }

    /* ---------- Plain Text Box ---------- */
    .textbox-text { outline: none; font-family: inherit; font-size: 11px; line-height: 1.4; color: var(--charcoal); cursor: text; min-height: 18px; }
    .textbox-text:focus { background: rgba(232, 235, 240, 0.4); border-radius: 2px; }
    .textbox-text:empty::before { content: attr(data-placeholder); color: var(--steel); font-style: italic; pointer-events: none; }

    .parts-header-label { flex: 1; outline: none; cursor: text; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: clip; }
    .parts-header-label:focus { background: rgba(255,255,255,0.18); border-radius: 2px; }
    .parts-header-label:empty::before { content: attr(data-placeholder); color: rgba(255,255,255,0.65); font-weight: 400; font-style: italic; letter-spacing: normal; }

    .parts-table { width: 100%; border-collapse: collapse; table-layout: auto; }
    .parts-table thead th { background: #eef0f3; border: 1px solid var(--steel); padding: 0; text-align: left; vertical-align: middle; position: relative; print-color-adjust: exact; }
    .parts-table tbody td { border: 1px solid var(--steel); padding: 0; vertical-align: middle; position: relative; }
    .parts-table tbody td.parts-cell-selected { background: rgba(78, 114, 160, 0.18); box-shadow: inset 0 0 0 1px var(--color-cobalt); }
    .parts-table tbody td.parts-cell-selected .parts-cell { background: transparent; }

    .parts-cell { outline: none; cursor: text; padding: 4px 8px; min-height: 18px; font-size: 10.5px; line-height: 1.3; color: var(--charcoal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .parts-cell:focus { background: var(--frost); white-space: normal; overflow: visible; text-overflow: clip; }
    .parts-cell:empty::before { content: attr(data-placeholder); color: var(--steel); font-style: italic; }
    .parts-col-header { font-weight: 700; font-size: 11px; letter-spacing: 0.3px; color: var(--navy); background: #eef0f3; text-transform: uppercase; }
    .parts-col-delete { visibility: hidden; position: absolute; top: -8px; right: -8px; width: 16px; height: 16px; padding: 0; border: 1px solid var(--steel); background: white; color: var(--danger); border-radius: 50%; font-size: 9px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 3; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .parts-table thead th:hover .parts-col-delete { visibility: visible; }
    .parts-actions-col { width: 22px; border: none !important; background: transparent !important; padding: 0 !important; position: relative; }
    .parts-row-delete { visibility: hidden; position: absolute; top: 50%; left: 3px; transform: translateY(-50%); width: 16px; height: 16px; padding: 0; border: 1px solid var(--steel); background: white; color: var(--danger); border-radius: 50%; font-size: 9px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; line-height: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.18); }
    .parts-table tbody tr:hover .parts-row-delete { visibility: visible; }
    .parts-actions { padding: 4px 10px; background: #f5f6f8; display: flex; gap: 6px; border-top: 1px solid var(--steel); }
    .parts-actions button { font-size: 11px; padding: 2px 10px; border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-weight: 600; }
    .parts-actions button:hover { border-color: var(--navy); color: var(--navy); }
    .parts-paste-hint { font-size: 10px; color: var(--charcoal); opacity: 0.7; font-style: italic; margin-left: auto; align-self: center; }

    /* ---------- Section header block ---------- */
    .section-header { display: flex; align-items: flex-start; background: white; color: var(--navy); padding: 0 2px; position: relative; height: 100%; print-color-adjust: exact; }
    .section-header-text:focus { background: var(--frost); border-radius: 2px; }
    .section-header-text:empty::before { content: attr(data-placeholder); color: var(--steel); font-weight: 400; font-style: italic; text-transform: none; letter-spacing: normal; }

    .step-image { flex: 0 0 3.75in; height: 2.00in; background: var(--frost); border: 1px dashed var(--steel); border-radius: 3px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
    .step-image:hover { background: #dde4ee; }
    .step-image.has-image { background: white; border-style: solid; border-color: var(--frost); }
    .step-image.dragover  { background: var(--frost); border-color: var(--navy); border-style: solid; }
    .step-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .step-image .placeholder { color: #888; font-size: 10px; text-align: center; padding: 4px; pointer-events: none; line-height: 1.25; }
    .step-image .clear-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.65); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 11px; font-weight: bold; display: none; line-height: 1; }
    .step-image:hover .clear-btn { display: block; }

    .step-text { flex: 1; border: none; outline: none; font-family: inherit; font-size: 14px; line-height: 1.35; height: 100%; padding: 4px 6px; background: transparent; color: var(--charcoal); overflow: hidden; cursor: text; min-width: 0; }
    .step-text:focus { background: rgba(232, 235, 240, 0.5); }
    .step-text:empty::before { content: attr(data-placeholder); color: var(--steel); font-style: italic; pointer-events: none; }
    .step.has-title .step-number { top: 4px; left: 4px; }
    .step.has-title { padding-top: 18px; }

    .rich-text-editor [style*="font-size: small"]    { font-size: 9px    !important; line-height: 1.25; }
    .rich-text-editor [style*="font-size: medium"]   { font-size: 10.5px !important; line-height: 1.3;  }
    .rich-text-editor [style*="font-size: large"]    { font-size: 13px   !important; line-height: 1.35; }
    .rich-text-editor [style*="font-size: x-large"]  { font-size: 16px   !important; line-height: 1.4;  }
    .rich-text-editor [style*="font-size: xx-large"] { font-size: 16px   !important; line-height: 1.4;  }

    .wi-icon { display: inline-block; padding: 1px 5px; border-radius: 2px; font-weight: 700; font-size: 9px; letter-spacing: 0.4px; margin: 0 2px 0 0; white-space: nowrap; vertical-align: baseline; font-family: 'Segoe UI', Tahoma, Verdana, Arial, sans-serif; print-color-adjust: exact; }
    .wi-warning { background: var(--danger); color: #ffffff; }
    .wi-caution { background: var(--amber);  color: #2c1f00; }
    .wi-inspect { background: var(--info);   color: #ffffff; }
    .wi-torque  { background: #424242;       color: #ffffff; }

    /* ---------- Callout block ---------- */
    .callout { display: flex; align-items: stretch; border: 2px solid var(--callout-color, var(--charcoal)); border-radius: 3px; background: white; min-height: 100%; position: relative; print-color-adjust: exact; }
    .callout-warning  { --callout-color: var(--color-ember);   --callout-text-color: #ffffff; }
    .callout-caution  { --callout-color: var(--color-gold);    --callout-text-color: #ffffff; }
    .callout-note     { --callout-color: var(--color-cobalt);  --callout-text-color: #ffffff; }
    .callout-watch    { --callout-color: var(--color-rust);    --callout-text-color: #ffffff; }
    .callout-monitor  { --callout-color: var(--color-plum);    --callout-text-color: #ffffff; }
    .callout-record   { --callout-color: var(--color-pine);    --callout-text-color: #ffffff; }
    .callout-tools    { --callout-color: var(--color-teal);    --callout-text-color: #ffffff; }
    .callout-inspect  { --callout-color: var(--color-sky);     --callout-text-color: #ffffff; }
    .callout-measure  { --callout-color: var(--color-seafoam); --callout-text-color: #ffffff; }
    .callout-finding  { --callout-color: var(--color-fern);    --callout-text-color: #ffffff; }
    .callout-concern  { --callout-color: var(--color-rose);    --callout-text-color: #ffffff; }
    .callout-analysis { --callout-color: var(--color-iris);    --callout-text-color: #ffffff; }

    .callout-badge { background: var(--callout-color); color: var(--callout-text-color); font-weight: 700; font-size: 11px; padding: 4px 10px; display: flex; align-items: center; justify-content: center; white-space: nowrap; letter-spacing: 0.5px; flex-shrink: 0; min-width: 0.85in; print-color-adjust: exact; }
    .callout-text { flex: 1; padding: 4px 10px; font-size: 11px; line-height: 1.35; color: var(--charcoal); outline: none; cursor: text; overflow-wrap: break-word; word-break: break-word; white-space: normal; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .callout-text:focus { background: rgba(232, 235, 240, 0.5); }
    .callout-text:empty::before { content: attr(data-placeholder); color: var(--steel); font-style: italic; pointer-events: none; }

    /* ---------- Block controls ---------- */
    .block-controls { position: absolute; top: 3px; right: 3px; display: flex; gap: 2px; z-index: 10; opacity: 0; transition: opacity 0.15s; }
    .step:hover > .block-controls,
    .callout:hover > .block-controls,
    .section-header:hover > .block-controls,
    .parts-block:hover > .block-controls,
    .photoarray-block:hover > .block-controls,
    .textbox-block:hover > .block-controls { opacity: 1; }
    .block-controls button { background: rgba(0, 0, 0, 0.6); color: white; border: none; width: 22px; height: 22px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; line-height: 1; padding: 0; font-family: inherit; }
    .block-controls button:hover { background: rgba(0, 0, 0, 0.85); }
    .block-controls button.delete:hover { background: var(--danger); }
    .block-controls button.add-title:hover { background: var(--color-cobalt); }

    /* ---------- Drag and Drop Highlights ---------- */
    .drop-indicator { position: fixed; height: 3px; background: var(--color-cobalt); pointer-events: none; z-index: 600; display: none; border-radius: 2px; box-shadow: 0 0 8px rgba(78,114,160,0.55); }
    body.is-dragging .drop-indicator { display: block; }
    .block-dragging { opacity: 0.35; }
    .block-drag-handle { cursor: grab !important; font-size: 13px !important; letter-spacing: -1px; }
    .block-drag-handle:active { cursor: grabbing !important; }

    /* ---------- Color picker popup ---------- */
    .color-picker-popup { background: white; border: 1px solid var(--steel); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); padding: 8px; display: grid; grid-template-columns: repeat(6, 22px); gap: 4px; }
    .color-picker-popup .cp-swatch { width: 22px; height: 22px; border-radius: 3px; border: 2px solid transparent; cursor: pointer; padding: 0; print-color-adjust: exact; }
    .color-picker-popup .cp-swatch:hover { border-color: var(--navy); transform: scale(1.12); }
    .color-picker-popup .cp-row { grid-column: 1 / -1; display: flex; gap: 6px; align-items: center; padding-top: 6px; border-top: 1px solid var(--frost); margin-top: 2px; }
    .color-picker-popup .cp-row label { font-size: 10px; color: var(--charcoal); font-weight: 600; }
    .color-picker-popup .cp-row input[type=color] { width: 30px; height: 22px; border: 1px solid var(--steel); border-radius: 3px; padding: 1px; cursor: pointer; }
    .color-picker-popup .cp-reset { font-size: 10px; padding: 2px 7px; border: 1px solid var(--steel); background: white; border-radius: 3px; cursor: pointer; font-family: inherit; color: var(--danger); margin-left: auto; }
    .color-picker-popup .cp-reset:hover { border-color: var(--danger); }
    .block-controls button.paint-btn { font-size: 11px; }
    .block-controls button.paint-btn:hover { background: rgba(90,142,144,0.9); }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--charcoal); border: 2px dashed var(--steel); border-radius: 4px; padding: 30px; }
    .empty-state-title { font-size: 18px; font-weight: 600; color: var(--navy); letter-spacing: 0.3px; }
    .empty-state-body { font-size: 13px; color: var(--charcoal); opacity: 0.8; text-align: center; max-width: 380px; line-height: 1.4; }
    .empty-state-body strong { color: var(--navy); }

    .page-footer { display: flex; justify-content: space-between; align-items: center; font-size: 9px; color: var(--charcoal); padding-top: 5px; border-top: 1px solid var(--frost); margin-top: 6px; flex-shrink: 0; gap: 12px; }
    .page-footer-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .page-footer-pageno { flex-shrink: 0; white-space: nowrap; }

    .toast { position: fixed; top: 160px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 14px; border-radius: 4px; z-index: 1000; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .toast.show { opacity: 1; }

    /* ---------- Narrow View Overlay Modifiers ---------- */
    @media screen and (max-width: 900px) {
      body {
        padding-left: 0 !important;
        padding-top: calc(52px + env(safe-area-inset-top, 0px));
        overflow-x: auto;
      }
      .sidebar-backdrop {
        display: block; /* Active modal block layer on small viewports */
      }
      .topbar { height: calc(52px + env(safe-area-inset-top, 0px)); padding: env(safe-area-inset-top, 0) max(8px, env(safe-area-inset-right, 0)) 0 max(8px, env(safe-area-inset-left, 0)); gap: 5px; overflow-x: auto; }
      .topbar h1 { font-size: 13px; margin: 0 4px 0 0; white-space: nowrap; }
      .topbar button { padding: 9px 10px; font-size: 12px; flex-shrink: 0; min-height: 36px; white-space: nowrap; }
      .topbar .spacer { flex: 1; }
      .sidebar, .sidebar-backdrop { top: calc(52px + env(safe-area-inset-top, 0px)); }
      .sidebar-block-list button { padding: 11px 12px; font-size: 13px; min-height: 44px; }
      .sidebar-fmt-row button { min-height: 36px; }
      .sidebar-icon-grid button { min-height: 38px; }
      .sidebar-toggle { width: 36px; height: 36px; font-size: 20px; }
      .pages-container { padding: 12px 0 30px; gap: 14px; }
      .page { transform: scale(var(--page-scale, 1)); transform-origin: top center; margin-bottom: var(--page-margin-fix, 0px); }
      .row-step:first-child { margin-top: 6px; }
      .step-image .clear-btn, .parts-row-delete, .parts-col-delete, .photoarray-cell .clear-btn, .photoarray-row-delete { visibility: visible; }
      .photoarray-cell .clear-btn { display: block; }
      .block-controls { opacity: 1; }
      .block-controls button { width: 28px; height: 28px; font-size: 13px; }
    }

    @media screen and (max-width: 600px) {
      .topbar h1 { display: none; }
      .topbar button { padding: 8px 10px; font-size: 12px; }
      .topbar .btn-label-full { display: none; }
      .topbar .btn-label-short { display: inline; }
    }

    /* ---------- Print Rules ---------- */
    @page { size: letter; margin: 0; }
    @media print {
      html, body { background: white; margin: 0; padding: 0 !important; }
      .topbar, .sidebar, .sidebar-backdrop, .no-print, .block-controls { display: none !important; }
      .step-image .clear-btn, .logo-area .clear-btn, .photoarray-cell .clear-btn, .photoarray-row-delete, .photoarray-add-row, .photoarray-add-image { display: none !important; }
      .photoarray-cell:not(.has-image) .placeholder { display: none; }
      .photoarray-cell:not(.has-image) { background: white; border: 1px solid #bbb; }
      .pages-container { padding: 0; gap: 0; }
      .page { box-shadow: none; margin: 0 !important; overflow: hidden; transform: none !important; margin-bottom: 0 !important; page-break-after: always; break-after: page; break-inside: avoid-page; page-break-inside: avoid; }
      .page.is-empty { height: auto !important; min-height: 0 !important; }
      .page:last-child { page-break-after: auto; break-after: auto; }
      .step-image:not(.has-image) { background: white; border: 1px solid #bbb; }
      .step-image:not(.has-image) .placeholder { display: none; }
      .logo-area:not(.has-image) { border: none; }
      .logo-area:not(.has-image) .placeholder { display: none; }
      .title-field::placeholder, .meta-field input::placeholder, .photoarray-caption::placeholder { color: transparent !important; }
      .photoarray-caption { border-top: 1px solid #ddd; background: transparent; }
      .photoarray-caption:placeholder-shown { display: none; }
      .step-text:empty::before, .callout-text:empty::before, .textbox-text:empty::before, .section-header-text:empty::before { content: ''; }
      .step-text:focus, .callout-text:focus, .textbox-text:focus { background: transparent; }
      .textbox-block { border-color: transparent !important; padding: 0 !important; }
      .empty-state { display: none; }
    }
  </style>
</head>
<body>

<header class="topbar no-print">
  <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Toggle menu" aria-controls="sidebar" aria-expanded="true" title="Open menu">
    <span class="hamburger-icon" aria-hidden="true"><span></span></span>
  </button>
  <h1>Work Instruction Builder</h1>
  <span class="spacer"></span>
  <button class="primary" onclick="window.print()">
    <span class="btn-label-full">Print / Save PDF</span>
    <span class="btn-label-short">Print</span>
  </button>
  <button onclick="exportTemplate()">
    <span class="btn-label-full">Save File</span>
    <span class="btn-label-short">Save</span>
  </button>
  <button onclick="importTemplate()">
    <span class="btn-label-full">Load File</span>
    <span class="btn-label-short">Load</span>
  </button>
  <button onclick="newDocument()">
    <span class="btn-label-full">Clear All</span>
    <span class="btn-label-short">Clear</span>
  </button>
</header>

<aside class="sidebar no-print" id="sidebar" aria-label="Editing tools">
  <div class="sidebar-header">
    <span>Tools</span>
    <button class="sidebar-toggle" id="sidebarCollapseBtn" type="button" title="Close menu" aria-label="Close menu" aria-controls="sidebar" aria-expanded="true">✕</button>
  </div>

  <div class="sidebar-section">
    <h3>Insert Block</h3>
    <div class="sidebar-block-list">
      <button class="add-section"    data-add="section"                      type="button" title="Add a section title">+ Section Title</button>
      <button class="add-step"       data-add="step"                         type="button" title="Add an image and text block">+ Image | Text</button>
      <button class="add-photoarray" data-add="photoarray"                   type="button" title="Add a photo array (3-column grid of images)">+ Photo Array</button>
      <button class="add-textbox"    data-add="textbox"                      type="button" title="Add a plain text box">+ Text Box</button>
      <button class="add-parts"      data-add="parts"                        type="button" title="Add a chart / table">+ Chart</button>
      <button class="add-finding"    data-add="callout" data-kind="finding"  type="button" title="Add a Finding banner">+ Finding</button>
      <button class="add-concern"    data-add="callout" data-kind="concern"  type="button" title="Add a Concern banner">+ Concern</button>
      <button class="add-analysis"   data-add="callout" data-kind="analysis" type="button" title="Add an Analysis banner">+ Analysis</button>
      <button class="add-warning"    data-add="callout" data-kind="warning"  type="button" title="Add a Warning banner">+ Warning</button>
      <button class="add-caution"    data-add="callout" data-kind="caution"  type="button" title="Add a Caution banner">+ Caution</button>
      <button class="add-note"       data-add="callout" data-kind="note"     type="button" title="Add a Note banner">+ Note</button>
      <button class="add-watch"      data-add="callout" data-kind="watch"    type="button" title="Add a Tip banner">+ Tip</button>
      <button class="add-monitor"    data-add="callout" data-kind="monitor"  type="button" title="Add a Monitor banner">+ Monitor</button>
      <button class="add-record"     data-add="callout" data-kind="record"   type="button" title="Add a Record banner">+ Record</button>
      <button class="add-tools"      data-add="callout" data-kind="tools"    type="button" title="Add a Tools banner">+ Tools</button>
      <button class="add-inspect"    data-add="callout" data-kind="inspect"  type="button" title="Add an Inspect banner">+ Inspect</button>
      <button class="add-measure"    data-add="callout" data-kind="measure"  type="button" title="Add a Measure banner">+ Measure</button>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>Format Text</h3>
    <div class="sidebar-fmt-row">
      <button class="fmt-bold" data-cmd="bold" type="button" title="Bold (toggle)">B</button>
      <span class="label">Size:</span>
      <button class="size-btn" data-cmd="fontSize" data-arg="2" type="button" title="Small text">S</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="3" type="button" title="Normal text">N</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="4" type="button" title="Medium text">M</button>
      <button class="size-btn" data-cmd="fontSize" data-arg="5" type="button" title="Large text">L</button>
    </div>
    <div class="sidebar-fmt-row">
      <span class="label">Color:</span>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#595959" style="background:#595959" type="button" title="Charcoal (default)" aria-label="Charcoal"></button>
      <button class="color-swatch" data-cmd="foreColor" data-arg="#b3261e" style="background:#b3261e" type="button" title="Red" aria-label="Red"></button>

  <button class="color-swatch" data-cmd="foreColor" data-arg="#b3261e" style="background:#b3261e" type="button" title="Red" aria-label="Red"></button>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#1565c0" style="background:#1565c0" type="button" title="Blue" aria-label="Blue"></button>
  <button class="color-swatch" data-cmd="foreColor" data-arg="#2e7d32" style="background:#2e7d32" type="button" title="Green" aria-label="Green"></button>

<div id="toast" class="toast no-print"></div>
<div class="drop-indicator no-print" id="dropIndicator"></div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'workInstructionBuilder_v4';
  const LEGACY_KEYS = [
    'workInstructionBuilder_v3',
    'workInstructionBuilder_v2',
    'workInstructionBuilder_v1'
  ];

  const PAGE_CONTENT_HEIGHT = 9.20;
  const STEP_ROW_HEIGHT     = 2.20;
  const CALLOUT_ROW_HEIGHT  = 0.32;
  const SECTION_ROW_HEIGHT  = 0.60;
  const ROW_GAP             = 0.10;
  const TITLE_BAR_HEIGHT    = 0.23;

  const PARTS_BASE_HEIGHT = 0.85;
  const PARTS_ROW_HEIGHT  = 0.22;

  const CALLOUT_KINDS = {
    warning:   { label: 'WARNING',  icon: '\u26A0' },
    caution:   { label: 'CAUTION',  icon: '\u26A0' },
    note:      { label: 'NOTE',     icon: '\u2139' },
    watch:     { label: 'TIP',      icon: '\u2757' },
    monitor:   { label: 'MONITOR',  icon: '\u25C9' },
    record:    { label: 'RECORD',   icon: '\u270E' },
    tools:     { label: 'TOOLS',    icon: '\u2692' },
    inspect:   { label: 'INSPECT',  icon: '\u2315' },
    measure:   { label: 'MEASURE',  icon: '\u2194' },
    finding:   { label: 'FINDING',  icon: '' },
    concern:   { label: 'CONCERN',  icon: '' },
    analysis:  { label: 'ANALYSIS', icon: '' }
  };

  const FORM_TYPES = {
    blank: { titlePlaceholder: 'Form Title', fields: [] },
    workInstruction: {
      titlePlaceholder: 'Work Instruction Title (e.g., Turbocharger Cartridge Assembly)',
      fields: [
        { key: 'partNumber', label: 'Part #',    width: 110 },
        { key: 'operation',  label: 'Operation', width: 130 },
        { key: 'rev',        label: 'Rev',       width: 50  },
        { key: 'date',       label: 'Date',      width: 90  }
      ]
    },
    sampleProductAnalysis: {
      titlePlaceholder: 'Sample Product Analysis Title',
      fields: [
        { key: 'vendor',           label: 'Vendor',           width: 120 },
        { key: 'vendorPartNumber', label: 'Vendor Part #',    width: 110 },
        { key: 'pdiPartNumber',    label: 'PDI Part #',       width: 110 },
        { key: 'partDescription',  label: 'Part Description', width: 180 },
        { key: 'date',             label: 'Date',             width: 90  }
      ]
    },
    incomingQuality: {
      titlePlaceholder: 'Incoming Quality Inspection Title',
      fields: [
        { key: 'vendor',          label: 'Vendor',          width: 110 },
        { key: 'inspectionDate',  label: 'Inspection Date', width: 95  },
        { key: 'inspector',       label: 'Inspector',       width: 110 },
        { key: 'pdiPoNumber',     label: 'PDI PO #',        width: 100 },
        { key: 'lotNumber',       label: 'Lot #',           width: 90  },
        { key: 'pdiPartNumber',   label: 'PDI Part #',      width: 100 },
        { key: 'partDescription', label: 'Part Description', width: 150 },
        { key: 'sampleQty',       label: 'Sample Qty',      width: 70  }
      ]
    },
    warranty: {
      titlePlaceholder: 'Warranty Analysis Title',
      fields: [
        { key: 'customerName',      label: 'Customer Name',      width: 140 },
        { key: 'partNumber',        label: 'Part #',             width: 100 },
        { key: 'quantity',          label: 'Qty',                width: 60  },
        { key: 'installDate',       label: 'Install Date',       width: 90  },
        { key: 'failDate',          label: 'Fail Date',          width: 90  },
        { key: 'customerComplaint', label: 'Customer Complaint', width: 180 }
      ]
    }
  };

  function getFormSchema(formType) {
    return FORM_TYPES[formType] || FORM_TYPES.blank;
  }
  
  let _idCounter = 0;
  let state = createEmptyState();
  let lastFocusedEditable = null;
  let lastFocusedBlockId = null;
  let focusBlockIdAfterRender = null;
  const pendingPhotoSlot = new Map();

  const partsCellSelection = new Map();
  let partsDrag = null;

  let _dragData = null;
  let _dragInsertIdx = -1;
  let _lastMousedownEl = null;

  function genId() {
    _idCounter += 1;
    return 'b_' + Date.now().toString(36) + '_' + _idCounter.toString(36);
  }

  function createStepBlock(img, text) { return { id: genId(), type: 'step', img: img || null, text: text || '' }; }
  function createCalloutBlock(kind, text) { return { id: genId(), type: 'callout', kind: CALLOUT_KINDS[kind] ? kind : 'note', text: text || '' }; }
  function createSectionBlock(text) { return { id: genId(), type: 'section', text: text || '' }; }
  function createPartsBlock(columns, rows, title) {
    const cols = Array.isArray(columns) && columns.length > 0 ? columns.slice() : ['Part Number', 'Description', 'Quantity'];
    let rs = (Array.isArray(rows) && rows.length > 0) ? rows.map(r => Array(cols.length).fill('').map((_, i) => typeof r[i] === 'string' ? r[i] : '')) : [Array(cols.length).fill('')];
    return { id: genId(), type: 'parts', title: title || '', columns: cols, rows: rs };
  }
  function createPhotoArrayBlock(rows) {
    let rs = (Array.isArray(rows) && rows.length > 0) ? rows.map(r => [0,1,2].map(i => r[i] ? (typeof r[i] === 'string' ? { src: r[i], caption: '' } : { src: r[i].src, caption: r[i].caption || '' }) : null)) : [[null, null, null]];
    return { id: genId(), type: 'photoarray', rows: rs };
  }
  function createTextBoxBlock(text) { return { id: genId(), type: 'textbox', text: text || '' }; }
  function createEmptyState() { return { logo: null, title: '', formType: 'blank', metaFields: {}, blocks: [] }; }

  function migrateLegacyState(old) {
    if (!old || typeof old !== 'object') return null;
    if (Array.isArray(old.blocks)) {
      return { logo: old.logo || null, title: old.title || '', formType: old.formType || 'blank', metaFields: old.metaFields || {}, blocks: old.blocks.filter(Boolean) };
    }
    return null;
  }

  function normalizeState(s) {
    s = migrateLegacyState(s) || s;
    if (!s.metaFields) s.metaFields = {};
    if (!Array.isArray(s.blocks)) s.blocks = [];
    s.blocks.forEach(b => {
      if (!b.id) b.id = genId();
      if (typeof b.precedingSpacers !== 'number') b.precedingSpacers = 0;
    });
    return s;
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn('Auto-save skipped.', e); }
  }

  function loadState() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) { state = normalizeState(JSON.parse(data)); return true; }
    } catch (e) { console.warn(e); }
    return false;
  }

  function processImage(file, opts) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = Math.min(img.width, opts.maxWidth);
          canvas.height = Math.min(img.height, opts.maxHeight);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL(opts.mimeType));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function loadLogoFile(file) { return processImage(file, { maxWidth: 800, maxHeight: 400, mimeType: 'image/png' }); }
  function loadStepImageFile(file) { return processImage(file, { maxWidth: 1600, maxHeight: 1600, mimeType: 'image/jpeg' }); }

  function pickFile(accept) {
    return new Promise((resolve) => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = accept;
      input.onchange = () => resolve(input.files?.[0] || null);
      input.click();
    });
  }

  function findBlockById(id) { return state.blocks.find(b => b.id === id) || null; }
  function findBlockIndex(id) { return state.blocks.findIndex(b => b.id === id); }

  function estimateSpacerHeight(block) { return STEP_ROW_HEIGHT; }

  function blocksToRows(blocks) {
    const rows = [];
    for (const block of blocks) {
      const spacers = Math.max(0, block.precedingSpacers | 0);
      for (let s = 0; s < spacers; s++) rows.push({ type: 'spacer', block, height: STEP_ROW_HEIGHT });
      if (block.type === 'photoarray') {
        block.rows.forEach((_, i) => rows.push({ type: 'photoarrayrow', block, rowIdx: i, isFirstInBlock: i === 0, isLastInBlock: i === block.rows.length - 1 }));
      } else {
        rows.push({ type: block.type, block });
      }
    }
    return rows;
  }

  function paginate(rows) {
    const pages = [[]];
    rows.forEach(r => pages[pages.length - 1].push(r));
    return pages;
  }

  function render() {
    let n = 0;
    state.blocks.forEach(b => { if (b.type === 'step') b._number = ++n; });
    const rows = blocksToRows(state.blocks);
    const pages = paginate(rows);
    const container = document.getElementById('pagesContainer');
    container.innerHTML = '';
    pages.forEach((pageRows, pageIdx) => container.appendChild(buildPageElement(pageRows, pageIdx, pages.length)));
  }

  function buildPageElement(rows, pageIdx, totalPages) {
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.appendChild(buildHeader());
    const content = document.createElement('div');
    content.className = 'content-area';

    if (rows.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state no-print';
      empty.innerHTML = '<div class="empty-state-title">Empty document</div>';
      content.appendChild(empty);
    } else {
      let i = 0;
      while (i < rows.length) {
        const row = rows[i];
        if (row.type === 'photoarrayrow') {
          const chunk = { type: 'photoarraychunk', block: row.block, rowIndices: [row.rowIdx], isFirstChunk: row.isFirstInBlock, isLastChunk: row.isLastInBlock };
          content.appendChild(buildRowElement(chunk));
          i++;
        } else {
          content.appendChild(buildRowElement(row));
          i++;
        }
      }
    }
    pageEl.appendChild(content);
    return pageEl;
  }

  function buildHeader() {
    const header = document.createElement('div');
    header.className = 'header';
    const logo = document.createElement('div');
    logo.className = 'logo-area' + (state.logo ? ' has-image' : '');
    if (state.logo) {
      const img = document.createElement('img'); img.src = state.logo; logo.appendChild(img);
    } else {
      logo.innerHTML = '<div class="placeholder">Logo</div>';
    }
    header.appendChild(logo);

    const info = document.createElement('div');
    info.className = 'header-info';
    const titleRow = document.createElement('div');
    titleRow.className = 'title-row';
    const input = document.createElement('input');
    input.className = 'title-field';
    input.value = state.title || '';
    input.placeholder = 'Document Title';
    input.oninput = () => { state.title = input.value; saveState(); };
    titleRow.appendChild(input);
    info.appendChild(titleRow);
    header.appendChild(info);
    return header;
  }

  function buildRowElement(row) {
    const el = document.createElement('div');
    el.className = 'row row-' + row.type;
    el.dataset.rowBlockId = row.block.id;

    let child;
    if (row.type === 'step') child = buildStepElement(row.block);
    else if (row.type === 'callout') child = buildCalloutElement(row.block);
    else if (row.type === 'section') child = buildSectionElement(row.block);
    else if (row.type === 'parts') child = buildPartsElement(row.block);
    else if (row.type === 'textbox') child = buildTextBoxElement(row.block);
    else if (row.type === 'photoarraychunk') child = buildPhotoArrayElement(row.block, row);
    
    if (child) {
      if (row.block.color) child.style.setProperty('--block-color', row.block.color);
      el.appendChild(child);
    }
    return el;
  }

  function buildStepElement(block) {
    const el = document.createElement('div');
    el.className = 'step';
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="step-number">${block._number || ''}</div>
                    <div class="step-image"><div class="placeholder">Click / Drop Image</div></div>
                    <div class="step-text rich-text-editor" contenteditable="true">${block.text || ''}</div>`;
    el.appendChild(buildBlockControls(block));
    const textEl = el.querySelector('.step-text');
    textEl.addEventListener('input', () => { block.text = textEl.innerHTML; saveState(); });
    return el;
  }

  function buildSectionElement(block) {
    const el = document.createElement('div');
    el.className = 'section-header';
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="section-header-text rich-text-editor" contenteditable="true">${block.text || 'Section Header'}</div>`;
    el.appendChild(buildBlockControls(block));
    const textEl = el.querySelector('.section-header-text');
    textEl.addEventListener('input', () => { block.text = textEl.innerHTML; saveState(); });
    return el;
  }

  function buildTextBoxElement(block) {
    const el = document.createElement('div');
    el.className = 'textbox-block';
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="textbox-text rich-text-editor" contenteditable="true">${block.text || 'Text block...'}</div>`;
    el.appendChild(buildBlockControls(block));
    const textEl = el.querySelector('.textbox-text');
    textEl.addEventListener('input', () => { block.text = textEl.innerHTML; saveState(); });
    return el;
  }

  function buildPartsElement(block) {
    const el = document.createElement('div');
    el.className = 'parts-block';
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="parts-header"><div class="parts-header-label rich-text-editor" contenteditable="true">${block.title || 'Chart Title'}</div></div>
                    <table class="parts-table"><thead><tr><th>Header 1</th><th>Header 2</th></tr></thead><tbody><tr><td class="parts-cell rich-text-editor" contenteditable="true">Data 1</td><td class="parts-cell rich-text-editor" contenteditable="true">Data 2</td></tr></tbody></table>`;
    el.appendChild(buildBlockControls(block));
    const titleEl = el.querySelector('.parts-header-label');
    titleEl.addEventListener('input', () => { block.title = titleEl.innerHTML; saveState(); });
    return el;
  }

  function buildPhotoArrayElement(block, chunk) {
    const el = document.createElement('div');
    el.className = 'photoarray-block';
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="photoarray-row count-3">
                      <div class="photoarray-cell"><div class="placeholder">Image</div></div>
                      <div class="photoarray-cell"><div class="placeholder">Image</div></div>
                      <div class="photoarray-cell"><div class="placeholder">Image</div></div>
                    </div>`;
    if (chunk.isFirstChunk) el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildCalloutElement(block) {
    const el = document.createElement('div');
    el.className = 'callout callout-' + block.kind;
    el.dataset.blockId = block.id;
    el.innerHTML = `<div class="callout-badge">${block.kind.toUpperCase()}</div>
                    <div class="callout-text rich-text-editor" contenteditable="true">${block.text || ''}</div>`;
    el.appendChild(buildBlockControls(block));
    const textEl = el.querySelector('.callout-text');
    textEl.addEventListener('input', () => { block.text = textEl.innerHTML; saveState(); });
    return el;
  }

  function buildBlockControls(block) {
    const wrap = document.createElement('div');
    wrap.className = 'block-controls no-print';

    const handle = document.createElement('button');
    handle.textContent = '☰';
    handle.className = 'block-drag-handle';
    handle.setAttribute('draggable', 'true');
    handle.onclick = (e) => e.stopPropagation();
    handle.onlayerclick = (e) => e.stopPropagation();
    handle.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      e.dataTransfer.effectAllowed = 'move';
      _dragData = { source: 'block', id: block.id };
      document.body.classList.add('is-dragging');
    });
    wrap.appendChild(handle);

    const paintBtn = document.createElement('button');
    paintBtn.className = 'paint-btn';
    paintBtn.textContent = '▣';
    paintBtn.onclick = (e) => { e.stopPropagation(); showColorPicker(block, paintBtn); };
    wrap.appendChild(paintBtn);

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.className = 'delete';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteBlock(block.id); };
    wrap.appendChild(delBtn);

    return wrap;
  }

  function deleteBlock(id) {
    state.blocks = state.blocks.filter(b => b.id !== id);
    saveState(); render();
  }

  function showColorPicker(block, anchorBtn) {
    hideColorPicker();
    const popup = document.createElement('div');
    popup.id = 'colorPickerPopup'; popup.className = 'color-picker-popup no-print';

    COLOR_PRESETS.forEach(color => {
      const sw = document.createElement('button');
      sw.className = 'cp-swatch'; sw.style.background = color;
      sw.onclick = (e) => {
        e.stopPropagation(); block.color = color; saveState(); hideColorPicker(); render();
      };
      popup.appendChild(sw);
    });

    const rect = anchorBtn.getBoundingClientRect();
    popup.style.position = 'fixed'; popup.style.left = rect.left + 'px'; popup.style.top = rect.bottom + 'px';
    document.body.appendChild(popup);
    setTimeout(() => document.addEventListener('click', hideColorPicker), 0);
  }

  function hideColorPicker() { document.getElementById('colorPickerPopup')?.remove(); }

  function setupDragAndDrop() {
    document.querySelectorAll('.sidebar [data-add]').forEach(btn => {
      btn.setAttribute('draggable', 'true');
      btn.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'copy';
        _dragData = { source: 'sidebar', add: btn.dataset.add, kind: btn.dataset.kind || null };
        document.body.classList.add('is-dragging');
      });
    });

    document.addEventListener('dragover', (e) => {
      if (!_dragData) return;
      e.preventDefault();
      const contentArea = e.target.closest?.('.content-area');
      if (!contentArea) return;
      
      const indicator = document.getElementById('dropIndicator');
      const rects = contentArea.getBoundingClientRect();
      indicator.style.display = 'block';
      indicator.style.top = e.clientY + 'px';
      indicator.style.left = rects.left + 'px';
      indicator.style.width = rects.width + 'px';
      
      const rows = Array.from(contentArea.querySelectorAll('.row[data-row-block-id]'));
      _dragInsertIdx = rows.length;
      for (let i = 0; i < rows.length; i++) {
        const rRect = rows[i].getBoundingClientRect();
        if (e.clientY < (rRect.top + rRect.height / 2)) {
          const bId = rows[i].dataset.rowBlockId;
          _dragInsertIdx = findBlockIndex(bId);
          break;
        }
      }
    });

    document.addEventListener('drop', (e) => {
      if (!_dragData) return;
      e.preventDefault();
      const idx = _dragInsertIdx >= 0 ? _dragInsertIdx : state.blocks.length;

      if (_dragData.source === 'sidebar') {
        let nb;
        if (_dragData.add === 'step') nb = createStepBlock();
        else if (_dragData.add === 'callout') nb = createCalloutBlock(_dragData.kind);
        else if (_dragData.add === 'section') nb = createSectionBlock();
        else if (_dragData.add === 'parts') nb = createPartsBlock();
        else if (_dragData.add === 'photoarray') nb = createPhotoArrayBlock();
        else if (_dragData.add === 'textbox') nb = createTextBoxBlock();
        if (nb) state.blocks.splice(idx, 0, nb);
      } else if (_dragData.source === 'block') {
        const fromIdx = findBlockIndex(_dragData.id);
        if (fromIdx >= 0) {
          const [moved] = state.blocks.splice(fromIdx, 1);
          const targetIdx = fromIdx < idx ? idx - 1 : idx;
          state.blocks.splice(targetIdx, 0, moved);
        }
      }
      document.body.classList.remove('is-dragging');
      document.getElementById('dropIndicator').style.display = 'none';
      _dragData = null; saveState(); render();
    });
  }

  function exportTemplate() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'template.json';
    a.click();
  }

  function importTemplate() {
    pickFile('.json').then(file => {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { state = normalizeState(JSON.parse(reader.result)); saveState(); render(); };
      reader.readAsText(file);
    });
  }

  function newDocument() { state = createEmptyState(); saveState(); render(); }

  const COLOR_PRESETS = [
    '#b85c58', '#c07080', '#d49098', '#b87550', '#c08560', '#c89070',
    '#b89840', '#c4a860', '#d0bc80', '#477060', '#5e8a6a', '#7a9e85',
    '#708c60', '#90a870', '#5a8e90', '#6ea0a0', '#4e72a0', '#6888b0',
    '#8898c8', '#826090', '#7870a8', '#9888c0', '#a07898'
  ];

  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    document.body.classList.remove('sidebar-collapsed'); /* Persistent default */
    render();
    setupDragAndDrop();
    
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.body.classList.toggle('sidebar-collapsed');
    });
    document.getElementById('sidebarCollapseBtn').addEventListener('click', () => {
      document.body.classList.add('sidebar-collapsed');
    });
  });
})();
</script>
</body>
</html>
