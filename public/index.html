<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1D2B4F">
  <title>Work Instruction Builder</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --navy:     #1D2B4F;
      --steel:    #B8C4D8;
      --frost:    #E8EBF0;
      --charcoal: #595959;
      --white:    #FFFFFF;
      --dew:      #d0d7e3;
      /* Reds / Magentas (Microsoft Fluent) */
      --color-ember:    #D13438;
      --color-rose:     #E3008C;
      --color-blush:    #C239B3;
      /* Oranges */
      --color-rust:     #CA5010;
      --color-clay:     #DA3B01;
      --color-terra:    #F7630C;
      /* Ambers / Golds */
      --color-gold:     #8A6B00;
      --color-straw:    #C19C00;
      --color-flax:     #FFB900;
      /* Greens */
      --color-pine:     #004B1C;
      --color-fern:     #107C10;
      --color-sage:     #498205;
      --color-moss:     #00CC6A;
      --color-reed:     #00B294;
      /* Teals */
      --color-teal:     #008272;
      --color-seafoam:  #00B294;
      /* Blues */
      --color-cobalt:     #0078D4;
      --color-sky:        #0099BC;
      --color-periwinkle: #004E8C;
      /* Purples */
      --color-plum:     #5C2D91;
      --color-iris:     #8764B8;
      --color-lavender: #32145A;
      --color-mauve:    #B4009E;
      /* Legacy palette */
      --danger:   #b3261e;
      --success:  #2e7d32;
      --info:     #1565c0;
      --amber:    #f4b400;
      --orange:   #e67e22;
      --purple:   #5d3fd3;
      --teal:     #00695c;
      --cyan:     #0288d1;
      --magenta:  #ad1457;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Verdana, Arial, sans-serif;
      background: #d4d7dc;
      color: var(--charcoal);
      transition: padding-left 0.18s ease;
    }

    /* ---------- Layout (Statically Open Side-by-Side by Default) ---------- */
    body {
      padding-top: calc(48px + env(safe-area-inset-top, 0px));
      padding-left: 300px;
    }
    body.sidebar-collapsed {
      padding-left: 0;
    }

    /* ---------- Top bar (file ops) ---------- */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 0) 14px 0 max(14px, env(safe-area-inset-right, 0));
      height: calc(48px + env(safe-area-inset-top, 0px));
      background: var(--navy);
      color: white;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 240;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .topbar h1 { margin: 0 14px 0 0; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
    .topbar button { padding: 7px 13px; border: none; background: var(--steel); color: var(--navy); cursor: pointer; border-radius: 3px; font-weight: 600; font-size: 13px; font-family: inherit; transition: background 0.15s; }
    .topbar button:hover { background: var(--frost); }
    .topbar button.primary { background: var(--success); color: white; }
    .topbar button.primary:hover { background: #3a8e3f; }
    .topbar .spacer { flex: 1; }
    .topbar .hint { font-size: 12px; opacity: 0.85; }
    .topbar .btn-label-short { display: none; }

    /* ---------- Hamburger button (in topbar) ---------- */
    .topbar .hamburger-btn {
      background: transparent; color: white; border: 1px solid rgba(255,255,255,0.35); width: 38px; height: 36px; padding: 0; margin-right: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; flex-shrink: 0;
    }
    .topbar .hamburger-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.6); }
    .topbar .hamburger-btn .hamburger-icon { position: relative; display: inline-block; width: 18px; height: 14px; }
    .topbar .hamburger-btn .hamburger-icon::before,
    .topbar .hamburger-btn .hamburger-icon::after,
    .topbar .hamburger-btn .hamburger-icon > span { content: ''; position: absolute; left: 0; width: 100%; height: 2px; background: white; border-radius: 1px; transition: transform 0.18s ease, opacity 0.18s ease, top 0.18s ease; }
    .topbar .hamburger-btn .hamburger-icon::before { top: 0; }
    .topbar .hamburger-btn .hamburger-icon > span { top: 6px; }
    .topbar .hamburger-btn .hamburger-icon::after  { top: 12px; }
    
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::before { top: 6px; transform: rotate(45deg); }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon::after { top: 6px; transform: rotate(-45deg); }
    body:not(.sidebar-collapsed) .topbar .hamburger-btn .hamburger-icon > span { opacity: 0; }

    /* ---------- Sidebar Panel ---------- */
    .sidebar {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      left: 0; bottom: 0; width: 300px; max-width: 88vw;
      background: #f1f3f7; border-right: 1px solid var(--steel);
      overflow-y: auto; overflow-x: hidden; z-index: 220;
      display: flex; flex-direction: column; transform-origin: top left;
      transition: transform 0.18s ease, opacity 0.18s ease;
      box-shadow: 4px 6px 18px rgba(0,0,0,0.12);
    }
    body.sidebar-collapsed .sidebar { transform: translateX(-100%); opacity: 0; pointer-events: none; }

    /* Backdrop is purely a visual block option hidden on desktop configs */
    .sidebar-backdrop {
      position: fixed; top: calc(48px + env(safe-area-inset-top, 0px)); left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.28); z-index: 210; opacity: 1; display: none; transition: opacity 0.18s ease;
    }
    body:not(.sidebar-collapsed) .sidebar-backdrop { display: none; }

    .sidebar-header { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 6px 10px 6px 14px; background: var(--frost); border-bottom: 1px solid var(--steel); font-size: 11px; font-weight: 700; color: var(--charcoal); letter-spacing: 0.6px; text-transform: uppercase; z-index: 1; }
    .sidebar-toggle { background: white; border: 1px solid var(--steel); color: var(--charcoal); cursor: pointer; width: 26px; height: 26px; padding: 0; border-radius: 3px; font-size: 16px; font-family: inherit; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .sidebar-toggle:hover { background: var(--frost); border-color: var(--navy); }
    .sidebar-section { padding: 12px 14px 14px; border-bottom: 1px solid var(--steel); }
    .sidebar-section:last-child { border-bottom: none; }
    .sidebar-section h3 { margin: 0 0 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--charcoal); }
    .sidebar-section h4 { margin: 12px 0 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--charcoal); opacity: 0.85; }

    .sidebar-block-list { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-block-list button { width: 100%; padding: 8px 10px; border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 12px; font-weight: 600; text-align: left; letter-spacing: 0.3px; }
    .sidebar-block-list button:hover { filter: brightness(1.07); border-color: var(--navy); }
    .sidebar-block-list .add-step { background: #e8eaed; color: var(--charcoal); border-color: #c8ccd1; }
    .sidebar-block-list .add-warning  { background: var(--color-ember);   color: white; border-color: var(--color-ember); }
    .sidebar-block-list .add-caution  { background: var(--color-gold);    color: white; border-color: var(--color-gold); }
    .sidebar-block-list .add-note     { background: var(--color-cobalt);  color: white; border-color: var(--color-cobalt); }
    .sidebar-block-list .add-watch    { background: var(--color-rust);    color: white; border-color: var(--color-rust); }
    .sidebar-block-list .add-monitor  { background: var(--color-plum);    color: white; border-color: var(--color-plum); }
    .sidebar-block-list .add-record   { background: var(--color-pine);    color: white; border-color: var(--color-pine); }
    .sidebar-block-list .add-tools    { background: var(--color-teal);    color: white; border-color: var(--color-teal); }
    .sidebar-block-list .add-inspect  { background: var(--color-sky);     color: white; border-color: var(--color-sky); }
    .sidebar-block-list .add-measure  { background: var(--color-seafoam); color: white; border-color: var(--color-seafoam); }
    .sidebar-block-list .add-finding  { background: var(--color-fern);    color: white; border-color: var(--color-fern); }
    .sidebar-block-list .add-concern  { background: var(--color-rose);    color: white; border-color: var(--color-rose); }
    .sidebar-block-list .add-analysis { background: var(--color-iris);    color: white; border-color: var(--color-iris); }
    .sidebar-block-list .add-parts { background: var(--color-cobalt); color: white; border-color: var(--color-cobalt); }
    .sidebar-block-list .add-photoarray { background: #d8dde4; color: var(--charcoal); border-color: #b8c0cc; }
    .sidebar-block-list .add-textbox { background: white; color: var(--charcoal); border: 1px dashed var(--steel); font-weight: 500; font-style: italic; }
    .sidebar-block-list .add-section { background: white; color: var(--navy); border-color: var(--navy); border-width: 2px; font-weight: 800; letter-spacing: 0.4px; }

    .sidebar-fmt-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 8px; }
    .sidebar-fmt-row:last-child { margin-bottom: 0; }
    .sidebar-fmt-row .label { font-size: 11px; color: var(--charcoal); font-weight: 600; margin-right: 2px; }
    .sidebar-fmt-row button { border: 1px solid var(--steel); background: white; color: var(--charcoal); padding: 4px 9px; cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 12px; font-weight: 500; min-height: 26px; }
    .sidebar-fmt-row button:hover { border-color: var(--navy); }
    .sidebar-fmt-row button:active { background: var(--frost); }
    .sidebar-fmt-row .fmt-bold { font-weight: 800; width: 30px; font-size: 14px; }
    .sidebar-fmt-row .size-btn { width: 28px; padding: 4px 0; text-align: center; }
    .sidebar-fmt-row .size-btn[data-arg="2"] { font-size: 10px; }
    .sidebar-fmt-row .size-btn[data-arg="3"] { font-size: 12px; }
    .sidebar-fmt-row .size-btn[data-arg="4"] { font-size: 14px; }
    .sidebar-fmt-row .size-btn[data-arg="5"] { font-size: 16px; }
    .sidebar-fmt-row .color-swatch { width: 24px; height: 24px; padding: 0; border: 2px solid white; outline: 1px solid var(--steel); cursor: pointer; border-radius: 3px; min-height: 0; }
    .sidebar-fmt-row .color-swatch:hover { outline-color: var(--navy); }

    .sidebar-icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .sidebar-icon-grid button { border: 1px solid var(--steel); padding: 6px 4px; cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; min-height: 28px; print-color-adjust: exact; }
    .sidebar-icon-grid .fmt-icon-warning { background: var(--danger); color: white; border-color: var(--danger); }
    .sidebar-icon-grid .fmt-icon-caution { background: var(--amber);  color: #2c1f00; border-color: #d99e00; }
    .sidebar-icon-grid .fmt-icon-inspect { background: var(--info);   color: white; border-color: var(--info); }
    .sidebar-icon-grid .fmt-icon-torque  { background: #424242;       color: white; border-color: #424242; }
    .sidebar-clear-btn { width: 100%; margin-top: 10px; padding: 6px 8px; border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 11px; font-weight: 600; }
    .sidebar-clear-btn:hover { border-color: var(--navy); }

    /* ---------- Floating format toolbar ---------- */
    .floating-fmt-toolbar { position: fixed; top: calc(48px + env(safe-area-inset-top, 0px) + 6px); left: 50%; transform: translateX(-50%); background: white; border: 1px solid var(--steel); border-radius: 6px; padding: 5px 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); z-index: 250; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; max-width: calc(100vw - 24px); }
    .floating-fmt-toolbar[hidden] { display: none; }
    .floating-fmt-toolbar button { border: 1px solid var(--steel); background: white; color: var(--charcoal); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 12px; padding: 4px 7px; min-width: 26px; min-height: 26px; line-height: 1; }
    .floating-fmt-toolbar button:hover { border-color: var(--navy); }
    .floating-fmt-toolbar button:active { background: var(--frost); }
    .floating-fmt-toolbar .fmt-bold { font-weight: 700; font-family: Georgia, 'Times New Roman', serif; }
    .floating-fmt-toolbar .size-btn { padding: 4px 6px; }
    .floating-fmt-toolbar .size-btn[data-arg="2"] { font-size: 10px; }
    .floating-fmt-toolbar .size-btn[data-arg="3"] { font-size: 12px; }
    .floating-fmt-toolbar .size-btn[data-arg="4"] { font-size: 14px; }
    .floating-fmt-toolbar .size-btn[data-arg="5"] { font-size: 16px; }
    .floating-fmt-toolbar .color-swatch { width: 22px; height: 22px; min-width: 22px; padding: 0; border: 1px solid #999; border-radius: 3px; outline: 2px solid transparent; outline-offset: 0; }
    .floating-fmt-toolbar .color-swatch:hover { outline-color: var(--navy); }
    .floating-fmt-toolbar .floating-fmt-sep { width: 1px; align-self: stretch; background: var(--frost); margin: 2px 4px; }
    .floating-fmt-toolbar .floating-fmt-label { font-size: 11px; color: var(--charcoal); font-weight: 600; margin-right: 2px; }
    .floating-fmt-toolbar .floating-fmt-clear { font-size: 14px; padding: 4px 8px; }

    @media (max-width: 600px) {
      .floating-fmt-toolbar { padding: 4px 6px; gap: 3px; }
      .floating-fmt-toolbar .floating-fmt-label { display: none; }
      .floating-fmt-toolbar button { min-width: 30px; min-height: 30px; }
    }

    /* ---------- Pages ---------- */
    .pages-container { padding: 22px 14px 40px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
    .page { width: 8.5in; height: 11in; background: white; box-shadow: 0 4px 16px rgba(0,0,0,0.22); padding: 0.10in 0.25in 0.25in; display: flex; flex-direction: column; position: relative; }

    /* ---------- Header ---------- */
    .header { display: flex; align-items: center; gap: 14px; border-bottom: 2px solid var(--navy); padding-bottom: 4px; margin-bottom: 4px; flex-shrink: 0; }
    .logo-area { width: 1.4in; height: 0.85in; border: 2px dashed var(--steel); border-radius: 3px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; overflow: hidden; position: relative; background: white; }
    .logo-area:hover { background: var(--frost); }
    .logo-area.has-image { border-style: solid; border-color: transparent; }
    .logo-area.dragover  { background: var(--frost); border-color: var(--navy); }
    .logo-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .logo-area .placeholder { color: #888; font-size: 10.5px; text-align: center; pointer-events: none; line-height: 1.3; }
    .logo-area .clear-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.6); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; font-weight: bold; display: none; line-height: 1; }
    .logo-area:hover .clear-btn { display: block; }

    .header-info { flex: 1; min-width: 0; }
    .title-row { display: flex; align-items: center; gap: 12px; }
    .title-field { font-size: 22px; font-weight: 700; color: var(--navy); border: none; flex: 1; min-width: 0; outline: none; font-family: inherit; padding: 1px 0; background: transparent; }
    .title-field::placeholder { color: var(--steel); font-style: italic; font-weight: 500; }
    .form-type-selector { display: flex; align-items: center; gap: 6px; font-size: 11px; flex-shrink: 0; }
    .form-type-selector label { color: var(--charcoal); font-weight: 600; white-space: nowrap; }
    .form-type-select { font-family: inherit; font-size: 11px; padding: 3px 6px; border: 1px solid var(--steel); border-radius: 3px; background: white; color: var(--charcoal); cursor: pointer; }
    .form-type-select:hover { border-color: var(--navy); }
    .form-type-select:focus { outline: 2px solid var(--navy); outline-offset: -1px; }

    .meta-row { display: flex; gap: 14px; margin-top: 5px; font-size: 11px; flex-wrap: wrap; }
    .meta-field { display: flex; align-items: baseline; gap: 4px; }
    .meta-field label { font-weight: 700; color: var(--navy); white-space: nowrap; }
    .meta-field input { border: none; border-bottom: 1px solid var(--steel); outline: none; padding: 1px 2px; font-family: inherit; font-size: 11px; background: transparent; color: var(--charcoal); }
    .meta-field input:focus { border-bottom-color: var(--navy); }

    /* ---------- Content area ---------- */
    .content-area { flex: 1; display: flex; flex-direction: column; gap: 0.10in; padding-top: 0.11in; min-height: 0; overflow: hidden; }
    .row-step { flex: 0 0 auto; min-height: 2.15in; }
    .row-callout { flex: 0 0 auto; min-height: 0.32in; }
    .row-section { flex: 0 0 0.60in; height: 0.60in; }
    .row-spacer { flex: 0 0 auto; pointer-events: none; }
    .row-parts { flex: 0 0 auto; min-height: 0.40in; }
    .row-photoarray { flex: 0 0 auto; min-height: 2.60in; }
    .row-textbox { flex: 0 0 auto; min-height: 0.50in; }

    /* ---------- Universal Block Custom Properties ---------- */
    .step { border: 1.5px solid var(--block-color, var(--navy)); border-radius: 3px; padding: 4px 5px; display: flex; flex-direction: row; gap: 6px; overflow: visible; position: relative; background: white; height: 2.15in; }
    .step-number { background: var(--block-color, var(--navy)); color: white; min-width: 22px; height: 18px; padding: 0 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; position: absolute; top: -10px; left: 4px; border-radius: 3px; letter-spacing: 0.3px; box-shadow: 0 1px 2px rgba(0,0,0,0.18); print-color-adjust: exact; z-index: 2; }
    
    .parts-block { background: white; border: 1.5px solid var(--block-color, var(--color-cobalt)); border-radius: 3px; position: relative; overflow: visible; print-color-adjust: exact; }
    .parts-header { background: var(--block-color, var(--color-cobalt)); color: white; font-weight: 700; font-size: 12px; letter-spacing: 0.6px; padding: 4px 12px; display: flex; align-items: center; print-color-adjust: exact; }

    .block-title-bar { background: var(--block-color, var(--color-cobalt)); color: white; font-weight: 700; font-size: 12px; letter-spacing: 0.6px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; print-color-adjust: exact; }
    .section-header { display: flex; align-items: flex-start; background: white; color: var(--navy); padding: 0 2px; position: relative; height: 100%; print-color-adjust: exact; }
    .section-header-text { flex: 1; outline: none; cursor: text; font-weight: 700; font-size: 15px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--block-color, var(--navy)); white-space: nowrap; overflow: hidden; text-overflow: clip; min-width: 0; line-height: 1.2; border-bottom: 2.5px solid var(--block-color, var(--navy)); padding: 0 0 4px 4px; }
    
    .textbox-block { background: white; border: 1.5px solid var(--block-color, var(--steel)); border-radius: 3px; padding: 6px 10px; position: relative; min-height: 0.50in; }

    /* ---------- Photo array block ---------- */
    .photoarray-block { background: white; position: relative; display: flex; flex-direction: column; gap: 0.10in; }
    .photoarray-row { display: grid; gap: 0.10in; width: 7.70in; max-width: 100%; margin: 0 auto; height: 2.50in; }
    .photoarray-row.count-1 { grid-template-columns: 1fr; }
    .photoarray-row.count-2 { grid-template-columns: 1fr 1fr; }
    .photoarray-row.count-3 { grid-template-columns: 1fr 1fr 1fr; }
    .photoarray-cell { background: var(--frost); border: 1px dashed var(--steel); border-radius: 3px; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; position: relative; min-height: 0; }
    .photoarray-cell:not(.has-image) { align-items: center; justify-content: center; }
    .photoarray-cell:hover { background: #dde4ee; }
    .photoarray-cell:focus { outline: 2px solid var(--navy); outline-offset: 2px; background: #dde4ee; }
    .photoarray-cell:focus:not(.has-image) { background: var(--frost); }
    .photoarray-cell.has-image { background: white; border-style: solid; border-color: var(--frost); }
    .photoarray-cell.dragover  { background: var(--frost); border-color: var(--navy); border-style: solid; }
    .photoarray-cell-image { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .photoarray-cell-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .photoarray-caption { flex: 0 0 auto; border: none; border-top: 1px solid var(--frost); outline: none; background: transparent; text-align: center; font-size: 11px; font-style: italic; color: var(--charcoal); padding: 2px 6px; width: 100%; height: 20px; font-family: inherit; box-sizing: border-box; }
    .photoarray-caption:focus { background: rgba(232, 235, 240, 0.5); }
    .photoarray-caption::placeholder { color: var(--steel); font-style: italic; }
    .photoarray-cell .placeholder { color: #888; font-size: 10px; text-align: center; padding: 4px; pointer-events: none; line-height: 1.25; }
    .photoarray-cell .clear-btn { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.65); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 11px; font-weight: bold; display: none; line-height: 1; }
    .photoarray-cell:hover .clear-btn { display: block; }
    .photoarray-row-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; width: 7.70in; max-width: 100%; margin: 4px auto 0; min-height: 22px; }
    .photoarray-add-image { padding: 3px 10px; border: 1px solid var(--navy); background: white; color: var(--navy); border-radius: 3px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; line-height: 1.4; }
    .photoarray-add-image:hover { background: var(--navy); color: white; }

    .parts-table { width: 100%; border-collapse: collapse; table-layout: auto; }

    /* ---------- Callout color schemes ---------- */
    .callout { display: flex; align-items: stretch; border: 2px solid var(--callout-color, var(--charcoal)); border-radius: 3px; background: white; min-height: 100%; position: relative; print-color-adjust: exact; }

    .callout-monitor  { --callout-color: var(--color-plum);    --callout-text-color: #ffffff; }
    .callout-record   { --callout-color: var(--color-pine);    --callout-text-color: #ffffff; }
    .callout-tools    { --callout-color: var(--color-teal);    --callout-text-color: #ffffff; }
    .callout-inspect  { --callout-color: var(--color-sky);     --callout-text-color: #ffffff; }
    .callout-measure  { --callout-color: var(--color-seafoam); --callout-text-color: #ffffff; }
    .callout-finding  { --callout-color: var(--color-fern);    --callout-text-color: #ffffff; }
    .callout-concern  { --callout-color: var(--color-rose);    --callout-text-color: #ffffff; }
    .callout-analysis { --callout-color: var(--color-iris);    --callout-text-color: #ffffff; }
    .callout-badge { background: var(--callout-color); color: var(--callout-text-color); font-weight: 700; font-size: 11px; padding: 4px 10px; display: flex; align-items: center; justify-content: center; white-space: nowrap; letter-spacing: 0.5px; flex-shrink: 0; min-width: 0.85in; print-color-adjust: exact; }

    .step:hover > .block-controls, .callout:hover > .block-controls, .section-header:hover > .block-controls, .parts-block:hover > .block-controls, .photoarray-block:hover > .block-controls, .textbox-block:hover > .block-controls { opacity: 1; }

    }

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'workInstructionBuilder_v4';
  const LEGACY_KEYS = ['workInstructionBuilder_v3','workInstructionBuilder_v2','workInstructionBuilder_v1'];

  const PAGE_CONTENT_HEIGHT = 9.20;
  const STEP_ROW_HEIGHT     = 2.20;
  const CALLOUT_ROW_HEIGHT  = 0.32;
  const SECTION_ROW_HEIGHT  = 0.60;
  const ROW_GAP             = 0.10;
  const TITLE_BAR_HEIGHT    = 0.23;
  const PARTS_BASE_HEIGHT   = 0.85;
  const PARTS_ROW_HEIGHT    = 0.22;

  const CALLOUT_KINDS = {
    warning:   { label: 'WARNING',  icon: '\u26A0' },
    caution:   { label: 'CAUTION',  icon: '\u26A0' },
    note:      { label: 'NOTE',     icon: '\u2139' },
    watch:     { label: 'TIP',      icon: '\u2757' },
    monitor:   { label: 'MONITOR',  icon: '\u25C9' },
    record:    { label: 'RECORD',   icon: '\u270E' },
    tools:     { label: 'TOOLS',    icon: '\u2692' },
    inspect:   { label: 'INSPECT',  icon: '\u2315' },
    measure:   { label: 'MEASURE',  icon: '\u2194' },
    finding:   { label: 'FINDING',  icon: '' },
    concern:   { label: 'CONCERN',  icon: '' },
    analysis:  { label: 'ANALYSIS', icon: '' }
  };

  const FORM_TYPES = {
    blank: { label: 'Blank', titlePlaceholder: 'Form Title', fields: [] },
    workInstruction: {
      label: 'Work Instruction', titlePlaceholder: 'Work Instruction Title (e.g., Turbocharger Cartridge Assembly)',
      fields: [
        { key: 'partNumber', label: 'Part #',    width: 110 },
        { key: 'operation',  label: 'Operation', width: 130 },
        { key: 'rev',        label: 'Rev',       width: 50  },
        { key: 'date',       label: 'Date',      width: 90  }
      ]
    }
  };

  function getFormSchema(formType) { return FORM_TYPES[formType] || FORM_TYPES.blank; }
  let _idCounter = 0;
  let state = createEmptyState();
  let lastFocusedEditable = null;
  let lastFocusedBlockId = null;
  let focusBlockIdAfterRender = null;
  const pendingPhotoSlot = new Map();
  const partsCellSelection = new Map();
  let partsDrag = null;
  let _dragData = null;
  let _dragInsertIdx = -1;
  let _lastMousedownEl = null;

  function genId() { _idCounter += 1; return 'b_' + Date.now().toString(36) + '_' + _idCounter.toString(36); }
  function createStepBlock(img, text) { return { id: genId(), type: 'step', img: img || null, text: text || '' }; }
  function createCalloutBlock(kind, text) { return { id: genId(), type: 'callout', kind: CALLOUT_KINDS[kind] ? kind : 'note', text: text || '' }; }
  function createSectionBlock(text) { return { id: genId(), type: 'section', text: text || '' }; }
  function createTextBoxBlock(text) { return { id: genId(), type: 'textbox', text: text || '' }; }
  function createPartsBlock(columns, rows, title) {
    const cols = Array.isArray(columns) && columns.length > 0 ? columns.slice() : ['Part Number', 'Description', 'Quantity'];
    return { id: genId(), type: 'parts', title: title || '', columns: cols, rows: [Array(cols.length).fill('')] };
  }
  function createPhotoArrayBlock(rows) {
    return { id: genId(), type: 'photoarray', rows: Array.isArray(rows) ? rows : [[null, null, null]] };
  }
  function createEmptyState() { return { logo: null, title: '', formType: 'blank', metaFields: {}, blocks: [] }; }

  function normalizeState(s) {
    if (!s || typeof s !== 'object') return createEmptyState();
    if (!Array.isArray(s.blocks)) s.blocks = [];
    s.blocks.forEach(b => {
      if (!b.id) b.id = genId();
      if (typeof b.precedingSpacers !== 'number') b.precedingSpacers = 0;
    });
    return s;
  }

  function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); } }
  function loadState() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) { state = normalizeState(JSON.parse(data)); return true; }
    } catch (e) {}
    return false;
  }

  function processImage(file, opts) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
          if (w > opts.maxWidth || h > opts.maxHeight) {
            const r = Math.min(opts.maxWidth / w, opts.maxHeight / h);
            w = Math.round(w * r); h = Math.round(h * r);
          }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          if (opts.mimeType === 'image/jpeg') { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,w,h); }
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL(opts.mimeType, opts.quality || 1.0));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function loadLogoFile(file) { return processImage(file, { maxWidth: 800, maxHeight: 400, mimeType: 'image/png' }); }
  function loadStepImageFile(file) { return processImage(file, { maxWidth: 1600, maxHeight: 1600, mimeType: 'image/jpeg', quality: 0.85 }); }
  function pickFile(accept) { return new Promise(r => { const i = document.createElement('input'); i.type = 'file'; i.accept = accept; i.onchange = () => r(i.files?.[0]); i.click(); }); }

  function findBlockById(id) { return state.blocks.find(b => b.id === id) || null; }
  function findBlockIndex(id) { return state.blocks.findIndex(b => b.id === id); }
  function estimateSpacerHeight(block) { return STEP_ROW_HEIGHT; }

  function blocksToRows(blocks) {
    const rows = [];
    for (const block of blocks) {
      const spacers = Math.max(0, block.precedingSpacers | 0);
      for (let s = 0; s < spacers; s++) rows.push({ type: 'spacer', block, height: STEP_ROW_HEIGHT });
      if (block.type === 'photoarray') {
        block.rows.forEach((_, i) => rows.push({ type: 'photoarrayrow', block, rowIdx: i, isFirstInBlock: i === 0, isLastInBlock: i === block.rows.length - 1 }));
      } else {
        rows.push({ type: block.type, block });
      }
    }
    return rows;
  }

  function paginate(rows) {
    const pages = []; let cur = [], h = 0;
    for (const row of rows) {
      let rh = row.type === 'photoarrayrow' ? 2.50 : STEP_ROW_HEIGHT;
      if (h + rh > PAGE_CONTENT_HEIGHT && cur.length > 0) { pages.push(cur); cur = []; h = 0; }
      cur.push(row); h += rh;
    }
    if (cur.length > 0) pages.push(cur);
    return pages.length ? pages : [[]];
  }

  function render() {
    let n = 0; state.blocks.forEach(b => { if (b.type === 'step') b._number = ++n; });
    const rows = blocksToRows(state.blocks);
    let pages = paginate(rows);
    const container = document.getElementById('pagesContainer'); container.innerHTML = '';
    pages.forEach((pageRows, pageIdx) => container.appendChild(buildPageElement(pageRows, pageIdx, pages.length)));
  }

  function buildPageElement(rows, pageIdx, totalPages) {
    const pageEl = document.createElement('div'); pageEl.className = 'page';
    pageEl.appendChild(buildHeader());
    const content = document.createElement('div'); content.className = 'content-area';

    let i = 0;
    while (i < rows.length) {
      const row = rows[i];
      if (row.type === 'photoarrayrow') {
        const block = row.block; const indices = [row.rowIdx]; let j = i + 1;
        while (j < rows.length && rows[j].type === 'photoarrayrow' && rows[j].block === block) { indices.push(rows[j].rowIdx); j++; }
        content.appendChild(buildRowElement({ type: 'photoarraychunk', block, rowIndices: indices, isFirstChunk: indices[0] === 0, isLastChunk: indices[indices.length - 1] === block.rows.length - 1 }));
        i = j;
      } else {
        content.appendChild(buildRowElement(row)); i++;
      }
    }
    pageEl.appendChild(content);
    return pageEl;
  }

  function buildHeader() {
    const header = document.createElement('div'); header.className = 'header';
    const logo = document.createElement('div'); logo.className = 'logo-area' + (state.logo ? ' has-image' : '');
    logo.onclick = async () => { const file = await pickFile('image/*'); if (file) { state.logo = await loadLogoFile(file); saveState(); render(); } };
    if (state.logo) { const img = document.createElement('img'); img.src = state.logo; logo.appendChild(img); }
    else { logo.innerHTML = '<div class="placeholder">Click for Logo</div>'; }
    header.appendChild(logo);

    const info = document.createElement('div'); info.className = 'header-info';
    const titleRow = document.createElement('div'); titleRow.className = 'title-row';
    const title = document.createElement('input'); title.className = 'title-field'; title.placeholder = 'Document Title'; title.value = state.title || '';
    title.oninput = () => { state.title = title.value; saveState(); };
    titleRow.appendChild(title); info.appendChild(titleRow); header.appendChild(info);
    return header;
  }

  function buildRowElement(row) {
    const el = document.createElement('div'); el.className = 'row row-' + row.type; el.dataset.rowBlockId = row.block.id;
    if (row.type === 'spacer') { el.style.height = row.height + 'in'; return el; }

    let inner;
    if (row.type === 'step') inner = buildStepElement(row.block);
    else if (row.type === 'callout') inner = buildCalloutElement(row.block);
    else if (row.type === 'section') inner = buildSectionElement(row.block);
    else if (row.type === 'parts') inner = buildPartsElement(row.block);
    else if (row.type === 'textbox') inner = buildTextBoxElement(row.block);
    else if (row.type === 'photoarraychunk') {
      inner = document.createElement('div'); inner.className = 'photoarray-block';
      if (row.isFirstChunk && typeof row.block.title === 'string') inner.appendChild(buildBlockTitleBar(row.block));
      inner.appendChild(buildPhotoArrayElement(row.block, row));
    }

    if (inner) {
      if (row.block.color) inner.style.setProperty('--block-color', row.block.color);
      el.appendChild(inner);
    }
    return el;
  }

  function buildStepElement(block) {
    const el = document.createElement('div'); el.className = 'step' + (typeof block.title === 'string' ? ' has-title' : '');
    el.dataset.blockId = block.id;
    if (typeof block.title === 'string') el.appendChild(buildBlockTitleBar(block));

    const num = document.createElement('div'); num.className = 'step-number'; num.textContent = block._number || ''; el.appendChild(num);
    const imgArea = document.createElement('div'); imgArea.className = 'step-image' + (block.img ? ' has-image' : '');
    imgArea.onclick = async () => { const f = await pickFile('image/*'); if (f) { block.img = await loadStepImageFile(f); saveState(); render(); } };
    if (block.img) { const img = document.createElement('img'); img.src = block.img; imgArea.appendChild(img); }
    else { imgArea.innerHTML = '<div class="placeholder">Click to Upload Image</div>'; }
    el.appendChild(imgArea);

    const text = document.createElement('div'); text.className = 'step-text rich-text-editor'; text.contentEditable = 'true'; text.innerHTML = block.text || '';
    text.oninput = () => { block.text = text.innerHTML; saveState(); };
    el.appendChild(text); el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildSectionElement(block) {
    const el = document.createElement('div'); el.className = 'section-header'; el.dataset.blockId = block.id;
    const text = document.createElement('div'); text.className = 'section-header-text rich-text-editor'; text.contentEditable = 'true'; text.innerHTML = block.text || 'SECTION TITLE';
    text.oninput = () => { block.text = text.innerHTML; saveState(); };
    el.appendChild(text); el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildTextBoxElement(block) {
    const el = document.createElement('div'); el.className = 'textbox-block'; el.dataset.blockId = block.id;
    const text = document.createElement('div'); text.className = 'textbox-text rich-text-editor'; text.contentEditable = 'true'; text.innerHTML = block.text || 'Enter text...';
    text.oninput = () => { block.text = text.innerHTML; saveState(); };
    el.appendChild(text); el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildPartsElement(block) {
    const el = document.createElement('div'); el.className = 'parts-block'; el.dataset.blockId = block.id;
    const header = document.createElement('div'); header.className = 'parts-header';
    header.innerHTML = `<div class="parts-header-label rich-text-editor" contenteditable="true">${block.title || 'Chart'}</div>`;
    header.querySelector('.parts-header-label').oninput = (e) => { block.title = e.target.innerHTML; saveState(); };
    el.appendChild(header);

    const table = document.createElement('table'); table.className = 'parts-table';
    table.innerHTML = `<thead><tr><th class="parts-cell">Item</th><th class="parts-cell">Description</th></tr></thead>
                       <tbody><tr><td class="parts-cell rich-text-editor" contenteditable="true"></td><td class="parts-cell rich-text-editor" contenteditable="true"></td></tr></tbody>`;
    el.appendChild(table); el.appendChild(buildBlockControls(block));
    return el;
  }

  function compactPhotoArrayRow(row) {
    const out = row.filter(c => c && c.src);
    while (out.length < 3) out.push(null);
    return out;
  }

  function buildPhotoArrayElement(block, chunk) {
    const el = document.createElement('div'); el.className = 'photoarray-row count-3';
    const rowIdx = chunk.rowIndices[0]; const row = block.rows[rowIdx] || [null, null, null];

    row.forEach((cellData, colIdx) => {
      const cell = document.createElement('div'); cell.className = 'photoarray-cell' + (cellData?.src ? ' has-image' : '');
      cell.onclick = async (e) => {
        if (e.target.closest('.photoarray-caption')) return;
        const f = await pickFile('image/*');
        if (f) {
          block.rows[rowIdx][colIdx] = { src: await loadStepImageFile(f), caption: cellData?.caption || '' };
          block.rows[rowIdx] = compactPhotoArrayRow(block.rows[rowIdx]);
          saveState(); render();
        }
      };
      if (cellData?.src) {
        cell.innerHTML = `<div class="photoarray-cell-image"><img src="${cellData.src}"></div>
                          <input type="text" class="photoarray-caption" placeholder="Caption" value="${cellData.caption || ''}">`;
        cell.querySelector('.photoarray-caption').oninput = (e) => { block.rows[rowIdx][colIdx].caption = e.target.value; saveState(); };
      } else {
        cell.innerHTML = '<div class="placeholder">Click to Upload Photo</div>';
      }
      el.appendChild(cell);
    });

    if (chunk.isFirstChunk) el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildCalloutElement(block) {
    const el = document.createElement('div'); el.className = 'callout callout-' + block.kind; el.dataset.blockId = block.id;
    if (block.color) el.style.setProperty('--callout-color', block.color);
    el.innerHTML = `<div class="callout-badge">${block.kind.toUpperCase()}</div>
                    <div class="callout-text rich-text-editor" contenteditable="true">${block.text || ''}</div>`;
    el.querySelector('.callout-text').oninput = (e) => { block.text = e.target.innerHTML; saveState(); };
    el.appendChild(buildBlockControls(block));
    return el;
  }

  function buildBlockTitleBar(block) {
    const bar = document.createElement('div'); bar.className = 'block-title-bar';
    bar.innerHTML = `<div class="block-title-text rich-text-editor" contenteditable="true">${block.title || 'Title'}</div>
                     <button class="block-title-remove no-print">✕</button>`;
    bar.querySelector('.block-title-text').oninput = (e) => { block.title = e.target.innerHTML; saveState(); };
    bar.querySelector('.block-title-remove').onclick = () => { delete block.title; saveState(); render(); };
    return bar;
  }

  function buildBlockControls(block) {
    const wrap = document.createElement('div'); wrap.className = 'block-controls no-print';
    
    const handle = document.createElement('button'); handle.textContent = '☰'; handle.className = 'block-drag-handle'; handle.setAttribute('draggable', 'true');
    handle.addEventListener('dragstart', (e) => { e.stopPropagation(); _dragData = { source: 'block', id: block.id }; document.body.classList.add('is-dragging'); });
    wrap.appendChild(handle);

    if (['step', 'photoarray'].includes(block.type) && typeof block.title !== 'string') {
      const tBtn = document.createElement('button'); tBtn.textContent = 'T'; tBtn.onclick = () => { block.title = ''; saveState(); render(); };
      wrap.appendChild(tBtn);
    }

    const paint = document.createElement('button'); paint.textContent = '▣'; paint.className = 'paint-btn';
    paint.onclick = (e) => { e.stopPropagation(); showColorPicker(block, paint); };
    wrap.appendChild(paint);

    const del = document.createElement('button'); del.textContent = '✕'; del.className = 'delete';
    del.onclick = () => { state.blocks = state.blocks.filter(b => b.id !== block.id); saveState(); render(); };
    wrap.appendChild(del);
    return wrap;
  }

  function showColorPicker(block, anchor) {
    hideColorPicker();
    const p = document.createElement('div'); p.id = 'colorPickerPopup'; p.className = 'color-picker-popup no-print';
    COLOR_PRESETS.forEach(c => {
      const s = document.createElement('button'); s.className = 'cp-swatch'; s.style.background = c;
      s.onclick = () => { block.color = c; saveState(); hideColorPicker(); render(); };
      p.appendChild(s);
    });
    const r = anchor.getBoundingClientRect(); p.style.position = 'fixed'; p.style.left = r.left + 'px'; p.style.top = r.bottom + 'px';
    document.body.appendChild(p); setTimeout(() => document.addEventListener('click', hideColorPicker), 0);
  }
  function hideColorPicker() { document.getElementById('colorPickerPopup')?.remove(); document.removeEventListener('click', hideColorPicker); }

  function setupDragAndDrop() {
    document.querySelectorAll('.sidebar [data-add]').forEach(btn => {
      btn.setAttribute('draggable', 'true');
      btn.addEventListener('dragstart', () => { _dragData = { source: 'sidebar', add: btn.dataset.add, kind: btn.dataset.kind }; document.body.classList.add('is-dragging'); });
    });
    document.addEventListener('dragover', (e) => {
      if (!_dragData) return; e.preventDefault(); const c = e.target.closest?.('.content-area'); if (!c) return;
      const ind = document.getElementById('dropIndicator'); const r = c.getBoundingClientRect();
      ind.style.display = 'block'; ind.style.top = e.clientY + 'px'; ind.style.left = r.left + 'px'; ind.style.width = r.width + 'px';
      const rows = Array.from(c.querySelectorAll('.row[data-row-block-id]')); _dragInsertIdx = rows.length;
      for (let i = 0; i < rows.length; i++) {
        if (e.clientY < (rows[i].getBoundingClientRect().top + rows[i].getBoundingClientRect().height / 2)) { _dragInsertIdx = findBlockIndex(rows[i].dataset.rowBlockId); break; }
      }
    });
    document.addEventListener('drop', (e) => {
      if (!_dragData) return; e.preventDefault(); const idx = _dragInsertIdx >= 0 ? _dragInsertIdx : state.blocks.length;
      if (_dragData.source === 'sidebar') {
        let nb;
        if (_dragData.add === 'step') nb = createStepBlock();
        else if (_dragData.add === 'callout') nb = createCalloutBlock(_dragData.kind);
        else if (_dragData.add === 'section') nb = createSectionBlock();
        else if (_dragData.add === 'parts') nb = createPartsBlock();
        else if (_dragData.add === 'textbox') nb = createTextBoxBlock();
        else if (_dragData.add === 'photoarray') nb = createPhotoArrayBlock();
        if (nb) state.blocks.splice(idx, 0, nb);
      } else if (_dragData.source === 'block') {
        const fIdx = findBlockIndex(_dragData.id);
        if (fIdx >= 0) { const [m] = state.blocks.splice(fIdx, 1); state.blocks.splice(fIdx < idx ? idx - 1 : idx, 0, m); }
      }
      document.body.classList.remove('is-dragging'); document.getElementById('dropIndicator').style.display = 'none'; _dragData = null; saveState(); render();
    });
  }

  function setupFocusTracking() {
    document.addEventListener('focusin', (e) => {
      if (e.target.classList?.contains('rich-text-editor')) { lastFocusedEditable = e.target; }
    });
  }

  function setupFormatToolbar() {
    const selectors = '.sidebar [data-cmd], .floating-fmt-toolbar [data-cmd]';
    document.querySelectorAll(selectors).forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', () => {
        if (!lastFocusedEditable) return; lastFocusedEditable.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand(btn.dataset.cmd, false, btn.dataset.arg || null);
        lastFocusedEditable.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
    document.querySelectorAll('[data-icon]').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', () => {
        if (!lastFocusedEditable) return; lastFocusedEditable.focus();
        document.execCommand('insertHTML', false, `<span class="wi-icon wi-${btn.dataset.icon}" contenteditable="false">${btn.textContent}</span>&nbsp;`);
        lastFocusedEditable.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
  }

  function setupFloatingFormatToolbar() {
    const t = document.getElementById('floatingFormatToolbar'); if (!t) return;
    document.addEventListener('focusin', (e) => { if (e.target.classList?.contains('rich-text-editor')) t.hidden = false; });
    document.addEventListener('focusout', () => { setTimeout(() => { if (!document.activeElement.classList?.contains('rich-text-editor') && !t.contains(document.activeElement)) t.hidden = true; }, 40); });
  }

  function exportTemplate() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' })); a.download = 'template.json'; a.click(); }
  function importTemplate() { pickFile('.json').then(f => { if (!f) return; const r = new FileReader(); r.onload = () => { state = normalizeState(JSON.parse(r.result)); saveState(); render(); }; r.readAsText(f); }); }
  function newDocument() { if (confirm('Clear template?')) { state = createEmptyState(); saveState(); render(); } }

  const COLOR_PRESETS = [
    /* Reds / Magentas */
    '#D13438', '#E3008C', '#C239B3', '#B4009E', '#5C2D91', '#32145A',
    /* Blues */
    '#003366', '#004E8C', '#0078D4', '#0099BC', '#008272', '#00B294',
    /* Greens */
    '#004B1C', '#107C10', '#498205', '#00CC6A',
    /* Oranges / Ambers */
    '#DA3B01', '#CA5010', '#F7630C', '#FFB900', '#C19C00', '#8A6B00',
    /* Browns */
    '#7A4100', '#5D4037',
  ];

  window.exportTemplate = exportTemplate; window.importTemplate = importTemplate; window.newDocument = newDocument;

  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    document.body.classList.remove('sidebar-collapsed');
    render();
    setupDragAndDrop();
    setupFocusTracking();
    setupFormatToolbar();
    setupFloatingFormatToolbar();

    document.getElementById('hamburgerBtn').onclick = () => document.body.classList.toggle('sidebar-collapsed');
    document.getElementById('sidebarCollapseBtn').onclick = () => document.body.classList.add('sidebar-collapsed');
  });
})();
</script>
</body>
</html>
