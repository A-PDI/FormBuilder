<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#1D2B4F" />
    <title>Work Instruction Builder</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --navy: #1d2b4f;
        --steel: #b8c4d8;
        --frost: #e8ebf0;
        --charcoal: #595959;
        --white: #ffffff;
        --dew: #d0d7e3;
        /* Reds */
        --color-ember: #b85c58;
        --color-rose: #c07080;
        --color-blush: #d49098;
        /* Oranges */
        --color-rust: #b87550;
        --color-clay: #c08560;
        --color-terra: #c89070;
        /* Yellows */
        --color-gold: #b89840;
        --color-straw: #c4a860;
        --color-flax: #d0bc80;
        /* Greens */
        --color-pine: #477060;
        --color-fern: #5e8a6a;
        --color-sage: #7a9e85;
        --color-moss: #708c60;
        --color-reed: #90a870;
        /* Teals */
        --color-teal: #5a8e90;
        --color-seafoam: #6ea0a0;
        /* Blues */
        --color-cobalt: #4e72a0;
        --color-sky: #6888b0;
        --color-periwinkle: #8898c8;
        /* Violets */
        --color-plum: #826090;
        --color-iris: #7870a8;
        --color-lavender: #9888c0;
        --color-mauve: #a07898;
        /* Legacy palette - kept so existing buttons/links don't break.
         Insert-block colors now use the --color-* vars above. */
        --danger: #b3261e;
        --success: #2e7d32;
        --info: #1565c0;
        --amber: #f4b400;
        --orange: #e67e22;
        --purple: #5d3fd3;
        --teal: #00695c;
        --cyan: #0288d1;
        --magenta: #ad1457;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Verdana, Arial, sans-serif;
        background: #d4d7dc;
        color: var(--charcoal);
      }

      /* ---------- Layout ---------- */
      body {
        padding-top: calc(48px + env(safe-area-inset-top, 0px));
        /* Sidebar is a hamburger-style overlay; content does not get pushed. */
        padding-left: 0;
      }

      /* ---------- Top bar (file ops) ---------- */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        /* Reserve space for the iOS status bar (notch / dynamic island)
         when the app is added to the home screen. env() falls back to 0
         in browsers/contexts that don't expose safe-area insets. */
        padding: env(safe-area-inset-top, 0) 14px 0
          max(14px, env(safe-area-inset-right, 0));
        height: calc(48px + env(safe-area-inset-top, 0px));
        background: var(--navy);
        color: white;
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 200;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      }
      .topbar h1 {
        margin: 0 14px 0 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .topbar button {
        padding: 7px 13px;
        border: none;
        background: var(--steel);
        color: var(--navy);
        cursor: pointer;
        border-radius: 3px;
        font-weight: 600;
        font-size: 13px;
        font-family: inherit;
        transition: background 0.15s;
      }
      .topbar button:hover {
        background: var(--frost);
      }
      .topbar button.primary {
        background: var(--success);
        color: white;
      }
      .topbar button.primary:hover {
        background: #3a8e3f;
      }
      .topbar .spacer {
        flex: 1;
      }
      .topbar .hint {
        font-size: 12px;
        opacity: 0.85;
      }
      .topbar .btn-label-short {
        display: none;
      }

      /* ---------- Hamburger button (in topbar) ---------- */
      .topbar .hamburger-btn {
        background: transparent;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.35);
        width: 38px;
        height: 36px;
        padding: 0;
        margin-right: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .topbar .hamburger-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.6);
      }
      .topbar .hamburger-btn .hamburger-icon {
        position: relative;
        display: inline-block;
        width: 18px;
        height: 14px;
      }
      .topbar .hamburger-btn .hamburger-icon::before,
      .topbar .hamburger-btn .hamburger-icon::after,
      .topbar .hamburger-btn .hamburger-icon > span {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 2px;
        background: white;
        border-radius: 1px;
        transition:
          transform 0.18s ease,
          opacity 0.18s ease,
          top 0.18s ease;
      }
      .topbar .hamburger-btn .hamburger-icon::before {
        top: 0;
      }
      .topbar .hamburger-btn .hamburger-icon > span {
        top: 6px;
      }
      .topbar .hamburger-btn .hamburger-icon::after {
        top: 12px;
      }
      /* When the menu is open, morph hamburger -> X */
      body:not(.sidebar-collapsed)
        .topbar
        .hamburger-btn
        .hamburger-icon::before {
        top: 6px;
        transform: rotate(45deg);
      }
      body:not(.sidebar-collapsed)
        .topbar
        .hamburger-btn
        .hamburger-icon::after {
        top: 6px;
        transform: rotate(-45deg);
      }
      body:not(.sidebar-collapsed)
        .topbar
        .hamburger-btn
        .hamburger-icon
        > span {
        opacity: 0;
      }

      /* ---------- Sidebar (hamburger menu panel) ---------- */
      .sidebar {
        position: fixed;
        top: calc(48px + env(safe-area-inset-top, 0px));
        left: 0;
        bottom: 0;
        width: 300px;
        max-width: 88vw;
        background: #f1f3f7;
        border-right: 1px solid var(--steel);
        overflow-y: auto;
        overflow-x: hidden;
        z-index: 220;
        display: flex;
        flex-direction: column;
        transform-origin: top left;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
        box-shadow: 4px 6px 18px rgba(0, 0, 0, 0.22);
      }
      body.sidebar-collapsed .sidebar {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }

      /* Backdrop dim while the menu is open (clicking it closes the menu) */
      .sidebar-backdrop {
        position: fixed;
        top: calc(48px + env(safe-area-inset-top, 0px));
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.32);
        z-index: 210;
        opacity: 1;
        transition: opacity 0.18s ease;
      }
      body.sidebar-collapsed .sidebar-backdrop {
        opacity: 0;
        pointer-events: none;
      }
      .sidebar-header {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px 6px 14px;
        background: var(--frost);
        border-bottom: 1px solid var(--steel);
        font-size: 11px;
        font-weight: 700;
        color: var(--charcoal);
        letter-spacing: 0.6px;
        text-transform: uppercase;
        z-index: 1;
      }
      .sidebar-toggle {
        background: white;
        border: 1px solid var(--steel);
        color: var(--charcoal);
        cursor: pointer;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 3px;
        font-size: 16px;
        font-family: inherit;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sidebar-toggle:hover {
        background: var(--frost);
        border-color: var(--navy);
      }
      .sidebar-section {
        padding: 12px 14px 14px;
        border-bottom: 1px solid var(--steel);
      }
      .sidebar-section:last-child {
        border-bottom: none;
      }
      .sidebar-section h3 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--charcoal);
      }
      .sidebar-section h4 {
        margin: 12px 0 6px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--charcoal);
        opacity: 0.85;
      }

      /* Block insertion buttons (full-width, stacked) */
      .sidebar-block-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .sidebar-block-list button {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        text-align: left;
        letter-spacing: 0.3px;
      }
      .sidebar-block-list button:hover {
        filter: brightness(1.07);
        border-color: var(--navy);
      }
      .sidebar-block-list .add-step {
        background: #e8eaed;
        color: var(--charcoal);
        border-color: #c8ccd1;
      }
      /* Sidebar buttons mirror the on-page callout palette, so each button
       reads like the block it inserts. Borders match the background for a
       clean flat look. */
      .sidebar-block-list .add-warning {
        background: var(--color-ember);
        color: white;
        border-color: var(--color-ember);
      }
      .sidebar-block-list .add-caution {
        background: var(--color-gold);
        color: white;
        border-color: var(--color-gold);
      }
      .sidebar-block-list .add-note {
        background: var(--color-cobalt);
        color: white;
        border-color: var(--color-cobalt);
      }
      .sidebar-block-list .add-watch {
        background: var(--color-rust);
        color: white;
        border-color: var(--color-rust);
      }
      .sidebar-block-list .add-monitor {
        background: var(--color-plum);
        color: white;
        border-color: var(--color-plum);
      }
      .sidebar-block-list .add-record {
        background: var(--color-pine);
        color: white;
        border-color: var(--color-pine);
      }
      .sidebar-block-list .add-tools {
        background: var(--color-teal);
        color: white;
        border-color: var(--color-teal);
      }
      .sidebar-block-list .add-inspect {
        background: var(--color-sky);
        color: white;
        border-color: var(--color-sky);
      }
      .sidebar-block-list .add-measure {
        background: var(--color-seafoam);
        color: white;
        border-color: var(--color-seafoam);
      }
      .sidebar-block-list .add-finding {
        background: var(--color-fern);
        color: white;
        border-color: var(--color-fern);
      }
      .sidebar-block-list .add-concern {
        background: var(--color-rose);
        color: white;
        border-color: var(--color-rose);
      }
      .sidebar-block-list .add-analysis {
        background: var(--color-iris);
        color: white;
        border-color: var(--color-iris);
      }
      /* Chart was Parts List - uses the user-specified blue */
      .sidebar-block-list .add-parts {
        background: var(--color-cobalt);
        color: white;
        border-color: var(--color-cobalt);
      }
      .sidebar-block-list .add-photoarray {
        background: #d8dde4;
        color: var(--charcoal);
        border-color: #b8c0cc;
      }
      .sidebar-block-list .add-textbox {
        background: white;
        color: var(--charcoal);
        border: 1px dashed var(--steel);
        font-weight: 500;
        font-style: italic;
      }
      .sidebar-block-list .add-section {
        background: white;
        color: var(--navy);
        border-color: var(--navy);
        border-width: 2px;
        font-weight: 800;
        letter-spacing: 0.4px;
      }

      /* Format section rows */
      .sidebar-fmt-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        align-items: center;
        margin-bottom: 8px;
      }
      .sidebar-fmt-row:last-child {
        margin-bottom: 0;
      }
      .sidebar-fmt-row .label {
        font-size: 11px;
        color: var(--charcoal);
        font-weight: 600;
        margin-right: 2px;
      }
      .sidebar-fmt-row button {
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        padding: 4px 9px;
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        min-height: 26px;
      }
      .sidebar-fmt-row button:hover {
        border-color: var(--navy);
      }
      .sidebar-fmt-row button:active {
        background: var(--frost);
      }
      .sidebar-fmt-row .fmt-bold {
        font-weight: 800;
        width: 30px;
        font-size: 14px;
      }
      .sidebar-fmt-row .size-btn {
        width: 28px;
        padding: 4px 0;
        text-align: center;
      }
      .sidebar-fmt-row .size-btn[data-arg="2"] {
        font-size: 10px;
      }
      .sidebar-fmt-row .size-btn[data-arg="3"] {
        font-size: 12px;
      }
      .sidebar-fmt-row .size-btn[data-arg="4"] {
        font-size: 14px;
      }
      .sidebar-fmt-row .size-btn[data-arg="5"] {
        font-size: 16px;
      }
      .sidebar-fmt-row .color-swatch {
        width: 24px;
        height: 24px;
        padding: 0;
        border: 2px solid white;
        outline: 1px solid var(--steel);
        cursor: pointer;
        border-radius: 3px;
        min-height: 0;
      }
      .sidebar-fmt-row .color-swatch:hover {
        outline-color: var(--navy);
      }

      /* Inline-icon badge grid (2x2) */
      .sidebar-icon-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .sidebar-icon-grid button {
        border: 1px solid var(--steel);
        padding: 6px 4px;
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
        min-height: 28px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .sidebar-icon-grid .fmt-icon-warning {
        background: var(--danger);
        color: white;
        border-color: var(--danger);
      }
      .sidebar-icon-grid .fmt-icon-caution {
        background: var(--amber);
        color: #2c1f00;
        border-color: #d99e00;
      }
      .sidebar-icon-grid .fmt-icon-inspect {
        background: var(--info);
        color: white;
        border-color: var(--info);
      }
      .sidebar-icon-grid .fmt-icon-torque {
        background: #424242;
        color: white;
        border-color: #424242;
      }

      .sidebar-clear-btn {
        width: 100%;
        margin-top: 10px;
        padding: 6px 8px;
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
      }
      .sidebar-clear-btn:hover {
        border-color: var(--navy);
      }

      /* ---------- Pages ---------- */
      .pages-container {
        padding: 22px 14px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }

      /* Letter size: 8.5 x 11 inches */
      .page {
        width: 8.5in;
        height: 11in;
        background: white;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.22);
        padding: 0.1in 0.25in 0.25in; /* top right/left bottom — tighter top */
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* ---------- Header ---------- */
      .header {
        display: flex;
        align-items: center;
        gap: 14px;
        border-bottom: 2px solid var(--navy);
        padding-bottom: 4px;
        margin-bottom: 4px;
        flex-shrink: 0;
      }

      .logo-area {
        width: 1.4in;
        height: 0.85in;
        border: 2px dashed var(--steel);
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        overflow: hidden;
        position: relative;
        background: white;
      }
      .logo-area:hover {
        background: var(--frost);
      }
      .logo-area.has-image {
        border-style: solid;
        border-color: transparent;
      }
      .logo-area.dragover {
        background: var(--frost);
        border-color: var(--navy);
      }
      .logo-area img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .logo-area .placeholder {
        color: #888;
        font-size: 10.5px;
        text-align: center;
        pointer-events: none;
        line-height: 1.3;
      }
      .logo-area .clear-btn {
        position: absolute;
        top: 3px;
        right: 3px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 10px;
        font-weight: bold;
        display: none;
        line-height: 1;
      }
      .logo-area:hover .clear-btn {
        display: block;
      }

      .header-info {
        flex: 1;
        min-width: 0;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-field {
        font-size: 22px;
        font-weight: 700;
        color: var(--navy);
        border: none;
        flex: 1;
        min-width: 0;
        outline: none;
        font-family: inherit;
        padding: 1px 0;
        background: transparent;
      }
      .title-field::placeholder {
        color: var(--steel);
        font-style: italic;
        font-weight: 500;
      }

      .form-type-selector {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        flex-shrink: 0;
      }
      .form-type-selector label {
        color: var(--charcoal);
        font-weight: 600;
        white-space: nowrap;
      }
      .form-type-select {
        font-family: inherit;
        font-size: 11px;
        padding: 3px 6px;
        border: 1px solid var(--steel);
        border-radius: 3px;
        background: white;
        color: var(--charcoal);
        cursor: pointer;
      }
      .form-type-select:hover {
        border-color: var(--navy);
      }
      .form-type-select:focus {
        outline: 2px solid var(--navy);
        outline-offset: -1px;
      }

      .meta-row {
        display: flex;
        gap: 14px;
        margin-top: 5px;
        font-size: 11px;
        flex-wrap: wrap;
      }
      .meta-field {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .meta-field label {
        font-weight: 700;
        color: var(--navy);
        white-space: nowrap;
      }
      .meta-field input {
        border: none;
        border-bottom: 1px solid var(--steel);
        outline: none;
        padding: 1px 2px;
        font-family: inherit;
        font-size: 11px;
        background: transparent;
        color: var(--charcoal);
      }
      .meta-field input:focus {
        border-bottom-color: var(--navy);
      }

      /* ---------- Content area ---------- */
      .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.1in;
        padding-top: 0.11in; /* room for first-row step-number tabs */
        min-height: 0;
        overflow: hidden;
      }

      .row-step {
        flex: 0 0 auto;
        min-height: 2.15in;
      }

      .row-callout {
        flex: 0 0 auto;
        min-height: 0.32in;
      }

      .row-section {
        flex: 0 0 0.4in;
        height: 0.4in;
      }

      .row-parts {
        flex: 0 0 auto;
        min-height: 0.4in;
      }

      .row-photoarray {
        flex: 0 0 auto;
        min-height: 2.6in;
      }

      .row-textbox {
        flex: 0 0 auto;
        min-height: 0.5in;
      }

      /* ---------- Photo array block ---------- */
      .photoarray-block {
        background: white;
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0.1in;
      }
      .photoarray-row {
        display: grid;
        gap: 0.1in;
        width: 7.7in;
        max-width: 100%;
        margin: 0 auto;
        height: 2.5in;
      }
      /* The count-N class is set by buildPhotoArrayElement based on how many
       images the row actually contains. Empty rows get count-3 so the user
       sees three placeholder cells to click. */
      .photoarray-row.count-1 {
        grid-template-columns: 1fr;
      }
      .photoarray-row.count-2 {
        grid-template-columns: 1fr 1fr;
      }
      .photoarray-row.count-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .photoarray-cell {
        background: var(--frost);
        border: 1px dashed var(--steel);
        border-radius: 3px;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        overflow: hidden;
        position: relative;
        min-height: 0;
      }
      /* Empty cell: center the placeholder text vertically and horizontally. */
      .photoarray-cell:not(.has-image) {
        align-items: center;
        justify-content: center;
      }
      .photoarray-cell:hover {
        background: #dde4ee;
      }
      .photoarray-cell:focus {
        outline: 2px solid var(--navy);
        outline-offset: 2px;
        background: #dde4ee;
      }
      .photoarray-cell:focus:not(.has-image) {
        background: var(--frost);
      }
      .photoarray-cell.has-image {
        background: white;
        border-style: solid;
        border-color: var(--frost);
      }
      .photoarray-cell.dragover {
        background: var(--frost);
        border-color: var(--navy);
        border-style: solid;
      }
      /* Image area (only inside has-image cells). Takes all space the caption
       isn't using; image scales to fit while preserving aspect ratio. */
      .photoarray-cell-image {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .photoarray-cell-image img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      /* Caption: single-line input pinned to the bottom of the cell. Renders as
       plain italic text in print (border/background drop). */
      .photoarray-caption {
        flex: 0 0 auto;
        border: none;
        border-top: 1px solid var(--frost);
        outline: none;
        background: transparent;
        text-align: center;
        font-size: 11px;
        font-style: italic;
        color: var(--charcoal);
        padding: 2px 6px;
        width: 100%;
        height: 20px;
        font-family: inherit;
        box-sizing: border-box;
      }
      .photoarray-caption:focus {
        background: rgba(232, 235, 240, 0.5);
      }
      .photoarray-caption::placeholder {
        color: var(--steel);
        font-style: italic;
      }
      .photoarray-cell .placeholder {
        color: #888;
        font-size: 10px;
        text-align: center;
        padding: 4px;
        pointer-events: none;
        line-height: 1.25;
      }
      /* Cell clear button anchored bottom-right. The block-level controls
       (up / down / delete) live at the block's top-right, so anchoring the
       cell clear button there caused them to overlap on the rightmost cell.
       Bottom-right keeps the button reachable in every layout. */
      .photoarray-cell .clear-btn {
        position: absolute;
        bottom: 3px;
        right: 3px;
        background: rgba(0, 0, 0, 0.65);
        color: white;
        border: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 11px;
        font-weight: bold;
        display: none;
        line-height: 1;
      }
      .photoarray-cell:hover .clear-btn {
        display: block;
      }
      /* Per-row delete: ✕ button at right edge of each row, hidden in print */
      .photoarray-row-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
      }
      /* Inline action strip below each row. Holds the "+ Add Photo" and
       "Delete Row" buttons in plain sight (the previous floating-circle
       design lived in the page gutter and was easy to miss).
       Centered to the same width as the row above it. */
      .photoarray-row-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        align-items: center;
        width: 7.7in;
        max-width: 100%;
        margin: 4px auto 0;
        min-height: 22px;
      }
      .photoarray-add-image {
        padding: 3px 10px;
        border: 1px solid var(--navy);
        background: white;
        color: var(--navy);
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        line-height: 1.4;
      }
      .photoarray-add-image:hover {
        background: var(--navy);
        color: white;
      }
      .photoarray-row-delete {
        padding: 3px 10px;
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        border-radius: 3px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        line-height: 1.4;
      }
      .photoarray-row-delete:hover {
        border-color: var(--color-ember);
        color: var(--color-ember);
      }
      /* Add-row button (no-print) */
      .photoarray-add-row {
        align-self: flex-start;
        margin-top: 2px;
        padding: 4px 12px;
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
      }
      .photoarray-add-row:hover {
        border-color: var(--navy);
        color: var(--navy);
      }

      /* ---------- Plain text box block ---------- */
      .textbox-block {
        background: white;
        border: 1px solid var(--steel);
        border-radius: 3px;
        padding: 6px 10px;
        position: relative;
        min-height: 0.5in;
      }
      .textbox-text {
        outline: none;
        font-family: inherit;
        font-size: 11px;
        line-height: 1.4;
        color: var(--charcoal);
        cursor: text;
        min-height: 18px;
      }
      .textbox-text:focus {
        background: rgba(232, 235, 240, 0.4);
        border-radius: 2px;
      }
      .textbox-text:empty::before {
        content: attr(data-placeholder);
        color: var(--steel);
        font-style: italic;
        pointer-events: none;
      }

      /* ---------- Parts list table block ---------- */
      .parts-block {
        background: white;
        border: 1.5px solid var(--color-cobalt);
        border-radius: 3px;
        position: relative;
        overflow: visible;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .parts-header {
        background: var(--color-cobalt);
        color: white;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.6px;
        padding: 4px 12px;
        display: flex;
        align-items: center;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .parts-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }
      .parts-table thead th {
        background: #eef0f3;
        border: 1px solid var(--steel);
        padding: 0;
        text-align: left;
        vertical-align: middle;
        position: relative;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .parts-table tbody td {
        border: 1px solid var(--steel);
        padding: 0;
        vertical-align: middle;
        position: relative;
      }

      .parts-cell {
        outline: none;
        cursor: text;
        padding: 4px 8px;
        min-height: 18px;
        font-size: 10.5px;
        line-height: 1.3;
        color: var(--charcoal);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .parts-cell:focus {
        background: var(--frost);
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }
      .parts-cell:empty::before {
        content: attr(data-placeholder);
        color: var(--steel);
        font-style: italic;
      }
      .parts-col-header {
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.3px;
        color: var(--navy);
        background: #eef0f3;
        text-transform: uppercase;
      }

      /* Column-delete: small ✕ that floats above the column header */
      .parts-col-delete {
        visibility: hidden;
        position: absolute;
        top: -8px;
        right: -8px;
        width: 16px;
        height: 16px;
        padding: 0;
        border: 1px solid var(--steel);
        background: white;
        color: var(--danger);
        border-radius: 50%;
        font-size: 9px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        z-index: 3;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }
      .parts-table thead th:hover .parts-col-delete {
        visibility: visible;
      }

      /* Right gutter column - holds row-delete buttons, hidden in print */
      .parts-actions-col {
        width: 22px;
        border: none !important;
        background: transparent !important;
        padding: 0 !important;
        position: relative;
      }

      .parts-row-delete {
        visibility: hidden;
        position: absolute;
        top: 50%;
        left: 3px;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        padding: 0;
        border: 1px solid var(--steel);
        background: white;
        color: var(--danger);
        border-radius: 50%;
        font-size: 9px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
      }
      .parts-table tbody tr:hover .parts-row-delete {
        visibility: visible;
      }

      /* Action footer (Add Row / Add Column) - on-screen only */
      .parts-actions {
        padding: 4px 10px;
        background: #f5f6f8;
        display: flex;
        gap: 6px;
        border-top: 1px solid var(--steel);
      }
      .parts-actions button {
        font-size: 11px;
        padding: 2px 10px;
        border: 1px solid var(--steel);
        background: white;
        color: var(--charcoal);
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
        font-weight: 600;
      }
      .parts-actions button:hover {
        border-color: var(--navy);
        color: var(--navy);
      }
      .parts-paste-hint {
        font-size: 10px;
        color: var(--charcoal);
        opacity: 0.7;
        font-style: italic;
        margin-left: auto;
        align-self: center;
      }

      /* ---------- Section header block ---------- */
      .section-header {
        display: flex;
        align-items: flex-end;
        background: white;
        color: var(--navy);
        border-bottom: 2.5px solid var(--navy);
        padding: 0 2px 4px;
        position: relative;
        height: 100%;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .section-header-text {
        flex: 1;
        outline: none;
        cursor: text;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--navy);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
        min-width: 0;
        line-height: 1.2;
        /* Small left buffer so the first character isn't clipped by the
         overflow:hidden box. Mobile WebKit/Blink can add a small pre-glyph
         offset when letter-spacing + uppercase combine, and without a
         buffer the first letter renders just past the box's left edge. */
        padding-left: 4px;
      }
      .section-header-text:focus {
        background: var(--frost);
        border-radius: 2px;
      }
      .section-header-text:empty::before {
        content: attr(data-placeholder);
        color: var(--steel);
        font-weight: 400;
        font-style: italic;
        text-transform: none;
        letter-spacing: normal;
      }

      /* ---------- Step block (horizontal: image left, text right) ---------- */
      .step {
        border: 1.5px solid var(--navy);
        border-radius: 3px;
        padding: 4px 5px;
        display: flex;
        flex-direction: row;
        gap: 6px;
        overflow: visible; /* allow step-number tab to extend above */
        position: relative;
        background: white;
        height: 2.15in;
      }

      .step-number {
        background: var(--navy);
        color: white;
        min-width: 22px;
        height: 18px;
        padding: 0 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 11px;
        position: absolute;
        top: -10px; /* stick out above the cell border */
        left: 4px;
        border-radius: 3px;
        letter-spacing: 0.3px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        z-index: 2;
      }

      .step-image {
        flex: 0 0 3.75in; /* fixed width per design spec */
        height: 2in; /* fixed height per design spec */
        background: var(--frost);
        border: 1px dashed var(--steel);
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        position: relative;
      }
      .step-image:hover {
        background: #dde4ee;
      }
      .step-image.has-image {
        background: white;
        border-style: solid;
        border-color: var(--frost);
      }
      .step-image.dragover {
        background: var(--frost);
        border-color: var(--navy);
        border-style: solid;
      }
      .step-image img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .step-image .placeholder {
        color: #888;
        font-size: 10px;
        text-align: center;
        padding: 4px;
        pointer-events: none;
        line-height: 1.25;
      }
      .step-image .clear-btn {
        position: absolute;
        top: 3px;
        right: 3px;
        background: rgba(0, 0, 0, 0.65);
        color: white;
        border: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 11px;
        font-weight: bold;
        display: none;
        line-height: 1;
      }
      .step-image:hover .clear-btn {
        display: block;
      }

      /* ---------- Editable rich text (right of image, full remaining width) ---------- */
      .step-text {
        flex: 1; /* fill remaining width */
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.35;
        height: 100%;
        padding: 4px 6px;
        background: transparent;
        color: var(--charcoal);
        overflow: hidden;
        cursor: text;
        min-width: 0; /* allow flex shrinking past content */
      }
      .step-text:focus {
        background: rgba(232, 235, 240, 0.5);
      }
      .step-text:empty::before {
        content: attr(data-placeholder);
        color: var(--steel);
        font-style: italic;
        pointer-events: none;
      }

      /* execCommand fontSize emits CSS keyword sizes; map to print-friendly pixels. */
      .rich-text-editor [style*="font-size: small"] {
        font-size: 9px !important;
        line-height: 1.25;
      }
      .rich-text-editor [style*="font-size: medium"] {
        font-size: 10.5px !important;
        line-height: 1.3;
      }
      .rich-text-editor [style*="font-size: large"] {
        font-size: 13px !important;
        line-height: 1.35;
      }
      .rich-text-editor [style*="font-size: x-large"] {
        font-size: 16px !important;
        line-height: 1.4;
      }
      .rich-text-editor [style*="font-size: xx-large"] {
        font-size: 16px !important;
        line-height: 1.4;
      }

      /* ---------- Inline icon badges (within editable text) ---------- */
      .wi-icon {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 2px;
        font-weight: 700;
        font-size: 9px;
        letter-spacing: 0.4px;
        margin: 0 2px 0 0;
        white-space: nowrap;
        vertical-align: baseline;
        font-family: "Segoe UI", Tahoma, Verdana, Arial, sans-serif;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .wi-warning {
        background: var(--danger);
        color: #ffffff;
      }
      .wi-caution {
        background: var(--amber);
        color: #2c1f00;
      }
      .wi-inspect {
        background: var(--info);
        color: #ffffff;
      }
      .wi-torque {
        background: #424242;
        color: #ffffff;
      }

      /* ---------- Callout block (full width) ---------- */
      .callout {
        display: flex;
        align-items: stretch;
        border: 2px solid var(--callout-color, var(--charcoal));
        border-radius: 3px;
        background: white;
        min-height: 100%;
        position: relative;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      /* Insert-block palette - dark/medium tones with white text. */
      .callout-warning {
        --callout-color: var(--color-ember);
        --callout-text-color: #ffffff;
      }
      .callout-caution {
        --callout-color: var(--color-gold);
        --callout-text-color: #ffffff;
      }
      .callout-note {
        --callout-color: var(--color-cobalt);
        --callout-text-color: #ffffff;
      }
      .callout-watch {
        --callout-color: var(--color-rust);
        --callout-text-color: #ffffff;
      }
      .callout-monitor {
        --callout-color: var(--color-plum);
        --callout-text-color: #ffffff;
      }
      .callout-record {
        --callout-color: var(--color-pine);
        --callout-text-color: #ffffff;
      }
      .callout-tools {
        --callout-color: var(--color-teal);
        --callout-text-color: #ffffff;
      }
      .callout-inspect {
        --callout-color: var(--color-sky);
        --callout-text-color: #ffffff;
      }
      .callout-measure {
        --callout-color: var(--color-seafoam);
        --callout-text-color: #ffffff;
      }
      .callout-finding {
        --callout-color: var(--color-fern);
        --callout-text-color: #ffffff;
      }
      .callout-concern {
        --callout-color: var(--color-rose);
        --callout-text-color: #ffffff;
      }
      .callout-analysis {
        --callout-color: var(--color-iris);
        --callout-text-color: #ffffff;
      }

      .callout-badge {
        background: var(--callout-color);
        color: var(--callout-text-color);
        font-weight: 700;
        font-size: 11px;
        padding: 4px 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        letter-spacing: 0.5px;
        flex-shrink: 0;
        min-width: 0.85in;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .callout-text {
        flex: 1;
        padding: 4px 10px;
        font-size: 11px;
        line-height: 1.35;
        color: var(--charcoal);
        outline: none;
        cursor: text;
        /* Multi-line: text wraps and the row grows to fit */
        overflow-wrap: break-word;
        word-break: break-word;
        white-space: normal;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }
      .callout-text:focus {
        background: rgba(232, 235, 240, 0.5);
      }
      .callout-text:empty::before {
        content: attr(data-placeholder);
        color: var(--steel);
        font-style: italic;
        pointer-events: none;
      }

      /* ---------- Block controls (delete / move) ---------- */
      .block-controls {
        position: absolute;
        top: 3px;
        right: 3px;
        display: flex;
        gap: 2px;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .step:hover > .block-controls,
      .callout:hover > .block-controls,
      .section-header:hover > .block-controls,
      .parts-block:hover > .block-controls,
      .photoarray-block:hover > .block-controls,
      .textbox-block:hover > .block-controls {
        opacity: 1;
      }
      .block-controls button {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        width: 22px;
        height: 22px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        line-height: 1;
        padding: 0;
        font-family: inherit;
      }
      .block-controls button:hover {
        background: rgba(0, 0, 0, 0.85);
      }
      .block-controls button.delete:hover {
        background: var(--danger);
      }

      /* ---------- Empty state ---------- */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--charcoal);
        border: 2px dashed var(--steel);
        border-radius: 4px;
        padding: 30px;
      }
      .empty-state-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--navy);
        letter-spacing: 0.3px;
      }
      .empty-state-body {
        font-size: 13px;
        color: var(--charcoal);
        opacity: 0.8;
        text-align: center;
        max-width: 380px;
        line-height: 1.4;
      }
      .empty-state-body strong {
        color: var(--navy);
      }

      /* ---------- Footer ---------- */
      .page-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 9px;
        color: var(--charcoal);
        padding-top: 5px;
        border-top: 1px solid var(--frost);
        margin-top: 6px;
        flex-shrink: 0;
        gap: 12px;
      }
      .page-footer-title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .page-footer-pageno {
        flex-shrink: 0;
        white-space: nowrap;
      }

      /* ---------- Toast ---------- */
      .toast {
        position: fixed;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 8px 14px;
        border-radius: 4px;
        z-index: 1000;
        font-size: 13px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .toast.show {
        opacity: 1;
      }

      /* ---------- Mobile / narrow-screen layout ---------- */
      @media screen and (max-width: 900px) {
        body {
          /* No fixed-sidebar offset on small screens; sidebar overlays the page when opened. */
          padding-left: 0;
          padding-top: calc(52px + env(safe-area-inset-top, 0px));
          /* Allow horizontal scroll for the letter-sized page if user zooms out. */
          overflow-x: auto;
        }

        .topbar {
          height: calc(52px + env(safe-area-inset-top, 0px));
          padding: env(safe-area-inset-top, 0)
            max(8px, env(safe-area-inset-right, 0)) 0
            max(8px, env(safe-area-inset-left, 0));
          gap: 5px;
          overflow-x: auto;
        }
        .topbar h1 {
          font-size: 13px;
          margin: 0 4px 0 0;
          white-space: nowrap;
        }
        .topbar button {
          padding: 9px 10px;
          font-size: 12px;
          flex-shrink: 0;
          min-height: 36px;
          white-space: nowrap;
        }
        .topbar .hint {
          display: none;
        }
        .topbar .spacer {
          flex: 1;
        }

        /* Sidebar already overlays content on all screen sizes; only the
         sidebar top offset needs to track the taller mobile topbar. */
        .sidebar,
        .sidebar-backdrop {
          top: calc(52px + env(safe-area-inset-top, 0px));
        }

        /* Bigger tap targets in sidebar */
        .sidebar-block-list button {
          padding: 11px 12px;
          font-size: 13px;
          min-height: 44px;
        }
        .sidebar-fmt-row button {
          min-height: 36px;
        }
        .sidebar-icon-grid button {
          min-height: 38px;
        }
        .sidebar-toggle {
          width: 36px;
          height: 36px;
          font-size: 20px;
        }

        /* Scale the letter-size page down to fit the viewport */
        .pages-container {
          padding: 12px 0 30px;
          gap: 14px;
        }
        .page {
          /* Use CSS transform to keep the print layout intact while shrinking visually. */
          transform: scale(var(--page-scale, 1));
          transform-origin: top center;
          margin-bottom: var(--page-margin-fix, 0px);
        }

        /* Step number badge needs a bit more bottom margin since it sits above */
        .row-step:first-child {
          margin-top: 6px;
        }

        /* Touch target hint for hover-only controls */
        .step-image .clear-btn,
        .parts-row-delete,
        .parts-col-delete,
        .photoarray-cell .clear-btn,
        .photoarray-row-delete {
          visibility: visible;
        }
        /* Photo array: clear-btn is display:none by default; on mobile always show */
        .photoarray-cell .clear-btn {
          display: block;
        }
        /* Permanently show block controls on mobile (touch can't hover) */
        .block-controls {
          opacity: 1;
        }
        .block-controls button {
          width: 28px;
          height: 28px;
          font-size: 13px;
        }
      }

      @media screen and (max-width: 600px) {
        .topbar h1 {
          display: none;
        }
        .topbar button {
          padding: 8px 10px;
          font-size: 12px;
        }
        .topbar .btn-label-full {
          display: none;
        }
        .topbar .btn-label-short {
          display: inline;
        }
      }

      /* ---------- Print rules ---------- */
      @page {
        size: letter;
        margin: 0;
      }

      @media print {
        html,
        body {
          background: white;
          margin: 0;
          padding: 0 !important;
        }
        .topbar,
        .sidebar,
        .sidebar-backdrop,
        .no-print,
        .block-controls {
          display: none !important;
        }
        .step-image .clear-btn,
        .logo-area .clear-btn,
        .photoarray-cell .clear-btn,
        .photoarray-row-delete,
        .photoarray-add-row,
        .photoarray-add-image {
          display: none !important;
        }
        /* Photo array: hide empty cell placeholder text in print, and drop the
         dashed border on cells that don't have an image. */
        .photoarray-cell:not(.has-image) .placeholder {
          display: none;
        }
        .photoarray-cell:not(.has-image) {
          background: white;
          border: 1px solid #bbb;
        }
        .pages-container {
          padding: 0;
          gap: 0;
        }
        .page {
          box-shadow: none;
          margin: 0 !important;
          /* Print: content-driven height. Fixed 11in works on desktop where
           the browser respects @page margin: 0, but mobile Safari/Chrome
           reserve ~1in for their own print headers/footers regardless of
           CSS. With height: 11in the bottom of the .page (including our
           footer) overflows to a phantom physical page 2. Letting the
           .page take only the height it actually needs avoids the
           overflow entirely - empty pages are ~1.3in tall (header +
           footer), full pages stop just below the last row. */
          height: auto !important;
          min-height: 0 !important;
          /* Defensive: undo any mobile transform/margin that might leak into
           print (Safari iOS especially) so the page renders at full 8.5x11
           and doesn't leave blank space below it. */
          transform: none !important;
          margin-bottom: 0 !important;
          page-break-after: always;
          break-after: page;
          /* Prefer to keep an entire .page on a single physical page. */
          break-inside: avoid-page;
          page-break-inside: avoid;
        }
        .page:last-child {
          page-break-after: auto;
          break-after: auto;
        }
        .step-image:not(.has-image) {
          background: white;
          border: 1px solid #bbb;
        }
        .step-image:not(.has-image) .placeholder {
          display: none;
        }
        .logo-area:not(.has-image) {
          border: none;
        }
        .logo-area:not(.has-image) .placeholder {
          display: none;
        }
        .title-field::placeholder,
        .meta-field input::placeholder,
        .photoarray-caption::placeholder {
          color: transparent !important;
        }
        /* Photo caption: keep the text, drop the editor chrome. */
        .photoarray-caption {
          border-top: 1px solid #ddd;
          background: transparent;
        }
        /* When a caption has no value, hide the input entirely so the image
         area expands to fill the full cell height. This also dodges the iOS
         Safari quirk where `::placeholder { color: transparent }` is
         sometimes ignored, leaving the literal word "Caption" on the page. */
        .photoarray-caption:placeholder-shown {
          display: none;
        }
        .step-text:empty::before,
        .callout-text:empty::before,
        .textbox-text:empty::before,
        .section-header-text:empty::before {
          content: "";
        }
        .step-text:focus,
        .callout-text:focus,
        .textbox-text:focus {
          background: transparent;
        }
        /* Textbox: drop visible border in print so it reads as plain text */
        .textbox-block {
          border-color: transparent !important;
          padding: 0 !important;
        }
        .empty-state {
          display: none;
        }
      }
    </style>
