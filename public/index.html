    <script>
      (function () {
        "use strict";

        // ---------- Storage ----------
        // v3: blocks-based document model. Older keys are migrated on first load.
        const STORAGE_KEY = "workInstructionBuilder_v4";
        const LEGACY_KEYS = [
          "workInstructionBuilder_v3",
          "workInstructionBuilder_v2",
          "workInstructionBuilder_v1",
        ];

        // ---------- Pagination constants (inches) ----------
        // Available content height per page is ~8.98in (11 - 0.7 padding - ~1.07 header
        // - ~0.25 footer). Use 8.9 as a safety threshold.
        const PAGE_CONTENT_HEIGHT = 9.2;
        const STEP_ROW_HEIGHT = 2.2;
        const CALLOUT_ROW_HEIGHT = 0.32;
        const SECTION_ROW_HEIGHT = 0.4;
        const ROW_GAP = 0.1;

        // Parts list table heights:
        // Brown header bar (~0.30") + column header row (~0.25")
        // + each data row (~0.22") + action footer (~0.27", visible on screen, hidden in print)
        const PARTS_BASE_HEIGHT = 0.85;
        const PARTS_ROW_HEIGHT = 0.22;

        // ---------- Callout kinds ----------
        // The `key` is what's stored in saved files. The `label` is what's shown.
        // Icons are no longer rendered on the badge - left here as data only in
        // case anyone wants to revive them later.
        const CALLOUT_KINDS = {
          warning: { label: "WARNING", icon: "\u26A0" }, // ⚠
          caution: { label: "CAUTION", icon: "\u26A0" }, // ⚠
          note: { label: "NOTE", icon: "\u2139" }, // ℹ
          watch: { label: "TIP", icon: "\u2757" }, // ❗ (key 'watch' kept for back-compat)
          monitor: { label: "MONITOR", icon: "\u25C9" }, // ◉
          record: { label: "RECORD", icon: "\u270E" }, // ✎
          tools: { label: "TOOLS", icon: "\u2692" }, // ⚒
          inspect: { label: "INSPECT", icon: "\u2315" }, // ⌕
          measure: { label: "MEASURE", icon: "\u2194" }, // ↔
          finding: { label: "FINDING", icon: "" },
          concern: { label: "CONCERN", icon: "" },
          analysis: { label: "ANALYSIS", icon: "" },
        };

        // ---------- Form type schemas ----------
        // Each form type has a label (shown in the dropdown), title placeholder
        // text, and an ordered list of metadata fields. Field keys are stable
        // identifiers stored in saved files; labels can be changed without
        // breaking back-compat.
        const FORM_TYPES = {
          blank: {
            label: "Blank",
            titlePlaceholder: "Form Title",
            fields: [],
          },
          workInstruction: {
            label: "Work Instruction",
            titlePlaceholder:
              "Work Instruction Title (e.g., Turbocharger Cartridge Assembly)",
            fields: [
              { key: "partNumber", label: "Part #", width: 110 },
              { key: "operation", label: "Operation", width: 130 },
              { key: "rev", label: "Rev", width: 50 },
              { key: "date", label: "Date", width: 90 },
            ],
          },
          sampleProductAnalysis: {
            label: "Sample Product Analysis",
            titlePlaceholder: "Sample Product Analysis Title",
            fields: [
              { key: "vendor", label: "Vendor", width: 120 },
              { key: "vendorPartNumber", label: "Vendor Part #", width: 110 },
              { key: "pdiPartNumber", label: "PDI Part #", width: 110 },
              { key: "partDescription", label: "Part Description", width: 180 },
              { key: "date", label: "Date", width: 90 },
            ],
          },
          incomingQuality: {
            label: "Incoming Quality Inspection",
            titlePlaceholder: "Incoming Quality Inspection Title",
            fields: [
              { key: "vendor", label: "Vendor", width: 110 },
              { key: "inspectionDate", label: "Inspection Date", width: 95 },
              { key: "inspector", label: "Inspector", width: 110 },
              { key: "pdiPoNumber", label: "PDI PO #", width: 100 },
              { key: "lotNumber", label: "Lot #", width: 90 },
              { key: "pdiPartNumber", label: "PDI Part #", width: 100 },
              { key: "partDescription", label: "Part Description", width: 150 },
              { key: "sampleQty", label: "Sample Qty", width: 70 },
            ],
          },
          warranty: {
            label: "Warranty Analysis",
            titlePlaceholder: "Warranty Analysis Title",
            fields: [
              { key: "customerName", label: "Customer Name", width: 140 },
              { key: "partNumber", label: "Part #", width: 100 },
              { key: "quantity", label: "Qty", width: 60 },
              { key: "installDate", label: "Install Date", width: 90 },
              { key: "failDate", label: "Fail Date", width: 90 },
              {
                key: "customerComplaint",
                label: "Customer Complaint",
                width: 180,
              },
            ],
          },
        };

        function getFormSchema(formType) {
          return FORM_TYPES[formType] || FORM_TYPES.blank;
        }
        // _idCounter must be declared before state is constructed because
        // createEmptyState() -> createDefaultBlocks() -> genId() reads it.
        let _idCounter = 0;
        let state = createEmptyState();
        let lastFocusedEditable = null;
        let lastFocusedBlockId = null;
        let focusBlockIdAfterRender = null;

        function genId() {
          _idCounter += 1;
          return "b_" + Date.now().toString(36) + "_" + _idCounter.toString(36);
        }

        function createStepBlock(img, text) {
          return {
            id: genId(),
            type: "step",
            img: img == null ? null : img,
            text: text == null ? "" : text,
          };
        }

        function createCalloutBlock(kind, text) {
          return {
            id: genId(),
            type: "callout",
            kind: CALLOUT_KINDS[kind] ? kind : "note",
            text: text == null ? "" : text,
          };
        }

        function createSectionBlock(text) {
          return {
            id: genId(),
            type: "section",
            text: text == null ? "" : text,
          };
        }

        function createPartsBlock(columns, rows) {
          const cols =
            Array.isArray(columns) && columns.length > 0
              ? columns.slice()
              : ["Part Number", "Description", "Quantity"];
          let rs;
          if (Array.isArray(rows) && rows.length > 0) {
            rs = rows.map((r) => {
              const out = Array(cols.length).fill("");
              if (Array.isArray(r)) {
                for (let i = 0; i < Math.min(r.length, cols.length); i++) {
                  out[i] = typeof r[i] === "string" ? r[i] : "";
                }
              }
              return out;
            });
          } else {
            rs = [Array(cols.length).fill("")];
          }
          return {
            id: genId(),
            type: "parts",
            columns: cols,
            rows: rs,
          };
        }

        function createPhotoArrayBlock(rows) {
          // rows is an array of row arrays; each row array holds 3 entries (cells).
          // Each entry is either null or { src: dataUrl, caption: string }.
          // Older callers may still pass plain string data URLs; we coerce those
          // to the object form here so the rest of the code only deals with one
          // shape.
          function coerceCell(c) {
            if (!c) return null;
            if (typeof c === "string") return { src: c, caption: "" };
            if (typeof c === "object" && typeof c.src === "string" && c.src) {
              return {
                src: c.src,
                caption: typeof c.caption === "string" ? c.caption : "",
              };
            }
            return null;
          }
          let rs;
          if (Array.isArray(rows) && rows.length > 0) {
            rs = rows.map((r) => {
              const out = [null, null, null];
              if (Array.isArray(r)) {
                out[0] = coerceCell(r[0]);
                out[1] = coerceCell(r[1]);
                out[2] = coerceCell(r[2]);
              }
              return out;
            });
          } else {
            rs = [[null, null, null]];
          }
          return {
            id: genId(),
            type: "photoarray",
            rows: rs,
          };
        }

        function createTextBoxBlock(text) {
          return {
            id: genId(),
            type: "textbox",
            text: text == null ? "" : text,
          };
        }

        function createEmptyState() {
          return {
            logo: null,
            title: "",
            formType: "blank",
            metaFields: {},
            blocks: [],
          };
        }

        // ---------- Migration ----------
        // Older saves stored partNumber/operation/rev/date as top-level fields.
        // Newer schema moves those into state.metaFields and adds a formType.
        function migrateLegacyState(old) {
          if (!old || typeof old !== "object") return null;

          // Helper: pull legacy top-level keys into a metaFields object.
          function legacyMeta() {
            const m = {};
            ["partNumber", "operation", "rev", "date"].forEach((k) => {
              if (typeof old[k] === "string" && old[k]) m[k] = old[k];
            });
            return m;
          }

          // Decide formType: if any legacy WI fields are populated, assume the
          // file is a work instruction; otherwise default to blank.
          function decideFormType(meta) {
            if (typeof old.formType === "string" && FORM_TYPES[old.formType]) {
              return old.formType;
            }
            const hasWiData = ["partNumber", "operation", "rev", "date"].some(
              (k) => meta[k] && meta[k].trim(),
            );
            return hasWiData ? "workInstruction" : "blank";
          }

          // v3+ (blocks array exists). Filter empty placeholder steps.
          if (Array.isArray(old.blocks)) {
            const blocks = old.blocks.filter((b) => {
              if (!b) return false;
              if (
                b.type !== "step" &&
                b.type !== "callout" &&
                b.type !== "section" &&
                b.type !== "parts" &&
                b.type !== "photoarray" &&
                b.type !== "textbox"
              )
                return false;
              if (b.type === "callout") return true;
              if (b.type === "parts") return true;
              if (b.type === "photoarray") return true;
              if (b.type === "textbox") return true;
              if (b.type === "section") {
                const hasText =
                  typeof b.text === "string" &&
                  b.text.replace(/<[^>]*>/g, "").trim().length > 0;
                return hasText;
              }
              // step
              const hasImg = !!b.img;
              const hasText =
                typeof b.text === "string" &&
                b.text.replace(/<[^>]*>/g, "").trim().length > 0;
              return hasImg || hasText;
            });

            // metaFields: prefer the new format if present, otherwise migrate legacy keys.
            let meta;
            if (old.metaFields && typeof old.metaFields === "object") {
              meta = {};
              Object.keys(old.metaFields).forEach((k) => {
                const v = old.metaFields[k];
                if (typeof v === "string") meta[k] = v;
              });
            } else {
              meta = legacyMeta();
            }

            return {
              logo: old.logo || null,
              title: old.title || "",
              formType: decideFormType(meta),
              metaFields: meta,
              blocks: blocks,
            };
          }

          // v1/v2 had pages of steps
          if (Array.isArray(old.pages)) {
            const blocks = [];
            for (const page of old.pages) {
              if (!page || !Array.isArray(page.steps)) continue;
              for (const step of page.steps) {
                if (!step) continue;
                const hasImg = !!step.img;
                const hasText =
                  typeof step.text === "string" && step.text.trim().length > 0;
                if (hasImg || hasText) {
                  blocks.push(
                    createStepBlock(step.img || null, step.text || ""),
                  );
                }
              }
            }
            const meta = legacyMeta();
            return {
              logo: old.logo || null,
              title: old.title || "",
              formType: decideFormType(meta),
              metaFields: meta,
              blocks: blocks,
            };
          }
          return null;
        }

        function normalizeState(s) {
          if (!s || typeof s !== "object") return createEmptyState();
          if (typeof s.logo === "undefined") s.logo = null;
          if (typeof s.title !== "string") s.title = "";

          // Form type: validate against the schema list
          if (typeof s.formType !== "string" || !FORM_TYPES[s.formType]) {
            // Try to infer from legacy top-level keys (in case migration didn't happen)
            const legacyKeys = ["partNumber", "operation", "rev", "date"];
            const hasWi = legacyKeys.some(
              (k) => typeof s[k] === "string" && s[k],
            );
            s.formType = hasWi ? "workInstruction" : "blank";
          }

          // Meta fields: ensure object, migrate any legacy top-level WI keys.
          if (!s.metaFields || typeof s.metaFields !== "object") {
            s.metaFields = {};
          }
          ["partNumber", "operation", "rev", "date"].forEach((k) => {
            if (typeof s[k] === "string" && s[k] && !s.metaFields[k]) {
              s.metaFields[k] = s[k];
            }
            delete s[k];
          });
          // Coerce non-string meta values
          Object.keys(s.metaFields).forEach((k) => {
            if (typeof s.metaFields[k] !== "string") s.metaFields[k] = "";
          });

          if (!Array.isArray(s.blocks)) s.blocks = [];

          // In-place upgrade: previous versions stored Parts List as a callout.
          // Convert any { type: 'callout', kind: 'parts' } into a structured parts table.
          s.blocks = s.blocks.map((b) => {
            if (b && b.type === "callout" && b.kind === "parts") {
              const text = (typeof b.text === "string" ? b.text : "")
                .replace(/<[^>]*>/g, "")
                .trim();
              return {
                id: b.id || genId(),
                type: "parts",
                columns: ["Part Number", "Description", "Quantity"],
                rows: text ? [["", text, ""]] : [["", "", ""]],
              };
            }
            return b;
          });

          s.blocks = s.blocks.filter(
            (b) =>
              b &&
              (b.type === "step" ||
                b.type === "callout" ||
                b.type === "section" ||
                b.type === "parts" ||
                b.type === "photoarray" ||
                b.type === "textbox"),
          );
          s.blocks.forEach((b) => {
            if (!b.id) b.id = genId();
            if (b.type === "step") {
              if (typeof b.img === "undefined") b.img = null;
              if (typeof b.text !== "string") b.text = "";
              // Drop any legacy orientation field; the layout is now fixed at 2.5x2.5.
              if ("orientation" in b) delete b.orientation;
            } else if (b.type === "callout") {
              if (!CALLOUT_KINDS[b.kind]) b.kind = "note";
              if (typeof b.text !== "string") b.text = "";
            } else if (b.type === "section") {
              if (typeof b.text !== "string") b.text = "";
            } else if (b.type === "parts") {
              // Defaults
              if (!Array.isArray(b.columns) || b.columns.length === 0) {
                b.columns = ["Part Number", "Description", "Quantity"];
              }
              b.columns = b.columns.map((c) =>
                typeof c === "string" ? c : "",
              );
              if (!Array.isArray(b.rows)) b.rows = [];
              // Normalize each row to match the columns length
              b.rows = b.rows.map((r) => {
                const out = Array(b.columns.length).fill("");
                if (Array.isArray(r)) {
                  for (
                    let i = 0;
                    i < Math.min(r.length, b.columns.length);
                    i++
                  ) {
                    out[i] = typeof r[i] === "string" ? r[i] : "";
                  }
                }
                return out;
              });
              if (b.rows.length === 0) {
                b.rows = [Array(b.columns.length).fill("")];
              }
            } else if (b.type === "photoarray") {
              if (!Array.isArray(b.rows)) b.rows = [];
              b.rows = b.rows.map((r) => {
                // Pull populated entries (in their original slot order), normalize
                // each to the {src, caption} object form, then pad with nulls.
                // Result: left-compacted [a, b, null] / [a, null, null] / [a, b, c]
                // / [null, null, null]. The display layer relies on this invariant
                // to determine how many cells to render.
                const populated = [];
                if (Array.isArray(r)) {
                  for (let i = 0; i < Math.min(r.length, 3); i++) {
                    const c = r[i];
                    if (typeof c === "string" && c) {
                      // Legacy: bare data URL
                      populated.push({ src: c, caption: "" });
                    } else if (
                      c &&
                      typeof c === "object" &&
                      typeof c.src === "string" &&
                      c.src
                    ) {
                      populated.push({
                        src: c.src,
                        caption: typeof c.caption === "string" ? c.caption : "",
                      });
                    }
                  }
                }
                while (populated.length < 3) populated.push(null);
                return populated;
              });
              if (b.rows.length === 0) {
                b.rows = [[null, null, null]];
              }
              if ("orientation" in b) delete b.orientation;
            } else if (b.type === "textbox") {
              if (typeof b.text !== "string") b.text = "";
            }
          });
          return s;
        }

        // ---------- Persistence ----------
        function saveState() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          } catch (e) {
            // Quota likely exceeded with many large images. Don't block work —
            // user can still save to file.
            console.warn(
              'Auto-save skipped (storage limit). Use "Save File" to keep your work.',
              e,
            );
          }
        }

        function loadState() {
          // Try the current schema key first
          try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
              const parsed = JSON.parse(data);
              if (parsed && Array.isArray(parsed.blocks)) {
                // Detect if normalization will rewrite the shape (legacy top-level
                // fields, missing formType, non-compact photoarray rows) so we can
                // persist the cleaned-up version on load instead of waiting for the
                // next user action.
                const hasNonCompactPhotoarray = parsed.blocks.some((b) => {
                  if (!b || b.type !== "photoarray" || !Array.isArray(b.rows))
                    return false;
                  // A row is non-compact if a populated cell appears AFTER an empty
                  // one. The simplest check: any null that has a populated cell to
                  // its right.
                  return b.rows.some((r) => {
                    if (!Array.isArray(r)) return true; // any malformed row triggers rewrite
                    for (let i = 0; i < r.length - 1; i++) {
                      if (!r[i] && r.slice(i + 1).some((x) => !!x)) return true;
                    }
                    return false;
                  });
                });
                const hasLegacyStringPhoto = parsed.blocks.some((b) => {
                  if (!b || b.type !== "photoarray" || !Array.isArray(b.rows))
                    return false;
                  return b.rows.some(
                    (r) =>
                      Array.isArray(r) && r.some((c) => typeof c === "string"),
                  );
                });
                const needsRewrite =
                  !parsed.metaFields ||
                  typeof parsed.formType !== "string" ||
                  "partNumber" in parsed ||
                  "operation" in parsed ||
                  "rev" in parsed ||
                  "date" in parsed ||
                  hasNonCompactPhotoarray ||
                  hasLegacyStringPhoto;
                state = normalizeState(parsed);
                if (needsRewrite) saveState();
                return true;
              }
            }
          } catch (e) {
            console.warn("Could not load saved state:", e);
          }
          // Fall back to legacy keys
          for (const key of LEGACY_KEYS) {
            try {
              const data = localStorage.getItem(key);
              if (!data) continue;
              const parsed = JSON.parse(data);
              const migrated = migrateLegacyState(parsed);
              if (migrated) {
                state = normalizeState(migrated);
                saveState(); // Persist under current key
                return true;
              }
            } catch (e) {
              console.warn("Could not migrate legacy state from", key, e);
            }
          }
          return false;
        }

        // ---------- Image processing ----------
        // For JPEG output, fill the canvas white first so transparent source pixels
        // (e.g. PNGs with the background removed) don't go black on re-encode.
        function processImage(file, opts) {
          return new Promise((resolve, reject) => {
            if (!file || !file.type || !file.type.startsWith("image/")) {
              reject(new Error("Selected file is not an image."));
              return;
            }
            const reader = new FileReader();
            reader.onerror = () =>
              reject(new Error("Failed to read image file."));
            reader.onload = () => {
              const img = new Image();
              img.onerror = () => reject(new Error("Failed to decode image."));
              img.onload = () => {
                try {
                  const maxW = opts.maxWidth;
                  const maxH = opts.maxHeight;
                  let w = img.naturalWidth || img.width;
                  let h = img.naturalHeight || img.height;
                  if (w > maxW || h > maxH) {
                    const ratio = Math.min(maxW / w, maxH / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                  }
                  const canvas = document.createElement("canvas");
                  canvas.width = w;
                  canvas.height = h;
                  const ctx = canvas.getContext("2d");

                  if (opts.mimeType === "image/jpeg") {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, w, h);
                  }
                  ctx.drawImage(img, 0, 0, w, h);
                  resolve(canvas.toDataURL(opts.mimeType, opts.quality));
                } catch (err) {
                  reject(err);
                }
              };
              img.src = reader.result;
            };
            reader.readAsDataURL(file);
          });
        }

        function loadLogoFile(file) {
          return processImage(file, {
            maxWidth: 800,
            maxHeight: 400,
            mimeType: "image/png",
            quality: 1.0,
          });
        }

        function loadStepImageFile(file) {
          return processImage(file, {
            maxWidth: 1600,
            maxHeight: 1600,
            mimeType: "image/jpeg",
            quality: 0.85,
          });
        }

        function pickFile(accept) {
          return new Promise((resolve) => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = accept || "image/*";
            input.onchange = () => {
              resolve(input.files && input.files[0] ? input.files[0] : null);
            };
            input.click();
          });
        }

        // ---------- Block helpers ----------
        function findBlockById(id) {
          return state.blocks.find((b) => b.id === id) || null;
        }

        function findBlockIndex(id) {
          return state.blocks.findIndex((b) => b.id === id);
        }

        // ---------- Folding blocks into rows ----------
        // Steps pair greedily into 2-up rows; callouts always force a row break
        // and take their own full-width row.
        function blocksToRows(blocks) {
          // Each block now occupies its own full-width row. Steps, callouts, and
          // section headers are structurally identical from a pagination standpoint;
          // only their height differs (handled in paginate()).
          const rows = [];
          for (const block of blocks) {
            if (block.type === "callout") {
              rows.push({ type: "callout", block });
            } else if (block.type === "step") {
              rows.push({ type: "step", block });
            } else if (block.type === "section") {
              rows.push({ type: "section", block });
            } else if (block.type === "parts") {
              rows.push({ type: "parts", block });
            } else if (block.type === "photoarray") {
              rows.push({ type: "photoarray", block });
            } else if (block.type === "textbox") {
              rows.push({ type: "textbox", block });
            }
          }
          return rows;
        }

        // ---------- Pagination ----------

        // Estimate how many visual lines a callout's HTML will occupy at the current
        // text width. We translate explicit <br>/<div>/<p> boundaries to newlines,
        // strip remaining markup, then estimate wrap on each logical line based on
        // an approximate character budget. Conservative on the high side so we
        // don't under-allocate space.
        function countCalloutLines(html) {
          if (!html) return 1;
          const normalized = html
            .replace(/<br\s*\/?>/gi, "\n")
            .replace(/<\/(div|p)\s*>/gi, "\n")
            .replace(/<(div|p)[^>]*>/gi, "");
          const plain = normalized
            .replace(/<[^>]*>/g, "")
            .replace(/&nbsp;/g, " ")
            .replace(/&amp;/g, "&")
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">")
            .replace(/&quot;/g, '"')
            .replace(/&#39;/g, "'");
          if (!plain.trim()) return 1;

          // Available text width on the page is roughly:
          //   page (8.5") - page padding (0.6") - badge (~0.85") - text padding (~0.2")
          //   ≈ 6.85" ≈ 657px. At 11px font with mixed casing avg ~5.8px/char, ~113
          // chars/line. Round down for safety.
          const CHARS_PER_LINE = 100;

          let totalLines = 0;
          for (const line of plain.split("\n")) {
            if (line.length === 0) {
              totalLines += 1;
            } else {
              totalLines += Math.max(
                1,
                Math.ceil(line.length / CHARS_PER_LINE),
              );
            }
          }
          return Math.max(1, totalLines);
        }

        function estimateCalloutHeight(block) {
          const lines = countCalloutLines(block.text || "");
          if (lines <= 1) return CALLOUT_ROW_HEIGHT;
          // Each additional wrapped line at 11px / line-height 1.35 ≈ 14.85px ≈ 0.155in.
          // Add a touch of slop for safety.
          const ADDITIONAL_LINE = 0.16;
          return CALLOUT_ROW_HEIGHT + (lines - 1) * ADDITIONAL_LINE;
        }

        function estimatePartsHeight(block) {
          const rows =
            block && Array.isArray(block.rows) ? block.rows.length : 1;
          return PARTS_BASE_HEIGHT + Math.max(1, rows) * PARTS_ROW_HEIGHT;
        }

        // Photo array: each row holds three 2.50in square cells, separated by 0.10in gaps.
        function estimatePhotoArrayHeight(block) {
          const rows =
            block && Array.isArray(block.rows)
              ? Math.max(1, block.rows.length)
              : 1;
          const PHOTOROW = 2.5;
          const PHOTOGAP = 0.1;
          return rows * PHOTOROW + (rows - 1) * PHOTOGAP;
        }

        // Text box: estimate by line count (10–11px text wraps at ~110 chars/line in
        // a full-width row). Conservative on the high side.
        function estimateTextBoxHeight(block) {
          if (!block || typeof block.text !== "string" || !block.text.trim()) {
            return 0.5;
          }
          const plain = block.text
            .replace(/<br\s*\/?>/gi, "\n")
            .replace(/<\/(div|p)\s*>/gi, "\n")
            .replace(/<(div|p)[^>]*>/gi, "")
            .replace(/<[^>]*>/g, "")
            .replace(/&nbsp;/g, " ")
            .replace(/&amp;/g, "&")
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">");
          const CHARS_PER_LINE = 110;
          let lines = 0;
          for (const line of plain.split("\n")) {
            lines +=
              line.length === 0 ? 1 : Math.ceil(line.length / CHARS_PER_LINE);
          }
          lines = Math.max(1, lines);
          // 11px font / 1.4 line-height = ~15.4px ≈ 0.16in per line; plus 0.18in padding/border.
          return 0.18 + lines * 0.16;
        }

        function paginate(rows) {
          const pages = [];
          let cur = [];
          let h = 0;
          for (const row of rows) {
            let rh;
            if (row.type === "callout") {
              rh = estimateCalloutHeight(row.block);
            } else if (row.type === "section") {
              rh = SECTION_ROW_HEIGHT;
            } else if (row.type === "parts") {
              rh = estimatePartsHeight(row.block);
            } else if (row.type === "photoarray") {
              rh = estimatePhotoArrayHeight(row.block);
            } else if (row.type === "textbox") {
              rh = estimateTextBoxHeight(row.block);
            } else {
              rh = STEP_ROW_HEIGHT;
            }
            const needed = (cur.length > 0 ? ROW_GAP : 0) + rh;
            if (h + needed > PAGE_CONTENT_HEIGHT && cur.length > 0) {
              pages.push(cur);
              cur = [];
              h = 0;
            }
            const addH = (cur.length > 0 ? ROW_GAP : 0) + rh;
            cur.push(row);
            h += addH;
          }
          if (cur.length > 0) pages.push(cur);
          return pages;
        }

        // ---------- Render ----------
        function render() {
          // Assign global step numbers based on order in the document
          let n = 0;
          state.blocks.forEach((b) => {
            if (b.type === "step") {
              n += 1;
              b._number = n;
            }
          });

          const rows = blocksToRows(state.blocks);
          let pages = paginate(rows);
          if (pages.length === 0) pages = [[]];

          const container = document.getElementById("pagesContainer");
          container.innerHTML = "";
          pages.forEach((pageRows, pageIdx) => {
            container.appendChild(
              buildPageElement(pageRows, pageIdx, pages.length),
            );
          });

          // Restore focus to a freshly-inserted/moved block, if any.
          if (focusBlockIdAfterRender) {
            const block = findBlockById(focusBlockIdAfterRender);
            const el = document.querySelector(
              '[data-block-id="' + focusBlockIdAfterRender + '"]',
            );
            if (el && block) {
              let target = null;
              // Pick the right entry point per block type.
              if (block.type === "parts") {
                // Skip column headers; land in the first body data cell.
                target = el.querySelector("tbody .parts-cell");
              } else if (block.type === "photoarray") {
                // No editable text; focus the first photo cell so the user can
                // press Enter / Space (or just see where to click) to upload.
                target = el.querySelector(".photoarray-cell");
              } else {
                // step / callout / section / textbox: focus the first rich-text editor
                target = el.querySelector(".rich-text-editor");
              }
              if (target) {
                target.focus();
                // For contenteditable targets, place the caret at the end so the
                // user can start typing immediately.
                if (
                  target.contentEditable === "true" ||
                  target.isContentEditable
                ) {
                  try {
                    const range = document.createRange();
                    range.selectNodeContents(target);
                    range.collapse(false);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                  } catch (e) {
                    // Selection APIs can fail in obscure cases; not critical.
                  }
                }
                // Scroll the new block into view if it's off-screen.
                if (typeof target.scrollIntoView === "function") {
                  target.scrollIntoView({
                    behavior: "smooth",
                    block: "center",
                  });
                }
              }
            }
            focusBlockIdAfterRender = null;
          }
        }

        function buildPageElement(rows, pageIdx, totalPages) {
          const pageEl = document.createElement("div");
          pageEl.className = "page";

          pageEl.appendChild(buildHeader());

          const content = document.createElement("div");
          content.className = "content-area";

          if (rows.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty-state no-print";
            empty.innerHTML =
              '<div class="empty-state-title">Empty document</div>' +
              '<div class="empty-state-body">Use the <strong>Insert Block</strong> menu in the sidebar to add steps and callouts.</div>';
            content.appendChild(empty);
          } else {
            rows.forEach((row) => content.appendChild(buildRowElement(row)));
          }
          pageEl.appendChild(content);

          const footer = document.createElement("div");
          footer.className = "page-footer";
          // Build the footer DOM safely: setting innerHTML with raw user data would
          // be an XSS vector. textContent escapes everything. Title falls back to
          // a neutral placeholder when blank.
          const leftSpan = document.createElement("span");
          leftSpan.className = "page-footer-title";
          leftSpan.textContent =
            (state.title && state.title.trim()) || "Untitled";
          const rightSpan = document.createElement("span");
          rightSpan.className = "page-footer-pageno";
          rightSpan.textContent = "Page " + (pageIdx + 1) + " of " + totalPages;
          footer.appendChild(leftSpan);
          footer.appendChild(rightSpan);
          pageEl.appendChild(footer);

          return pageEl;
        }

        function buildHeader() {
          const header = document.createElement("div");
          header.className = "header";

          // ----- Logo -----
          const logo = document.createElement("div");
          logo.className = "logo-area" + (state.logo ? " has-image" : "");
          logo.title = "Click or drop an image to set the company logo";
          logo.addEventListener("click", (e) => {
            if (e.target.classList && e.target.classList.contains("clear-btn"))
              return;
            handleLogoUpload();
          });
          attachDropTarget(logo, async (file) => {
            try {
              state.logo = await loadLogoFile(file);
              saveState();
              render();
            } catch (err) {
              alert("Could not load logo: " + err.message);
            }
          });

          if (state.logo) {
            const img = document.createElement("img");
            img.src = state.logo;
            img.alt = "Company logo";
            logo.appendChild(img);
            logo.appendChild(
              buildClearButton("Remove logo", (e) => {
                e.stopPropagation();
                state.logo = null;
                saveState();
                render();
              }),
            );
          } else {
            const ph = document.createElement("div");
            ph.className = "placeholder";
            ph.innerHTML = "Click to upload<br>company logo";
            logo.appendChild(ph);
          }
          header.appendChild(logo);

          // ----- Header info -----
          const info = document.createElement("div");
          info.className = "header-info";

          const schema = getFormSchema(state.formType);

          // Title row: title input + form-type selector on the right.
          // The selector only renders on the first page (rendered header is also
          // duplicated on subsequent pages, but the selector is no-print and only
          // editable from the first instance to avoid confusion).
          const titleRow = document.createElement("div");
          titleRow.className = "title-row";

          const title = document.createElement("input");
          title.className = "title-field";
          title.type = "text";
          title.placeholder = schema.titlePlaceholder;
          title.value = state.title || "";
          title.dataset.headerField = "title";
          title.addEventListener("input", () => {
            state.title = title.value;
            saveState();
            syncHeaderField("title", title.value, title);
          });
          titleRow.appendChild(title);

          // Form-type selector (no-print)
          const typeWrap = document.createElement("div");
          typeWrap.className = "form-type-selector no-print";
          const typeLabel = document.createElement("label");
          typeLabel.textContent = "Form Type:";
          const typeSelect = document.createElement("select");
          typeSelect.className = "form-type-select";
          Object.keys(FORM_TYPES).forEach((key) => {
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = FORM_TYPES[key].label;
            if (key === state.formType) opt.selected = true;
            typeSelect.appendChild(opt);
          });
          typeSelect.addEventListener("change", () => {
            handleFormTypeChange(typeSelect.value);
          });
          typeWrap.appendChild(typeLabel);
          typeWrap.appendChild(typeSelect);
          titleRow.appendChild(typeWrap);

          info.appendChild(titleRow);

          // Meta-field row(s) - schema-driven. If the schema has no fields (e.g.
          // 'blank'), skip the row entirely.
          if (schema.fields.length > 0) {
            const metaRow = document.createElement("div");
            metaRow.className = "meta-row";

            schema.fields.forEach((f) => {
              const wrap = document.createElement("div");
              wrap.className = "meta-field";
              const label = document.createElement("label");
              label.textContent = f.label + ":";
              const input = document.createElement("input");
              input.type = "text";
              input.style.width = f.width + "px";
              input.value = (state.metaFields && state.metaFields[f.key]) || "";
              input.dataset.headerField = f.key;
              input.addEventListener("input", () => {
                if (!state.metaFields) state.metaFields = {};
                state.metaFields[f.key] = input.value;
                saveState();
                syncHeaderField(f.key, input.value, input);
              });
              wrap.appendChild(label);
              wrap.appendChild(input);
              metaRow.appendChild(wrap);
            });
            info.appendChild(metaRow);
          }

          header.appendChild(info);
          return header;
        }

        function handleFormTypeChange(newType) {
          if (!FORM_TYPES[newType] || newType === state.formType) return;
          // Determine which meta fields would be lost in the switch.
          const oldKeys = Object.keys(state.metaFields || {}).filter(
            (k) => state.metaFields[k] && state.metaFields[k].trim(),
          );
          const newKeys = new Set(
            getFormSchema(newType).fields.map((f) => f.key),
          );
          const orphaned = oldKeys.filter((k) => !newKeys.has(k));

          if (orphaned.length > 0) {
            const labels = orphaned.map((k) => '"' + k + '"').join(", ");
            const ok = confirm(
              "Switching form types will discard data in fields not used by " +
                "the new form: " +
                labels +
                ". Continue?",
            );
            if (!ok) {
              // Revert the dropdown selection
              const sel = document.querySelector(".form-type-select");
              if (sel) sel.value = state.formType;
              return;
            }
            // Drop orphaned fields
            orphaned.forEach((k) => {
              delete state.metaFields[k];
            });
          }

          state.formType = newType;
          saveState();
          render();
        }

        // The header is duplicated on every page; sync without re-rendering so
        // typing doesn't lose focus.
        function syncHeaderField(field, value, sourceEl) {
          const matches = document.querySelectorAll(
            '[data-header-field="' + field + '"]',
          );
          matches.forEach((el) => {
            if (el !== sourceEl && el.value !== value) el.value = value;
          });
          // Title also appears in every page footer; update those without a full re-render.
          if (field === "title") {
            const display =
              typeof value === "string" && value.trim() ? value : "Untitled";
            document.querySelectorAll(".page-footer-title").forEach((el) => {
              el.textContent = display;
            });
          }
        }

        function buildRowElement(row) {
          if (row.type === "callout") {
            const el = document.createElement("div");
            el.className = "row row-callout";
            el.appendChild(buildCalloutElement(row.block));
            return el;
          }
          if (row.type === "section") {
            const el = document.createElement("div");
            el.className = "row row-section";
            el.appendChild(buildSectionElement(row.block));
            return el;
          }
          if (row.type === "parts") {
            const el = document.createElement("div");
            el.className = "row row-parts";
            el.appendChild(buildPartsElement(row.block));
            return el;
          }
          if (row.type === "photoarray") {
            const el = document.createElement("div");
            el.className = "row row-photoarray";
            el.appendChild(buildPhotoArrayElement(row.block));
            return el;
          }
          if (row.type === "textbox") {
            const el = document.createElement("div");
            el.className = "row row-textbox";
            el.appendChild(buildTextBoxElement(row.block));
            return el;
          }
          // step
          const el = document.createElement("div");
          el.className = "row row-step";
          el.appendChild(buildStepElement(row.block));
          return el;
        }

        function buildStepElement(block) {
          const el = document.createElement("div");
          el.className = "step";
          el.dataset.blockId = block.id;

          const num = document.createElement("div");
          num.className = "step-number";
          num.textContent = block._number != null ? block._number : "";
          el.appendChild(num);

          el.appendChild(buildBlockControls(block));

          // ----- Image area -----
          const imgArea = document.createElement("div");
          imgArea.className = "step-image" + (block.img ? " has-image" : "");
          imgArea.title = "Click or drop an image";
          imgArea.addEventListener("click", (e) => {
            if (
              e.target.closest(".clear-btn") ||
              e.target.closest(".block-controls")
            )
              return;
            handleStepImageUpload(block.id);
          });
          attachDropTarget(imgArea, async (file) => {
            try {
              const dataUrl = await loadStepImageFile(file);
              const b = findBlockById(block.id);
              if (b) {
                b.img = dataUrl;
                saveState();
                render();
              }
            } catch (err) {
              alert("Could not load image: " + err.message);
            }
          });

          if (block.img) {
            const img = document.createElement("img");
            img.src = block.img;
            img.alt =
              "Step " + (block._number != null ? block._number : "") + " image";
            imgArea.appendChild(img);
            imgArea.appendChild(
              buildClearButton("Remove image", (e) => {
                e.stopPropagation();
                const b = findBlockById(block.id);
                if (b) {
                  b.img = null;
                  saveState();
                  render();
                }
              }),
            );
          } else {
            const ph = document.createElement("div");
            ph.className = "placeholder";
            ph.innerHTML =
              "Click to upload image<br><small>or drag &amp; drop</small>";
            imgArea.appendChild(ph);
          }
          el.appendChild(imgArea);

          // ----- Editable text -----
          const text = document.createElement("div");
          text.className = "step-text rich-text-editor";
          text.contentEditable = "true";
          text.dataset.placeholder = "Type instruction text here...";
          text.spellcheck = true;
          text.innerHTML = block.text || "";
          text.dataset.blockId = block.id;
          text.addEventListener("input", () => {
            const b = findBlockById(block.id);
            if (b) {
              b.text = text.innerHTML;
              saveState();
            }
          });
          text.addEventListener("blur", () => {
            // Browsers leave a stray <br> when the field is fully cleared; reset
            // so the placeholder reappears.
            if (text.innerHTML === "<br>" || text.textContent.trim() === "") {
              text.innerHTML = "";
              const b = findBlockById(block.id);
              if (b) {
                b.text = "";
                saveState();
              }
            }
          });
          el.appendChild(text);

          return el;
        }

        function buildPartsElement(block) {
          const el = document.createElement("div");
          el.className = "parts-block";

          // ----- Brown header bar -----
          const header = document.createElement("div");
          header.className = "parts-header";
          const headerLabel = document.createElement("span");

          header.appendChild(headerLabel);
          el.appendChild(header);

          // ----- Block controls (move/delete the whole table) -----
          el.appendChild(buildBlockControls(block));

          // ----- Table -----

          block.columns.forEach((colName, colIdx) => {
